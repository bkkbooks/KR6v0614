body:
  text: 第五章如來藏説之初期聖典第一節初期聖典與弘傳者的風格如來藏説西元三世紀中從大乘佛教界傳布出來從衆生自己身心中點出本有如來藏性而得一切衆生成佛的結論教説通俗而又切要成為後期大乘經的主流如來藏是如來在胎藏中也就是衆生因位的如來從如來常住不變的思想而理解出衆生本有如來體性代表這一法門的初期經典在第一章敘列的經典中主要的有七部一大方等廣如來藏經現存晉佛陀跋陀羅唐不空所譯的二本二晉法顯所譯的大般泥洹經六卷與北涼曇無讖所譯的大般涅槃經初分前四品十卷相當大般涅槃經本來也只是這一部分後來曇無讖到西域去搜集才續譯成四十卷大般涅槃經初分是經的原始部分這一部分法顯與智猛都是在華氏城大乘寺中得來的曇無讖也是中天竺人可見當時西元五世紀初華氏城一帶這部經是相當流行的三大雲經大方等無想經現存殘本七卷也是曇無讖譯的四大法鼓經二卷五央掘魔羅經四卷六勝鬘師子吼一乘大方便方廣經二卷這三部都是宋元嘉年間求那跋陀羅所譯的七不增不減經一卷元魏菩提流支譯上面所列幾部經足以代表早期的如來藏説雖然法門是相通的而説法的因緣説明的內容傳出的先後也有多少不同如如來藏經以華藏為緣起受到了華嚴經的影響專用譬喻來説明在煩惱覆藏中一切衆生有如來藏依晉譯本佛性佛藏如來性都是如來藏的異名大般涅槃經初分以如來的入涅槃為緣起説如來常住大般涅槃不同於二乘所見的入滅如來常住所以一切衆生有佛性如大般涅槃經卷七大正一二四七中説我者即是如來藏義一切衆生悉有佛性即是我義大般涅槃經説一切衆生有佛性佛性就是如來藏我對我有著力的説明經上又説我者即是佛義常者是法身義樂者是涅槃義淨者是法義我者名為如來常者如來法身樂者即是涅槃淨者諸佛菩薩所有正法大般涅槃的四德依如來法身涅槃正法而安立都是異名而同實的大雲經大方等無想經經上簡略的説到一切衆生皆有佛性其性無盡令諸衆生明見佛性得見如來常樂我淨央掘魔羅經以央掘魔羅執劍害佛為緣受有文殊執劍法門的影響呵斥諸天聲聞大弟子文殊的空行一再説一切衆生有如來藏如來常恆不變如來之藏經上説一切衆生界是一界一切衆生界我界即是一界界安隱界一切衆生第是一界無垢如來藏表示了如來藏與衆生界我界的同一性大法鼓經以波斯匿王的擊鼓見佛為緣起可説是法華經的如來藏化從衆生和合施設説起説到衆生的不增不減不減所以衆生般涅槃者為有盡耶為無盡耶佛告迦葉衆生無有盡般涅槃者悉皆常住又説佛性無量相好莊嚴照明如來之性淨如滿月彼衆生界無邊淨明一切衆生有如來藏一性一乘衆生是和合施設的而衆生界與如來界性一致富有犢子部所説我假施設而有不可説我的意味勝鬘經受到了法華經的影響説正法二乘涅槃的不真實闡明一乘而説到如來藏如經大正一二二二下二二一下二二二中説得一乘者得阿耨多羅三藐三菩提阿耨多羅三藐三菩提者即是涅槃界涅槃界者即是如來法身如來法身不離煩惱藏名如來藏如來藏者是法界藏法身藏出世間上上藏自性清淨藏勝鬘經説到了心識與如來藏的關係説到自性清淨心而有染污更明確的到達空如來藏不空如來藏的安立不增不減經從衆生的不增不減説一界的甚深經上大正一六四六七上説甚深義者即是第一義諦第一義諦者即是衆生界衆生界者即是如來藏如來藏者即是法身第一義諦衆生界如來藏法身四者是異名而同一實質的依衆生界説如來藏三義如經大正一六四六七中説衆生界中示三種法皆真實如不異不差何謂三法一者如來藏本際相應體及清淨法二者如來藏本際不相應體及煩惱纏不清淨法三者如來藏未來際平等恆及有法衆生界所示的三法第一是如來藏不空義第二是如來藏空義第三約如來藏的平等恆有法也就是普遍永恆真實有經上解釋説如來藏未來際平等恆及有法者即是一切諸法根本備一切法具一切法於世法中不離不脫真實一切法住持一切法攝一切法舍利弗我依此不生不滅常恆清涼不變歸依不可思議清淨法界説名衆生一切法根本住持一切法攝一切法就是如來藏為依為持而有世間生死及涅槃真實法如來藏為依而有一切法與勝鬘經所説的相合央掘魔羅經勝鬘經不增不減經都説到了心自性清淨特別是勝鬘經與不增不減經文義精簡而富有條理近於論典在如來藏經部中為成熟而傳出遲一些的要典初期的如來藏説依經文所説可證明是興起於南印度的在傳説中與一切世間樂見比丘有關如大法鼓經説有離車童子名一切世間樂見作轉輪聖王佛記此童子當來有佛名釋迦牟尼世界名忍汝童子名一切世間樂見離車童子佛涅槃後正法欲滅餘八十年作比丘持佛名宣揚此經不顧身命百年壽終生安樂國得大神力住第八地一切世間樂見離車童子於正法欲滅餘八十年當廣宣唱大法鼓經此童子聞此經已為凡夫身住於七地正法欲滅餘八十年在於南方文荼羅國大波利村善方便河邊迦耶梨姓中生當作比丘持我名依經文説釋尊時代的離車族的一切世間樂見童子就是未來一切世間樂見比丘的前生樂見比丘生在印度南方不顧身命的宣揚這一法門大雲經大方等無想經也大同小異的説到梨車童子一切世間樂見宣説舍利不可得他是大精進龍王的後身在釋迦佛的正法將滅時出家護持佛法一切世間樂見比丘生在南天竺的須賴吒國善方便河邊華鬘村中其年二十出家修道多有徒衆為護正法不惜身命那時是法垂欲滅餘四十年娑多婆訶那的時代這位持法比丘受到當時一般比丘的反對如大方等無想經卷五大正二四一一中下説咄哉咄哉如是衆生樂見比丘實非比丘作比丘像遠離諸佛所説經典自説所造名大雲經遠離諸佛所制禁戒自為衆生更制禁戒如是邪法誰當信受諸惡比丘尋共害是持法比丘央掘魔羅經中沒有説到一切世間樂見比丘但央掘魔羅的幼年名字叫一切世間現未來成佛時是南方有國名一切寶莊嚴佛名一切世間樂見上大精進一切世間現與衆生樂見與一切世間樂見童子或比丘是不能説無關的佛名上大精進也與大雲經所説一切世間樂見童子的前身是大精進龍王相合這位傳説中的比丘一切世間樂見就是弘揚這一法門的比丘生於南方娑多婆訶那案達羅王朝時代案達羅王朝亡於西元二三六年頃所以這位持法比丘不能遲於西元二世紀末經典的集成可能在西元三世紀間大般涅槃經勝鬘經不增不減經雖法門相通但沒有説到這位持法比丘似乎已從南方而傳宏到中印度或西北印度了傳説的一切世間樂見比丘應該是龍樹提婆那樣的歷史人物大法鼓經説一切世間樂見比丘百年壽終生安樂國得大神通住第八地與傳説的龍樹相似如入楞伽經卷九大正一六五六九上説如來滅度後未來當有人大慧汝諦聽有人持我法於南大國中有大德比丘名龍樹菩薩能破有無見為人説我法大乘無上法證得歡喜地往生安樂國南大國中據梵文本是南方的與大法鼓經的文荼羅相近漢譯楞伽經的龍樹依梵本及藏文本是譯義為龍呼龍叫或龍猛與龍樹的梵語不合應該是龍樹以外另一位大德比丘藏譯本的大雲經説梨車童子名一切世間樂見在佛滅後四百年出家名龍叫比丘盛大弘通我佛的教法也説到得初歡喜地月稱造的入中論釋也引大雲經一切有情樂見童子以龍名比丘廣大佛的教法月稱的引文也以為就是龍樹的多羅那他印度佛教史説南方阿闍黎龍叫真實名字是如來賢與提婆同時為唯識中道義的唱道者在佛法中如來藏與唯識唯心論確是一脈相通的這位持法比丘一切世間樂見可能就是龍叫而被集入楞伽經中龍傳説中與龍樹相混雜於是龍樹與一切世間樂見比丘也被糾纏在一起了總之經典所説雖表現為佛的預記預言而印度南方的一切世間樂見比丘與如來藏説的發展應該有多少事實成分的初期如來藏説的倡導者是律身謹嚴的如大方等無想經卷五大正一二一九九下一一上説未來持法弟子如迦葉者成就大慈具足淨戒一切世間樂見比丘是大迦葉那樣的比丘大法鼓經是佛為迦葉説的大般涅槃經佛為迦葉菩薩説這都暗示了這一法門持法者的風格大雲經與大般涅槃經一再説到正法將滅時非法比丘的惡行非常嚴重持法比丘是戒律的謹嚴者倡導者與非法比丘們形成嚴重的對立大般涅槃經要國王以武器來守護持戒比丘大雲經説惡比丘們尋共害是持法比丘央掘魔羅經也説我於爾時當作比丘棄捨身命而為作護為了護法要不顧惜自己的身命勝鬘經中有三大願也説到捨身命財護持正法於所生身不惜軀命如來藏法門所顯出的就是扶律談常反映了那個時代的佛教情況佛法説不殺生得長壽報如來藏學派可能由於佛壽無量常住不變一切衆生一衆生的信仰淨持不殺生戒而徹底禁止肉食肉食聲聞學派是沒有禁絶的大乘的般若華嚴大集經等也沒有説到但大乘入楞伽經卷六大正一六六二四下説象脅與大雲涅槃央掘摩及此楞伽經我皆制斷肉象脅是象腋經央掘摩是央掘魔羅經魏譯楞伽經作勝鬘應該是指鬘央掘摩羅的義譯的誤寫這幾部如來真實常住不變的經典及唐代出現於中國的佛頂首楞嚴經都嚴格的禁止肉食這是印度如來藏學派的特色婆羅門教徒也有嚴持不肉食的深深的影響了中國佛教第二節如來與如來藏初期的如來藏法門是從如來而論到如來藏的如來般涅槃解脫法身無上菩提是有關佛果的一系列名詞這部分聖典的共通性是如來的涅槃解脫與二乘不同惟有如來才是究竟大般涅槃在聲聞學派中如經部以為涅槃是無體的只是災橫畢竟非有永違煩惱後有所依身故名得涅槃説一切有部以為涅槃是無為實法自性實有離言唯諸聖者各別內證是善是常別有實物三乘聖者的涅槃是沒有差別的雖説涅槃是善是常但入涅槃的如來及阿羅漢沒有身與智被稱為灰身泯智不再有利益衆生的活動這樣的涅槃一般人是不大容易信受的即使説涅槃是常的但被稱為如來的佛依阿含經説佛入涅槃遺體被火化了如來色身是無常滅盡而不再存在的大衆部等説如來色身實無邊際諸佛壽量亦無邊際如來的真身與説一切有部等不同如來藏説就是遠承大衆部説通過華嚴等大乘經而來的用無數的比喻説明如來的涅槃不是沒有了所以説如來常住非變易法被解説為滅盡的阿含等經文一一解説為實體不滅因為不是無常滅盡所以説常住非變易法不是沒有了所以説是有是不空多方面表示如來實德的經中或説四或説八如説舍利弗如來法身常以不異法故以不盡法故舍利弗如來法身恆以常可歸依故以未來際平等故舍利弗如來法身清涼以不二法故以無分別法故舍利弗如來法身不變以非滅法故以非作法故我者即是佛義常者是法身義樂者是涅槃義淨者是法義如來法身是常波羅蜜樂波羅蜜我波羅蜜淨波羅蜜如來常及恆第一不變易清淨極寂靜正覺妙法身甚深如來藏畢竟無衰老是則摩訶衍具足八聖道大般涅槃亦復如是八味具足云何為八一者常二者恆三者安四者清涼五者不老六者不死七者無垢八者快樂法身四德常樂我淨是一般所常用的也是可以總攝一切的如恆不變易無衰老不老不死可用常來總攝安快樂清涼極寂靜可用樂來總攝無垢就是淨第一與畢竟可通於四德樂與淨是一般所能信受的有異議而需要辨明的是常與我也就是問題的重點所在説到常住或常恆不變易到底是什麼意義衆生是無常的生死流轉的不可能永久的如經修行到斷盡一切煩惱入究竟涅槃涅槃是再沒有生死變異了這樣的涅槃常住是共聲聞而容易理解的但大乘要約如來説般涅槃的如來説什麼是常常是超越時間沒有時間可説的盡未來際的利益衆生雖出現於時間流中卻沒有變易這叫做恆如不增不減經説未來際平等恆及有法如來是常是恆所以説壽命無量在初期大乘經中受到歷史事實的影響所以釋尊雖被解説為方便示現的而一般大乘經還是以釋迦佛為説法的法主華嚴經也還這樣説在摩竭提國寂滅道場始成正覺毗盧遮那佛是釋迦佛的別名釋迦佛的誕生成佛到入涅槃是方便示現不是真實的但總得有個成佛的開始釋迦的法身真身到底什麼時候初成佛道呢首楞嚴三昧經説我壽七百阿僧祇劫法華經説我實成佛已來無量無邊百千萬億那由他劫大般涅槃經卷四大正一二三八八中三八九中説我已久住是大涅槃種種示現神通變化如首楞嚴經中廣説衆生皆謂我始成佛然我已於無量劫中所作已辦涅槃經的久已成佛久已住大涅槃與法華經所説的一樣説明了釋迦如來的久證常身壽命無量但所説的久已成佛壽命無量也有解説為未來還是有數量的在成佛以前也有不是常住的意味無常法不可能成為常住的常恆是始終沒有變異的所以為了貫徹如來是常是恆非達到一切衆生本來是佛不可從來就是常恆不變易的這不只是釋迦佛而是一切佛一切衆生常住不變的如來不唯是理性的唯是智慧的在如來藏法門中久住大涅槃的如來是有色相的這是與二乘涅槃大大不同的如經説涅槃者名為解脫言非色者即是聲聞緣覺解脫言是色者即是諸佛如來解脫常解脫非名妙色湛然住非聲聞緣覺菩薩之境界虛空色是佛非色是二乘解脫色是佛非色是二乘第一義淨身妙法身真實一切諸如來解脫有妙色如來在大般涅槃的真解脫中是有色的所以勝鬘經説如來妙色身世間無與等如來色無盡智慧亦復然法華經也説微妙淨法身具相三十二這是從大衆部如來色身無有邊際發展而來的如來藏法門是法身有色説從如來常恆不變論到衆生因位就是衆生身有如來藏如來涅槃或法身是有色的如來藏當然也有色相如經説一切衆生貪欲恚癡諸煩惱中有如來智如來眼如來身結加趺坐儼然不動如來性是無作於一切衆生中無量相好清淨莊嚴佛性於一切衆生所無量相好清淨莊嚴一切衆生悉有佛性無量相好莊嚴照明如來藏自性清淨轉三十二相入於一切衆生身中如來涅槃與如來藏是有色的有無量相好莊嚴這是初期如來藏説的特色佛所説法除常住不變的如來與如來性佛性都是方便説如來藏法門貫徹了這一理念如法華經説唯有一乘法二乘的涅槃是滅非真滅這是從三乘兼暢承認二乘的涅槃是真實而進入會歸一乘的階段如來藏法門充分發展了這一傾向佛所説的法如歸依三寶三寶中有二乘聖者知四諦一般以為苦集道三諦是有為四諦是為聲聞説的三乘有二乘與二乘的涅槃現在説這都是方便説真實是一歸依歸依佛一諦滅諦一乘大乘一究竟涅槃如來涅槃有論典風味的勝鬘經説得最簡練而明白如説歸依第一義者是歸依如來此法與僧二歸依第一義是究竟歸依如來如來即三歸依聖諦者非聲聞緣覺諦非虛妄者是諦是常是依是故滅諦是第一義不思議是滅諦過一切衆生心識所緣亦非一切阿羅漢辟支佛智慧境界聲聞緣覺乘皆入大乘大乘者即是佛乘是故三乘即是一乘二乘者入於一乘一乘者即第一義乘唯有如來應等正覺得般涅槃央掘魔羅經也説一乘一歸依佛第一義依大般泥洹經也説唯一歸依佛當知非有三終歸平等道佛法僧一味四真諦中滅諦者是如來性聲聞緣覺及諸菩薩皆當悉歸如來泥洹猶如百川歸於大海常住之法無邊佛法會歸於一一依一諦一乘一涅槃歸依一就是如來是常是遍無量相好盡未來際的示現一切利益衆生這不只是果德的仰信而已是可以體驗的如來不僅是如來也是如來性佛性如來藏一切衆生悉有佛性也是要從自己去體證實現如大般涅槃經卷八大正一二四一中説如來祕藏有佛性故其有宣説是經典者皆言身中盡有佛性如是之人則不遠求三歸依處何以故於未來世我身即當成就三寶一切衆生有如來藏性在理論上指出衆生本有的清淨因人人可以成佛的可能性在修行上不用向外馳求依於自身的三寶性如來性精進修行來求其實現這一為人生善的切要方法在宗教的實踐精神上有著高度的價值有頭陀風格傳如來禪的達摩門下在中國佛教界放出無比的光輝正是繼承這一方針第三節如來藏我般涅槃四德中我最為特出而是傳統佛教所難以信受的從釋尊説法以來佛法一貫的宣説無我諸法無我是三法印的一印是以無我來印定為是佛法的與外道説不同部派佛教中犢子部等立我被稱為附佛法外道然犢子部與説轉部成立我論的目的是為了成立生死流轉從繫縛到解脫的聯繫而不是以我為真理為證悟的內容所以初期大乘的大寶積經雖説聖性是常是樂是淨還是説無我如大寶積經卷一一二普明菩薩會大正一一六三五下説是性常住諸法常如故是性安樂涅槃為第一故是性清淨離一切相故是性無我求我不可得故到了如來藏説興起揭示如來藏我的法幢在佛教大乘佛教界可説是劃時代的變化意義太不平常了如約因圓果滿的如來説如來涅槃界有我德還可以説我是自在義以佛果的八自在來解説但如來藏説的宏傳者從如來的常樂我淨説到一切衆生有如來藏我從如來而説到我如來性就是我這不能不回憶到釋尊的時代世俗所説的如來有與神我的同樣意義如來與我神教所説的梵與我不是非常類似嗎佛法漸漸的進入佛梵同化的時代從如來而説到如來藏有一系列的相關名詞如來藏從譬喻而來有印度神教的神學淵源如來界如來性的意義相同但有佛教的學理意味依梵文的寶性論知道佛性是佛藏或佛界的漢譯佛藏與如來藏佛界與如來界內容完全一樣大般涅槃經卷七大正一二四七上中説佛法有我即是佛性我者即是如來藏義一切衆生悉有佛性即是我義如來藏佛性與我是同一的在世俗語言中我與衆生是同義詞所以衆生界也與如來藏的意義相同不增不減經就是依衆生界而立論的如經大正一六四六七中説不離衆生界有如來法身不離法身有衆生界衆生界即法身法身即衆生界舍利弗此二法者義一名異與衆生界同義的法身依經上説法身隨生死流名為衆生修菩提行名為菩薩離一切煩惱苦迫而得自在名為如來此三種法皆真實如不異不差也就是從衆生界我的立場説衆生菩薩如來法身的無二無別大法鼓經也説若勤方便除煩惱垢爾乃得我常住安樂則必有我彼衆生界無邊淨明央掘魔羅經説一切衆生皆有如來藏我斷一切煩惱故見我界可見我與我界衆生與衆生界都就是如來藏如來界性佛藏佛性的異名這是如來藏法門的根本論題是生死與涅槃的主體是迷成生死悟成如來的迷悟所依是證見的內容這樣的如來藏我説在佛法中的確是初期大乘所不曾見過的如來藏約如來性在衆生身中説衆生身中有如來藏主要是説明本有如來德性所以衆生有成佛的可能華嚴經衆生具有如來智慧德相也是這個意思但衆生身中的如來藏明確的説是我的別名印度神學中的我與梵同體而成為生死中的主體在如來藏法門中我與如來不二依我而可以成佛也就是衆生的主體不增不減經大正一六四六六中説不如實知一法界故不如實見一法界故起邪見心謂衆生界增衆生界減一法界下文又作一界在如來藏法門中界是普遍使用的術語如衆生界我界如來界佛界法界界是界藏礦界性如金礦中有金性銀礦中有銀性表示本來如此只是隱藏而沒有顯現出來等到經冶鍊而顯發出來也還是那樣的界性界是不失自性的阿含經説法界常住善達法界在如來藏説中界就是如來藏我的別名華嚴經常説諸法界法界與法界平等不二所以是一法界一界衆生的界性如來的界性平等平等所以衆生入涅槃從衆生而成為如來不是滅去衆生衆生就是如來衆生界是不增不減的如來藏是俗妄真實説所以這不是染淨一如而是衆生性與如來性界性的無二無別經上説彼衆生界無邊淨明不過約衆生性説名衆生界約衆生位中的如來性説名如來界只此無邊淨明的一法界隨染還淨而有衆生菩薩如來等名稱如不增不減經大正一六四六七上中説衆生界者即是如來藏如來藏者即是法身此法身過於恆沙無邊煩惱所纏從無始世來隨順世間波浪漂流往來生死名為衆生此法身厭離世間生死苦惱修菩提行名為菩薩此法身離一切世間煩惱使纏過一切苦離一切障離一切礙於一切法中得自在力名為如來衆生界無邊淨明由於無量煩惱所纏縛成為生死流轉的衆生衆生的界性就是如來藏我衆生菩薩如來界性是沒有不同的如來法身流轉而成為衆生是如來藏法門的通義不增不減經以外還有其他的經説如説雪山有一味藥如是一味隨其流處有種種異是藥真味停留在山猶如滿月一味者喻如佛性以煩惱故出種種味所謂地獄畜生餓鬼天人如來之藏是善不善因能遍興造一切趣生譬如伎兒變現諸趣生死者依如來藏有如來藏故得有生死是名善説彼自體變百千億種形色別異謂地獄色畜生色餓鬼色天色人色聲聞色緣覺色菩薩色佛色如來藏我是衆生身中有如來那樣的十力三十二相八十種好的不過在煩惱纏縛中無邊淨明還不能顯發所以成為流轉中的衆生生死是以如來藏我為依止的這一被稱為不思議我大我真我的法門對於傳統及初期大乘的佛教界無疑的會引起震驚引起懷疑懷疑的是印度自有佛教以來一貫的宣説無我而現在卻説非有我不可我是印度神教固有的現在佛法也説有我與印度的神學有什麼差別對於這些疑問大般涅槃經盡量的用比喻來解説現在説我與過去説無我的關係大般涅槃經卷二舉了舊醫與新醫治病用乳的比喻大正一二三七八下三七九上説我為醫王欲伏外道是故如來於佛法中唱説無我為調伏衆生故為知時故説是無我有因緣故亦説有我非如凡夫所計吾我是故説言諸法無我實非無我何者是我若法是實是真是常是主是依性不變易者是名為我經文的意思是為了破斥凡夫外道的我所以説無我凡夫外道的我如蟲食木偶成字耳其實並不理解只是妄執為了破凡夫外道而説無我其實不是沒有我什麼是我經上舉出了是常是主等定義以為這才是真我經上又舉了苦毒塗乳的比喻小兒有病不適宜服乳所以在母乳上塗了苦味説乳是毒的吃不得的等到小兒病好了又讓他服乳這比喻所比喻的如大般泥洹經卷五大正一二八八三下説如來誘進化衆生故初為衆生説一切法修無我行修無我時滅除我見滅我見已入於泥洹除世俗我故説非我方便密教然後為説如來之性是名離世真實之我先禁乳後服乳先説無我今説有我上來兩則的用意是一樣的過去為什麼不説真我只為了根機的不適合一向沒有聽説過所以如來藏法門被稱為方等祕密之藏表示了過去沒有公開宣説的事實如來藏我與印度外道所説的我到底有沒有關係大般涅槃經是認為有關的如經説所有種種異論呪術言語文字皆是佛説非外道説這一見解是如來藏説者的信念也可説是大乘共通的見解印度文化文化中的善法連咒術文字學在內都是佛説的這當然是過去佛説過的不過流傳人間久了有些不免被誤解了這才演變為印度種種的宗教神學如印度教説有我現在佛法也説我外道説是從佛法中來的佛法説有我當然會與神教相同不過外道雖説有我在理解上不免錯誤了外道説我是多種多樣的如經説凡夫愚人所計我者或言大如拇指或如芥子或如微塵凡夫愚人説言一切有我我相大如拇指或言如米或如稗子有言我相住在心中熾然如日如來藏我具三十二相八十種好結加趺坐當然與外道所説的不同涅槃經又舉刀的比喻有人只聽説刀雖説刀而不知刀的真相有的見了刀才説有刀聽説有刀雖不知刀的真相到底是從真刀來的不過沒有親見而只憑傳説罷了這是説外道説我與佛法説我是同一來源只是外道憑傳説誤解而沒有真知依據這一比喻可見印度神我所説的我從佛法中來而不是佛法所説的我從外道中來這真是非常巧妙的解説好在古佛所説是不能從歷史去證明的印度神教所説的我並不只是大如拇指小如微塵奧義書説我是常是樂是知也説周遍清淨與是實是真是常是主是依的如來藏我確是非常相近特別是如來與如來藏我梵與我的關係佛經説外道所説的我是從佛法中來的事關過去佛所説只可以信仰而不能從歷史去證明反之在現實世界中印度神教先説有我釋尊否定他們建立無我的宗教到西元二三世紀佛教才宣説如來藏我卻是歷史的事實所以大般涅槃經的比喻與解説只能説是信仰而已楞伽經説開引計我諸外道故説如來藏佛教為了適應印度神教文化為了誘化主張有我的外道們使他們漸入佛法所以方便的宣説如來藏我這也許更符合佛教方便適應的事實第四節如來藏不空對初期大乘的一切法空説採取批評態度的是如來藏法門的特色如大法鼓經卷下大正九二九五上二九六中説諸不了義空相應經迦葉白佛言世尊諸摩訶衍經多説空義佛告迦葉一切空經是有餘説空相應經與一切空經是通於初期大乘的可以大般若經為代表不了義有餘説就是指一切法空説為不徹底的還需要再作解説的以一切法空為不了義而要成立某些是不空的為後期大乘的特徵這一見解央掘魔羅經等都是一致的央掘魔羅經中文殊師利説大空諸佛如虛空虛空無有相解脫則如來空寂無所有央掘魔羅呵責為嗚呼蚊蚋行不知真空義然後提出了有異法是空有異法不空的見地並且説謂説唯極空傾覆佛正法這是針對一切法空是了義説所作毫不容情的批評大般涅槃經也説我已修學一切諸法本性空寂復告諸比丘莫謂如來唯修諸法本性空寂在諸法空寂以上更有所修的那當然是不空了如大般泥洹經卷三大正一二八七五上説又其空者如酥蜜瓶無酥蜜故名為空瓶其實不空因無物故形色猶存當知非空解脫不空亦復如是有形有色故説不空滅諸過患故名為空這就是有異法是空有異法不空的見解曇無讖譯作不空空空不空本義反而晦昧了不增不減經以涅槃畢竟空寂為無涅槃見勝鬘經也説如來藏者墮身見衆生顛倒衆生空亂意衆生非其境界空亂意衆生依寶性論的解説是大乘人總之般若經等説一切法空如來無上菩提涅槃也是畢竟空寂的在如來藏學者看來是不對的是有餘説不了義説有異法是空有異法不空意思是有些是空的另外一些是不空的這就是佛教中的有宗這種思想在部派佛教中有二大系如説一切有部説有為無為法是實有的我與我所是沒有的經上説諸行空是説諸行五蘊沒有我與我所而有為法是不空的這一思想體系在大乘中就是瑜伽師所説依他起性是有為圓成實性是無為這是有的遍計所執性的我法執是沒有的一切法空是説依他起及圓成實性上沒有遍計所執性依他與圓成是不可空的這是情執空法有説説出世部以為世間法從顛倒生業業生果故是不實出世法不從顛倒生故是真實世間法虛妄出世法真實被稱為俗妄真實説虛妄的是空真實的不空在大乘思想界就與如來藏説相合如大法鼓經説除如是等方廣大經不説餘經唯説如來常住及有如來藏而不捨空亦非身見空空彼一切有為自性一切佛經皆説無我而彼不知空無我義彼無慧人趣向滅盡然空無我説亦是佛語所以者何無量塵垢諸煩惱藏常空涅槃如是涅槃是一切句彼常住安樂是佛所得大般涅槃空與不空如來藏法門不出於這一原則第一則經文説佛説如來常住有如來藏但也説到空空的含義是一切有為法無自性不是説一切有部那樣只以無我身見為空有為自性空如來無為不空大般涅槃經正是這樣説的如文殊勸純陀説汝今當觀諸行性相如是觀行具空三昧這是有為空純陀以為如來是不屬於有為的所以説勿觀如來同於諸行如來真實是無為法不應復言是有為也但大乘經中説一切法皆空如來與涅槃也是空的這又是什麼意義呢第二則經文以為涅槃常空那是説諸煩惱藏空如大般涅槃經卷五大正一二三九五中説空者謂無二十五有及諸煩惱一切苦一切相一切有為行如瓶無酪則名為空不空者謂真實善色常樂我淨不動不變猶如彼瓶色香味觸故名不空瓶譬如大般涅槃瓶中有酪那是為無量煩惱生死所藏了涅槃空是説涅槃出離一切煩惱諸行離諸行的大般涅槃是不空的這一基本見解就是勝鬘經所説的空如來藏與不空如來藏也就是不增不減經所説的一者如來藏本際相應體及清淨法二者如來藏本際不相應體及煩惱纏不清淨法央掘魔羅經卷二大正二五二七中下説有異法是空有異法不空云何於空相而言真解脫如來真解脫不空亦如是出離一切過故説解脫空如來實不空離一切煩惱及諸天人陰是故説名空俗空真實有為行空而無為如來涅槃不空是如來藏説的決定説後期大乘佛教是以一切法空為不了義而説有異法是空有異法不空的依般若經本義空無相無願與無生清淨寂滅等同樣是甚深涅槃的增語空與無的意義是不相同的般若説一切法如幻如化涅槃也如幻如化在空義的發展中本性空自性空特別發展空是本性如此沒有自性不是説沒有一切法所以如幻如化的有包含了菩薩大行與如來果德當下就是畢竟空寂即有即空空有無礙但在初期大乘的發展中一般著重於離情執的觀照空觀空慧空與無生寂滅的同異問題早已被提出來空與寂無生涅槃是一致的嗎須真天子經説空寂適等亦復無異陀羅尼自在王菩薩品卻以空無相無願為淺更説佛菩提道實在的説一切法如幻一切法空的法門不適於一般根性一般初學是不能正確理解的如摩訶般若波羅蜜經卷二六説法終了時大正八四一六上説若新發意菩薩聞是一切法畢竟性空乃至涅槃亦皆如化心則驚怖為是新發意菩薩故分別生滅者如化不生不滅者不如化一切法如幻一切法性空是不適於初發心人的小品般若沒有説到而大品般若終了時就提出了為新發意人説生滅如化不生不滅不如化與俗空真實不空的法門相合解深密經無自性相品也説久行利根聽説一切法性空就能現證五事不具足的鈍根聽了一切法空不是反對空相應就是顛倒僻解自誤誤人這暗示空相應經流行對於根機不適合的引起了嚴重的副作用所以不能不解釋深密成為顯了明白易信易解的法門解説為有些是空的有些是不能不有不空的對於初機鈍根就可以方便引入正道了在大乘空教的發揚中大品般若經末了解深密經如來藏法門表示了時代佛教的共同傾向不過依般若經意為初學者不得不説不生不滅不如化不空解深密經以為為初學者還需要作一下淺顯的解釋但如來藏法門卻呵責空教宣説真實不空的究竟法門與般若深密經意恰好相反

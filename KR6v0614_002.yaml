通前後的才能保持過去的經驗到現在而有再憶念的可能這是記憶問題當時的印度宗教界承認前死後生一生一生的死生相續問題與記憶一樣前生所造的業早已剎那滅去至少也隨這一身心的死亡而過去前生的業已滅怎麼能感後生的果報死了而又再生前死與後生間有什麼聯繫這是業報問題如生死繫縛的凡夫經修證而成為聖人凡夫的身心煩惱雜染都過去了聖者的無漏道果現前滅去的雜染與現起的清淨有什麼關聯如凡夫過去了聖人現前凡聖間沒有一貫的體性那凡夫並沒有成為聖人何必求解脫呢這是縛脫問題這些問題一般神教就説有我我能保持記憶我作業我受果我從生死得解脫有了常住不變的自我這一切問題都不成問題然在佛法中諸行無常剎那剎那的生滅生滅中沒有從前到後的永恆者無常所以無我這樣這些問題都不容易説明至少不能使一般人滿意而信受佛法越普及一般信仰的人越多在一般人中無常無我的佛法越來越覺得難以理解信受了這就是有我論出現於佛教界的實際意義如説若定無有補特伽羅為説阿誰流轉生死若一切類我體都無剎那滅心於曾所受久相似境何能憶知若我實無誰能作業誰能受果若實無我業已滅壞云何復能生未來果實我若無云何得有憶識誦習恩怨等事若無實我誰能造業誰受果耶我若實無誰於生死輪回諸趣誰復厭苦求趣涅槃補特伽羅義譯為數取趣意義為不斷的受生死者是我的別名佛教內的犢子部等與神教的有我論所以非有我不可其理由是完全相同的不過佛法是諸行無常論者所以雖採取有我説而多少説得善巧一些常我在部派佛教內還不敢違反傳統而公然提出來部派佛教而立我的有犢子部及其流派説轉部而這都是從説一切有部分化出來的我在唯識學探源性空學探源已一再的加以論述這裡再作簡要的説明異部宗輪論大正四九一六下説説一切有部有情但依現有執受相續假立説一切行皆剎那滅定無少法能從前世轉至後世但有世俗補特伽羅説有移轉説一切有部立假名我世俗補特伽羅有部以為在世俗法中一一有情營為不同的事業作不同的業受不同的果報這是世間的事實由於有情執取當前的身心為自己所以成為一獨立的有情一直流轉不已有情是依有執受的五蘊而假立的雖然有世俗的補特伽羅卻沒有實體的我可得原來説一切有部以為一一法色蘊等恆住自性法性是如如恆住的依於因緣安住未來的法剎那起用入現在位作用又剎那滅入過去位有三世不同而一一法性卻始終恆住自性沒有變異這可説法性恆住作用隨緣依法的體性與作用來説都沒有什麼是從前世到後世的也就沒有移轉可説但剎那起用時不但有同時的俱有相應又能引發後後的相續依五蘊的和合相續假名為補特伽羅也就依假名補特伽羅可説有生死相續從前生到後世了説一切有部的解説是站在體法性用作用差別的見地不過體與用的關係雖不一而還是不異沒有別法的了解説一切有部所説説轉部的見解就容易明白了如異部宗輪論大正四九一七中説其經量部本宗同義謂説諸蘊有從前世轉至後世立説轉名有根邊薀有一味薀執有勝義補特伽羅餘所執多同説一切有部銅鍱部所傳從説一切有部分出説轉部又從説轉部分出説經部也就是經量部異部宗輪論是説一切有部所傳的以為説轉與經量是一部的別名然從特有的教義來説這是説轉部與後起的經量部不合説轉部以為五蘊有二類有可以移轉到後世的有勝義真實的補特伽羅從説一切有部分出而與説一切有部略有不同所説的有根邊薀有一味薀唯識學者解説為種子與現行是不正確的如阿毗達磨大毗婆沙論卷一一大正二七五五中説有執蘊有二種一根本蘊二作用蘊前蘊是常後蘊非常彼作是説根本作用二蘊雖別而共和合成一有情二蘊説沒有説明是什麼部派但比對異部宗輪論可斷定為説轉部的教義根本蘊就是一味蘊作用蘊就是根邊蘊實際上二蘊就是説一切有部的法體與作用的不同解説法體恆住自性有部只許説恆住不能説是常住然在其他部派看來恆與常是一樣的所以俱舍論曾評斥説許法體恆有而説性非常性體復無別此真自在作有部的法體恆住説轉部立為常住的根本蘊即一味蘊作用起滅立為無常的作用蘊即根邊蘊二蘊和合成一有情就是在常與無常的二蘊統一中建立勝義補特伽羅從體用統一的見地所以成立的補特伽羅不是假名的而是有真實性的我依勝義補特伽羅五蘊就有移轉從前到後的可能記憶與業報問題也就可以解説了大毗婆沙論的二蘊合為有情説正是為了説明記憶問題犢子部及其支派正量部法上部賢胄部密林山部都成立不可説我犢子部從説一切有部分出與説一切有部的論義相近僅若六若七與此不同主要的不同就是不可説我犢子部立五法藏過去法藏現在法藏未來法藏無為法藏不可説法藏三世法是有為法有為與無為法以外的不可説藏就是不可説我如異部宗輪論大正四九一六下説犢子部本宗同義謂補特伽羅非即蘊離蘊依蘊處界假施設名諸法若離補特伽羅無從前世轉至後世依補特伽羅可説有移轉犢子部與説轉部都是依補特伽羅説明前生後世移轉的可能犢子部的補特伽羅不可説我是依蘊處界假施設名在原則上與説一切有部的假名我是沒有太大不同的犢子部所立的補特伽羅分為三類如部執異論大正四九二一下説犢子部可住子部攝陰界入故立人等假名有三種假一攝一切假二攝一分假三攝滅度假屬於犢子部系的三法度論説到受施設過去施設滅施設三種施設三彌底部正量部論立三種人依説人度説人滅説人説者亦名安亦名制立名假名假名施設説都是的義譯施設説與部執異論的假相合犢子部系的不可説我依蘊界處而施設的約現在的過去的涅槃的立為三種補特伽羅都是施設假依説一切有部立實法有與假名有的差別假名有是沒有自性的我既依蘊界處施設是假有就沒有自性怎麼又立有不可説我呢這在説一切有部及經部的立場是難以通解的所以俱舍論問他到底是實有是假有犢子部的意見如阿毗達磨俱舍論卷二九大正二九一五二下説非我所立補特伽羅如仁所徵實有假有但可依內現在世攝有執受諸蘊立補特伽羅此如世間依薪立火謂非離薪可立有火而薪與火非異非一説一切有部的責問到底是實是假被犢子拒絶了犢子部以為依蘊立我是假施設但我與蘊是不一不異的如依薪立火那樣火不能離薪但火也並不是薪這樣我是不離蘊的但依蘊立我我並不等於蘊所以別立不可説我智度論説犢子部四大和合有眼法如是五衆和合有人法如依四大成柱柱是依四大施設的但柱有柱的體相作用與四大是不同的所以説一切有部是假無體説犢子部是假有體説施設而可説有體所以不可説我不能以實有或假有去分判的只能這樣説不可説我不是有為無常不是無為常而是不可説的有犢子部的不可説我似乎非常特出其實依蘊施設與説一切有部的假名我説轉部的勝義我一脈相通只是解説上有些差別而已犢子部立不可説我當然用來説明記憶業報的現象還有執取根身的作用如中論卷二大正三一三中説有論師言先未有眼等法應有本住因是本住眼等諸根得增長若無本住身及眼耳諸根為因何生而得增長本住指不可説我而説依般若燈論釋説唯有婆私弗多羅犢子立如是義人在結生相續的胎中身根等漸漸增長起來阿含經説緣識有名色依識的執取而漸長然犢子部以為這是不可説我的力量如不是先有本住我識是不能執取而使諸根增長的在生死相續根身漸長中不可説我有生命主體的意義與神教的神我説相近又阿毗達磨順正理論卷三八大正二九五五六下説婆雌子部作如是言補特伽羅是所歸佛什麼是所歸依的佛婆雌子犢子部以為歸依不可説我歸依於成正覺的所依蘊而立的不可説我佛就是我是不可説與蘊是一是異的我犢子部一系在中印度西印度一帶非常興盛以不可説我為佛如來對後期大乘的如來大我説應有不容忽視的影響佛説一切沙門婆羅門都是依五蘊而執我的依五蘊界處立我説一切有部犢子部説轉部都謹守這一原則然在佛教中還有依心立我的學派如成實論卷五大正三二二七八下説又無我故應心起業以心是一能起諸業還自受報心死心生心縛心解脫本所更用心能憶念故知心一又以心是一故能修集若念念滅則無集力又佛法無我以心一故名衆生相佛法是沒有實我的但世俗法中一一衆生的死生縛脫作業受報記憶等是有的依一心論者的見解這是一心的作用依一心而有衆生相死生縛解業報等阿毗達磨大毗婆沙論卷一一大正二七五五中説有執覺性是一如説前後一覺論者彼作是説前作事覺後憶念覺相用雖異其性是一如是可能憶本所作以前後位覺體一故前位所作後位能憶覺性是一所以能憶念正是一心論者的見解一心論者的一心成實論也明説覺性一心不是常住心是念念滅而又心相續的前心與後心雖不同而同一覺性所以可依心而立為衆生相依五蘊中的心來安立有情在佛法是有理由的依神教我是造業受報繫縛與解脫的主體所以我又名為作者也有説是受者的佛法否定了神我的作受説對於有情的染淨業報都以心識為主來説明如説長夜心為貪欲所染瞋恚愚癡所染心惱雜染故衆生惱心淨故衆生淨譬如畫師畫師弟子善治素地具衆彩色隨意圖畫種種像類心為法本心尊心使中心念惡即言即行罪苦自追車轢于轍為善例心意識是無常的無我的為一切法的主導者取代了神我的地位雜阿含經的緣起説有齊識而還的十或九支説也是這一意義依五蘊而立有情如集土地人民治權而成為國家依心識而立有情如以中央政府的元首代表國家識緣名色名色緣識心識與根身等有相依的關係心識是不能獨存的如國家元首有權力治理民衆的政治而又依賴於民衆的支持一樣心識取代神我而成為有情的主導者所以有情我與心識有聯合的可能性如來藏説有我的特性其後與心識相聯合也是有其可能性的大乘佛教興起以前勝義我不可説我已在部派佛教中流傳大乘興起以後到了西元二世紀中修正了的神我説也在大乘佛教界出現如大般若波羅蜜多經初分卷四大正五一七中下説舍利子菩薩摩訶薩修行般若波羅蜜多時應如是觀實有菩薩不見有菩薩不見菩薩名不見般若波羅蜜多不見般若波羅蜜多名不見行不見不行玄奘所譯大般若經的第二分第三分經文相同從原始般若以來菩薩但有名字大品般若經更廣説一切我法皆空而與十萬頌般若經相當的初分卻説實有菩薩不能不感到意外考晉竺叔蘭於元康元年西元二九一所譯放光般若經竺法護於太康七年西元二八六譯出的光讚般若經姚秦鳩摩羅什於弘始五年西元四三所譯的摩訶般若經與玄奘所譯的第二分第三分相當都沒有實有菩薩一句在西元三到五世紀初中國的古譯都沒有而七世紀的玄奘譯卻有了安慧雜集論這樣説如是十種分別依般若波羅蜜多初分宣説實有菩薩等經文唯識學派以為是對治十種散亂分別的特別點明是初分宣説可見安慧的時代西元五世紀實有菩薩還只是初分所特有的以後的第二分第三分也補入這一句奘譯才與古譯不合了菩薩是菩提薩埵覺有情實有菩薩不等於實有我嗎玄奘所譯的世親攝大乘論釋卷四大正三一三四二下説此中無相散動亂者謂此散動即以其無為所緣相為對治此散動故般若波羅蜜多經言實有菩薩言實有者顯示菩薩實有空體空即是體故名空體依玄奘所譯來説沒有遍計所執性依他起性為體的菩薩但不是什麼都沒有菩薩空性是實有的這不過圓成實性空是實有而已然真諦所譯本説由説實有顯有菩薩以真如空為體無性的釋論也説謂實有空為菩薩體這都是説菩薩是實有的真如空是菩薩的實體沒有世俗的菩薩實體卻有勝義的實有菩薩這可與如來大我比較研究如傳為無著所造的大乘莊嚴經論卷三大正三一六三下説清淨空無我佛説第一我諸佛我淨故故佛名大我釋第一無我謂清淨如彼清淨如即是諸佛我自性由佛此我最得清淨是故號佛以為大我説菩薩菩薩以真如空為體説如來如來清淨真如也是佛的我自性由於佛的真如我最清淨所以佛名為大我所以般若經的實有菩薩依唯識論師的解説菩薩真如空性就是菩薩的我自性實有菩薩只是真我的別名大般若波羅蜜多經初分卷五四大正五三六中又説住此六波羅蜜多佛及二乘能度五種所知海岸何等為五一者過去二者未來三者現在四者無為五者不可説般若經在説明第六地菩薩時説到了佛及二乘能度五種所知海岸般若經第二分第三分也是這樣説五種所知海岸顯然是引用了犢子部的五法藏俱舍論也稱五法藏為五種爾焰爾焰是所知的音譯然中國的古譯本光讚般若經放光般若經摩訶般若經大智度論所解釋的二萬二千頌般若經都沒有説到五種所知依實有菩薩為例來推論這也是初分十萬頌般若經所有後來才補入第二分第三分的大般若經初分引用犢子部的五法藏其中不可説雖可解説為如法界的別名然在佛教界對大般若經的不可説不可能不聯想到犢子的不可説而引起如就是不可説我的意解從引用不可説我而論實有菩薩也只是這一意義如犢子部以為歸依的佛以補特伽羅為體那菩薩也當然是補特伽羅為體補特伽羅就是不可説我西元一五年後大般若經引用了不可説我我在大乘中漸漸的被接受融會了鳩摩羅什所譯的清淨毗尼方廣經宋法海所譯的寂調音所問經與晉竺法護所譯的文殊師利淨律經是同本異譯羅什與法海的譯本比竺法護的譯本末後多了一段如清淨毗尼方廣經大正二四一八下説如金器銀器瓦器木器其中空界器雖種種其空無異如是一法性界一如一實際然諸衆生種種形相各取生處彼自體變百千億種形色別異謂地獄色佛色以平等故色等如如等故色等空等故色等善男子文殊師利以是事故説一切世界等乃至一切衆生等這一段經文主要在説明衆生與佛等平等舉虛空界為譬喻説如空界遍在一切處隨器具而不同金器空瓦器空隨器雖有種種而虛空是平等不二的這比喻法性如實際是平等不二的而衆生現起種種地獄色相佛色相這都是自體所變作的特出的經句是自體變百千億種形色別異寂調音所問經譯為我分化成若干千色可見自體是我的異譯約如法界實際説一切色相差別而如法界不異與一般大乘經説相符然從自體變作來説我變化一切凡聖似乎有差別而我體不二我與真如法界看作同一內容就是如來藏説了自體變作一段是竺法護初譯所沒有可能為後來增補的不過與文殊師利有關的聖典衆生界我界已受到了重視文殊師利現寶藏經也説此人種衆生界法界虛空界而無有二界與我已在西元三世紀這樣的興起而融入大乘了第四節佛子與佛種性如來藏是胎藏的藏與懷妊誕生也與種性血統有關從譬喻而發展起來的佛子與佛種性對如來藏説是有啓發作用的佛子是阿羅漢的通稱佛讚五百阿羅漢説汝等為子從我口生從法化生得法餘財印度的婆羅門自以為從梵天口生從梵天化生所以佛説阿羅漢們是從聽聞佛口説法聲所以名為聲聞而生從法法性寂滅的證入而成的佛子表示了有佛那樣的聖性能繼承如來覺世的大業所以名為佛子經中或稱之佛之愛子在小品般若波羅蜜經卷六解説大正八五六二中為須菩提為隨佛生隨何法生故名隨佛生諸天子隨如行故須菩提隨如來生須菩提是著名的聖者被稱為隨如來生如來是從如而來須菩提是隨順真如而行的所以名為隨如來佛生阿羅漢古代是稱為佛子勝者之子或如來之子的在佛子中有如來的長子如雜阿含經説汝舍利弗今如是為我長子鄰受灌頂而未灌頂住於儀法我所應轉法輪汝亦隨轉在佛經中每以輪王的正法化世比喻如來的出世法化世輪王的長子有繼承輪王事業的義務也就用來比喻舍利弗的助佛揚化由於舍利弗在佛涅槃以前就涅槃了所以釋尊的荼毗大典結集經律由摩訶迦葉出來領導摩訶迦葉也就以輪王長子為喻表示自己是如來長子了等到菩薩思想興盛起來菩薩將來要繼位作佛當然也是佛子進一步要簡別佛子推尊菩薩為如來真實佛子如大寶積經卷一一二普明菩薩會大正一一六三四中下説迦葉譬如剎利大王有大夫人與貧賤通懷妊生子於意云何是王子不不也世尊如是迦葉我聲聞衆亦復如是雖為同證以法性生不名如來真實佛子迦葉譬如剎利大王與使人通懷妊生子雖出下姓得名王子初發心菩薩亦復如是雖未具足福德智慧往來生死隨其力勢利益衆生是名如來真實佛子迦葉譬如轉輪聖王而有千子未有一人有聖王相聖王於中不生子想如來亦爾雖有百千萬億聲聞眷屬圍繞而無菩薩如來於中不生子想迦葉譬如轉輪聖王有大夫人懷妊七日是子具有轉輪王相諸天尊重過餘諸子具身力者所以者何是胎王子必紹尊位繼聖王種如是迦葉初發心菩薩亦復如是雖未具足諸菩薩根如胎王子諸天神王深心尊重過於八解大阿羅漢所以者何如是菩薩名紹尊位不斷佛種大寶積經的王子譬喻説明了菩薩才是真實佛子第一則喻王大夫人與貧賤通生下來的並不是王子因為不是聖位的血統種性聲聞聖者雖然與佛一樣的證入法性但由於雜有貧賤沒有悲願獨善的因素不能説是真實的佛子父家長時代種性是依父親而定的所以聖王與使女生子反而是王子這如還在凡夫位的菩薩但有了如來悲願的特性也就是佛的真子了第二喻説到了胎藏有轉輪王相與如來藏經九喻中的貧賤醜陋女懷轉輪聖王喻非常近似但大寶積經重在初發心菩薩能紹尊位不斷佛種依中阿含經王相應品所説輪王種性是代代相承的輪王到了頭生白髮老了就退位而由王長子來繼承王子遵循王家的舊法修行仁政於是七寶出現成為轉輪王如不修仁政輪王種性就斷絶了輪王的世世相承與如來出世前佛後佛的佛佛相承一樣輪王是父子相承前佛與後佛間也是父子那樣的所以菩薩發心求成佛道稱為佛子如修行圓滿就位登補處如立為太子再進一步就成佛了在佛佛相承出世中佛種性與佛子聲聞聖者怎麼也是沒有分的所以大寶積經説菩薩才是如來真實佛子輪王的種性相承從胎兒的確定是輪王種性經王子而登上輪王大位是王子的一生經歷而比喻中的佛種不斷是從菩薩發心修行到成佛要經歷長時間的修證過程説明菩薩從發心到成佛的過程就有以王子的一生經歷為喻成立菩薩行位的先後歷程如説出世部的大事説到菩薩的十地十地是一難登二結慢三華莊嚴四明輝五廣心六妙相具足七難勝八誕生因緣九王子十灌頂大事十地的後三地誕生因緣王子灌頂正是以王子的誕生立為王子灌頂為輪王比喻菩薩的修行成佛第六妙相具足似乎可以解説為胎內的根相等具足這一十地説與大乘的十住與十地都有關係現在要指明的以輪王的繼承為譬喻以説明菩薩行位的主要是大乘的十住説十住的先後傳譯譯名略有不同今舉佛陀跋陀羅譯的六十卷本華嚴經實叉難陀譯的八十卷本華嚴經梵本所説對列如下六十華嚴八十華嚴初發心初發心治地新學修行修行生貴生貴方便道方便具足成就直心成就正心不退不退童真童子深忍法王子灌頂灌頂十住行位的名目充分表示了輪王登位過程的譬喻生貴是出生誕生在貴勝家生在佛家方便具足如悉達多太子的學書學武學一切技術童真是沒有結婚以前立為太子是王子位受灌頂而成為輪王是灌頂位這五位明顯的以王子的一生為比喻所以初發心不妨比擬為最初入胎十住説古代最為流行大品般若經沒有名目的十地內容與十住相合又如説欲生菩薩家欲得鳩摩羅伽童真地當學般若波羅蜜華嚴經的入法界品也是採用十住説的大方廣佛華嚴經十住品卷八大正九四四四下説菩薩種性甚深廣大與法界虛空等一切菩薩從三世諸佛種性中生從部派佛教以來就有種性一詞或略譯為性如舍利弗阿毗曇論人品中立性人增一阿含經立九種人四向四果以前有種性人大乘十地説先後成立的共十地第二為性地從修行的階位立性人性地雖還沒有證入聖位但已成出世法器能入聖位到了性地一般以為決定不退了但異部宗輪論説大衆部等以為性地法皆可説有退如以世俗的種性來説在入胎誕生後可能有夭折的大乘所説的生在佛家也有退與不退二類所以發心趣求佛道的都是佛種性所攝不過起初還可能退失的在佛種性中的菩薩修行成佛以王子的一生為比喻種性住胎誕生等都是引發如來藏説的助緣種性是從發心修行進趣而説的如來藏説是約本有説的所以沒有發心以前如來已具足在胎藏中了

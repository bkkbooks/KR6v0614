body:
  text: 第二章如來藏思想探源第一節如來與法身如來藏是與的結合語淵源於印度神教的神學是不容懷疑的然如來藏説的流行是在大乘佛教後期西元三世紀中與部派佛教及初期大乘佛教不能説是沒有關係的應該是正由於部派佛教及初期大乘的某些思想啓發了如來藏説使如來與藏相結合而流傳起來所以如來藏的研究從部派佛教及初期大乘經中探索可能引發如來藏説的思想因素是非常必要的不過自釋尊入滅以來佛法在長期的發展中有意無意的足以啓發如來藏思想的真可説頭緒紛繁這裡只能就重要的幾點分別的加以探究如來藏説是以如來佛為重要主題的在佛教界如來是釋迦等一切佛的德號釋尊在世時弟子們與如來共住聽佛説法佛與弟子們一起往來一起飲食談論如來是那麼親切什麼是如來這問題簡直是不成問題不過對如來的崇敬了解由於弟子們根機利鈍的不同觀感上可能有些差別特別是在宗教的領域中無論是直接或從間接得來如來有超越一般的能力通一定是早已存在的然無論怎樣如來總還是人間的釋尊如來為三寶之一為佛法住世的重要一環自釋尊涅槃以後如來不再見了由於信仰及歸依的虔誠永恆懷念被解説為與如來藏為同一內容的法身漸漸的在佛教界發展起來一如來入涅槃後如來的遺體由在家弟子供養火化造塔如來的遺教由出家弟子結集大衆感覺到如來的肉身已過去而不可再見了好在傳誦在弟子間的法與律還在如增一阿含經序品説釋師出世壽極短肉體雖逝法身在如來在世以法律利益衆生法與律長在人間如依法律修行也就是見佛的法身了二上座部一分如説一切有部所説代表了現實的理性的立場我們所歸依的佛是什麼阿毗達磨發智論卷二大正二六九二四下説若法實有現有想等想施設言説名為佛陀歸依彼所有無學成菩提法佛不是因三十二相而名為佛的由於有能成佛菩提無學法所以名為佛發智的釋論大毗婆沙論説今顯此身父母生長是有漏法非所歸依所歸依者謂佛無學成菩提法即是法身有漏色身與無漏菩提法雜心論也稱為色身與法身佛的實體是無學成菩提法法身色身只是佛菩提的所依身是有漏的不是所歸敬的對象俱舍論以為依色身而能成佛所以色身也應該是所歸依的佛這近於經部本師矩摩邏多佛有漏無漏法皆是佛體的主張但佛涅槃後色身已滅盡了還能成為歸依處嗎能成佛菩提的無學無漏法就是如來所有的無漏五聚或寫作蘊戒身定身慧身解脫身解脫知見身五無漏聚雖通於阿羅漢佛是究竟圓滿的經上説舍利弗阿羅漢的無漏五聚並不因涅槃而消滅那麼佛的五無漏聚五分法身當然也法身不滅了白法所成身名為法身約無學無漏的功德法説三如來已經涅槃了儘管信仰歸依而不能見佛這是多麼令人失望的事要求見佛的宗教情操是可以理解出來的如中論卷四大正三三四下説是故經中説若見因緣法則為能見佛見苦集滅道佛藏經引經説若人見法是為見我佛見緣起就能見法見法就是見佛是引經的現存的中阿含經説見緣起便見法若見法便見緣起中論所引的可能是別部所誦的中阿含經説釋迦佛七佛都是觀緣起而成佛的那麼佛弟子如能觀緣起而證入不是與佛同證而見佛之所以為佛嗎義足經説佛從三道寶階從天來到人間弟子們都來見佛一比丘想起了佛的教説觀緣起無常苦空無我悟入了初果那時蓮華色比丘尼搶著在前禮佛大智度論卷一一大正二五一三七上説佛告比丘尼非汝初禮須菩提最初禮我所以者何須菩提觀諸法空是為見佛法身觀空無我法也就是禮佛如增一阿含經所説須菩提觀緣起空無我而證入就是見佛禪者稱悟入為與佛心心相印與佛一鼻孔出氣是與見法即見佛的理念相契合的如佛垂般涅槃略説教誡經大正一二一一一二中説諸弟子展轉行之則是如來法身常在而不滅也佛將入涅槃弟子們懊惱悵惘覺得失去了依止的大師所以佛這樣的開示大衆只要佛弟子能如法修行那麼佛的法身就常在人間而不滅因為有如法的修行者就有如法的證見者就有見法即見佛的法身呈現於弟子的智證中即是法身常在而不滅如沒有修證的法身就不在人間了這一充滿策勵與希望的教授勉大衆如法修行比後代的法身常住説似乎有意義得多上來三説一是教法義法身二是功德法身三是理法身在少數出家人中依法而受持修行體悟達成了法身尚在的滿足但對僧團內的青年初學社會的一般信衆懷念如來的內心依賴感是不容易滿足的原因是生身與法身的對立法身限於無漏功德及體悟的諦理否定色身是所歸依的佛瑜伽師地論引體義伽陀説若以色量我以音聲尋我欲貪所執持彼不能知我佛這就是金剛經所説若以色見我頌沒有色聲相好的法身如來在一般人來説缺乏具體的人格性一般人心目中的如來是人那樣的釋尊本來是這樣的所以上座部除一部分分別論者為主的法身如來觀不容易成為一般人的信仰大衆部系的如來觀也在發達起來那是信仰的理想的如來觀大衆部的信念是大衆部諸佛世尊皆是出世一切如來無有漏法如大衆部彼作是説經言如來生在世間長在世間若行若住不為世法之所染污由此故知如來生身亦是無漏分別論者及大衆部師執佛生身是無漏法説一切有部等立父母所生的色身與法身以為如來的色身是有漏的大衆部以為如來的色身身中的一切都是出世的無漏的大衆部的如來觀顯然是超越常情的如摩訶僧祇律卷三一大正二二四八一上説耆舊童子往至佛所頭面禮足白佛言聞世尊不和可服下藥世尊雖不須為衆生故願受此藥使來世衆生開視法明病者受藥施者得福如來有病由耆舊耆婆處方服藥是諸部廣律一致的但僧祇律以為如來實際是不用服藥的為未來的病比丘著想所以才方便的服藥這是説如來生身是無病的不會患病的依此推論如來的飲食睡眠大小便利等當然都不會有的屬於大衆部末派的增一阿含經就這樣説如來身者清淨無穢受諸天氣清淨無穢受諸天氣是説如來生身沒有便利等污穢不受人間的飲食所以似乎有飲食便利其實都是方便示現實際上如來身並不是這樣的如來身出世無漏的信念發展起來如異部宗輪論大正四九一五中下説此中大衆部一説部説出世部雞胤部本宗同義者謂四部同説諸佛世尊皆是出世一切如來無有漏法諸如來語皆轉法輪佛以一音説一切法世尊所説無不如義如來色身實無邊際如來威力亦無邊際諸佛壽量亦無邊際一剎那心了一切法一剎那心相應般若知一切法諸佛世尊皆是出世一切如來無有漏法是大衆部等如來觀的根本信念轉法輪等三句表示如來説法的不可思議如來色身實無邊際以下從多方面表示如來的究竟圓滿壽量無邊際是盡未來際直到永遠的永遠如來是恆有的常住的色身無邊際是身體的無所不在色身的相好莊嚴是無窮無盡的一剎那心了一切法一剎那心相應般若知一切法是心智的無所不知不但無所不知而且還是念念無所不知威力無邊是能力的無所不能如來身是無所不在無所不知無所不能而又是永恆常在的這是究竟圓滿的真實的如來無漏的出世的如來身從人間身中顯出是人天那樣有色相的法華經説微妙淨法身具相三十二就是這樣的法身在初期大乘經中人間生身與法身起初是沒有嚴密分別的後來才分別為法身與化身後來更分別三身四身等法身或法性身是色相莊嚴的方便示現的如來雖涅槃了而如來並沒有涅槃是真實存在的無時無處不在應機而利益衆生初期大乘經所説的如來身深受大衆部的影響但起初注意到人間成佛涅槃的事實所以多數大乘經説如來壽命多少劫然後入涅槃沒有説壽量無邊際大衆部系的如來觀在大乘經中通過了甚深法性的體現在對於如來的正觀如阿閦佛國經説如仁者上向見虛空觀阿閦佛及諸弟子等并其佛剎當如是摩訶般若波羅蜜經説若法自性無是為無所有何以故無憶故是為念佛金剛般若經説若見諸相非相則見如來如幻三昧經説察於如來如虛空界如來如虛空虛空如來則無二矣諸佛要集經説如來至真不可得見如來何在而欲見耶諸如來等則為法身無有色像佛身無漏無像無見不可捉持如欲覩虛空而不可見文殊般若經説不生不滅不來不去非名非相是名為佛思益經説不以色見佛不以受想行識見佛是名歸依佛維摩詰所説經説佛不可以一切言説分別顯示般若及有關文殊的經典念佛見佛著重於超越色相有無的勝義如法界等如諸佛要集經卷上大正一七七六二下説無形而現形亦不住於色欲以開化衆生現色身而有所教化佛者無色會亦不著有為皆度一切數導師故現身佛沒有色像為衆生而現色像色相莊嚴是示現的不可以色聲等相去擬想如來這是法身無色説從真空觀來是上座部説一切有部等色相非佛功德法性為法身的大乘化般舟三昧經的念佛見佛佛是具足色相莊嚴的見佛而了解為唯心所現然後悟入空性這一思想充分發達而表顯於華嚴經色相莊嚴與法界不二佛超越一切惟有虛空勉強的可以作為譬喻然到底著重於從色相莊嚴的無盡無礙去表現如來的究竟圓滿這是法身有相説從假相勝解觀來更近於大衆部色身無邊際的佛身在如來藏説中法身為如來藏的同義詞色相莊嚴是與華嚴經的如來相近的第二節如來與界如來界是如來與界的結合詞在如來藏説成立以前初期大乘經中已有如來界一詞而原始佛教中界是極重要的術語在佛法的發展中界是怎樣的成立如來界又進而與如來藏合流呢這是非常有意義而值得探究的在原始結集中界與界相應而組成一類界相應界相應中十八界七界六界等數量是很多的中阿含經有多界經共立六十二界是説一切有部所傳的南傳中部立四十一界是銅鍱部所傳的趙宋法賢的異譯本名四品法門經立五十六界在早期的經典中界是重於多界種種界的如雜阿含經説當知諸界其數無量界是無量無數的界的重要意義一衆生常與界俱與界和合如善心與善界俱不善心與不善界俱如善行者與善行者共俱惡行者與惡行者共俱衆生與界和合如膠漆得其素火得風熾然珂乳則同色衆生與界俱相似共和合增長亦復然界不是現行心也不是衆生而是與心衆生相對應相和合而助增勢力的二緣種種界生種種觸等界是十八界言説見想思欲願士夫所作施設建立部分顯示受生這都是緣根境識界而生起的三衆生生死流轉都緣界而起出離方面解脫界斷界無欲界滅界是修止觀而得的光界滅界七界是正受三摩跋提所得的從上來所説界的含義是相當復雜的瑜伽師地論説因義本性義是界義界從而來有根基成素的意義構成事物的元素對成果説是因義約自體説是不失自性的本質質素性界是種種不同的所以俱舍論説有説界聲表種類義如地是堅性水是溼性立為地界水界對他是不同的別類別性對同一性的是共同的通類通性不過遍通一切的大通性界在原始的教典中似乎還沒有説到界有性義類義因義但因是依止因如無明緣行根境識緣觸與後代的種子因不合法界雜阿含經已經説到了在十八界中與意根界意識界相關的是法界依古人解説法界的內涵極廣十七界以外的都屬於法界如約意識能知一切法來説一切法都可以攝屬法界中阿含經説舍利弗自己説世尊如在一日一夜到七日七夜中以異文異句而問同一意義我也能夠在一日一夜到七日七夜中以異文異句來解答同一意義佛讚歎舍利弗的確能這樣的回答因為舍梨子比丘深達法界故舍利弗的深達法界就是大智的深入法界法界是什麼意義呢佛為比丘説緣起法説到了法界這一段文與大乘深法性有深切的關係引有關的不同譯文如下雜阿含經若佛出世若未出世此緣起法常住法住法界此等諸法法住法空法如法爾法不離如法不異如審諦真實不顛倒舍利弗阿毗曇論若諸佛出世若不出世法住法界住彼法界若如此法如爾非不如爾不異不異物常法實法法住法定如是緣是名緣阿毗達磨法蘊足論若佛出世若不出世如是緣起法住法界此中所有法性法定法理法趣是真是實是諦是如非妄非虛非倒非異是名緣起阿毗達磨大毗婆沙論如來出世若不出世法住法性瑜伽師地論法性法住法定法如性如性非不如性實性諦性真性無倒性非顛倒性此緣起順次第性相應部諸如來出世若不出世法界法住法定即相依性如不虛妄性不異如性此相依性名為緣起不同譯本的緣起經有二節大毗婆沙論僅引用前一節瑜伽師地論是在解説後一節中將解説的術語摘録下來從經文中可以理解到幾點一大般若經中作為真如的異名真如法性法住法定法界不虛妄性不異如性等都可以從上引經文中發現在大乘法中真如法界等是極重要的術語都見於緣起經這實在是理解從聲聞佛法而演化為大乘佛法的關鍵性經典二法住梵語巴利語作梵語的巴利語作玄奘是譯作法定的近人或譯為法決定性法確立性在鳩摩羅什的譯典中有法位一詞入正性離生或作正性決定入正性決定或譯作入正決定羅什是譯作入正位的尼夜摩羅什譯作位所以法位是的別譯依此雜阿含經的法空比對其他譯本可斷定為法定的誤寫三阿含經説緣起法法性法住法定法界是表示緣起法的意義緣起法是佛出世也如此不出世也如此有常住恆住的意義所以分別論者立緣起無為四相應部但説界説緣起法是相依性瑜伽師地論沒有法界而説緣起順次第性依因而果的次第決定性此有故彼有此生故彼生此無故彼無此滅故彼滅的相依性就是緣起法的界性界是相依因五佛依中道説法就是緣起依緣起而向兩方面展開此有故彼有此生故彼生相依而起的因果次第開示了世間生死又從此無故彼無此滅故彼滅因滅則果滅的相依性顯示了出世的涅槃這兩方面就是有為與無為佛稱歎為緣起甚深寂滅更甚深佛的處中説法是依緣起法界相依性原理而表達出來的六釋尊的教説依緣起中道而開顯在修學上是有先後性的先知緣起次得涅槃所以説不問汝知不知且自先知法住後知涅槃法住智正知緣起因果的安住不亂能知緣起無明我見為上首的見煩惱被摧破了貪瞋等愛煩惱也漸漸除滅心無所取無所著無所住能契入涅槃得解脫自在悟入次第部派間異説極多這只是依阿含經説略作條理而已初期大乘興起在修證的方法上與阿含經説是有些不同的大乘直示生死與涅槃不二説一切法本不生一切法本來寂靜依原始般若説一切執著一切分別想念都與般若不相應與分別想念相對應的語言名字是虛妄而不可得的所以直從但名無實下手於一切無所取著能直入一切法無生大品般若經綜合了如法性界實際為一類被解説為涅槃的異名如摩訶般若波羅蜜經卷一七大正八三四四上説深奧處者空是其義無相無作無起無生無染離寂滅如法性實際涅槃須菩提如是等法是為深奧義般若經所説的最深奧者是重在勝義的真如法界與空無生寂滅涅槃是同一內容的不同説明可見般若經是以真如法界等表示涅槃的而這也就是一切法性如法界實際在般若法門的發展中更類集為十名或十二名而另一開展與文殊師利有關的經典除了引用如法界實際外特別重視法界並説到了種種界如晉竺法護所譯的文殊師利現寶藏經説人種衆生界法界虛空界而無有二經末的法界不壞頌也説我種法界人士衆生慧壃法界塵勞虛空種等一切平等經中所説的種壃界依異譯大方廣寶篋經都是界的異譯梁僧伽婆羅的文殊師利所説般若波羅蜜經説到衆生界如來界佛界涅槃界法界無相般若波羅蜜界無生無滅界不思議界如來界我界平等不二文殊般若經的傳出遲一些如來藏説習見的名詞如如來界佛界我界都出現了然文殊師利現寶藏經已説到了我界這是竺法護在泰始六年西元二七譯出的與文殊有關的經典所説的法界也有我的意義這留在下一節去説這裡所要説的文殊經典所説的法界著重在一切法入於法界一切法不出於法界如入法界體性經大正一二二三四下説文殊師利我不見法界有其分數我於法界中不見此是凡夫法此是阿羅漢法辟支佛法及諸佛法其法界無有勝特殊異差別亦無壞變異亂文殊師利譬如恆河若閻摩那若可羅跋提河如是等大河入於大海其水不可別異如是文殊師利如是種種名字諸法入於法界中無有名字差別文殊師利譬如種種諸穀聚中不可説別是法界中亦無別名有此有彼是染是淨凡夫聖人及諸佛法如是名字不可示現入法界體性經是隋西元五九五闍那崛多所譯譯出的時代很遲但本經的初譯寶積三昧文殊師利菩薩問法身經如譯法界為法身與後漢支婁迦讖的阿闍世王經相同至少這是西晉時代的譯品問法身經中也説到了四河入海與穀聚的比喻竺法護西元二六六的另一譯品須真天子經也説萬川四流各自有名盡歸于海合為一味所以者何無有異故也如是天子不曉了法界者便呼有異曉了法界者便見而無異也總合聚一切諸法故法界的獨到意義在大海與穀聚的比喻中可以理解出來法界是一切法普遍的絶對真理古人稱之為一大總相法門在法界中一切法都無二無別沒有數量的多少也沒有質量的高下與勝劣本來般若經所説真如法界等都是同一內容真如也是一切法的本性無差別變異與法界沒有什麼不同不過般若經重於真如重在於一切法中顯無差別如性如不即一切法不離一切法所以真如無差別中可説一一法的如性這是重於向上體悟的法界當然也含有這樣的意義但傾向於大一有從法界來了達一切法的意思如須真天子經卷四大正一五一一一上説譬若天子於無色像悉見諸色是色亦無等如虛空也如是天子於法界為甚清淨而無瑕穢如明鏡見其面像菩薩悉見一切諸法如是諸法及與法界等淨如空經文舉了兩個比喻如虛空中現色像如明鏡中見面像如像是明鏡所影現的不離明鏡並沒有像的實體可得明鏡是明淨的像也是明淨的沒有穢染平等平等明鏡如法界像如一切法又如色像在無色像的虛空中顯現色像沒有實體與虛空是沒有差別的虛空如法界色像如一切法在這兩個比喻中表示了一切法在法界中不可得又表示了依法界而現諸法的意義界是依義也是性義從大一來説法法平等般若經的如性是沒有這樣説的如虛空如像是般若經常用的譬喻但比喻一切法無所有不可得而不是表示虛空與明鏡為依的文殊法門顯然有了假必依實超越的實理的意境向妙有中國佛學的術語而演進雜阿含經説衆生界無數無量在相應部中衆生界作是生類的意思雜阿含經的衆生界也不外乎是衆生類然在大乘經尤其是與文殊有關的經典衆生界與我界都流行起來衆生界原意只是衆生類虛空界就是空間阿含經的六界之一衆生是六界和合所成的所以界是構成的因素般若經常用虛空界作譬喻比喻無數無量無所有等般若經的虛空界喻是世俗所共知而作譬喻的起初並不含高深的意義衆生與我都是神我的異名現在都稱之為界與法界虛空界無二無別法界已含有深義如上文所説經中的衆生界與我界決不是世俗的假名我而已存有深義界已被作為形而上的真理的別名在界的意義中一切是無二無別的於是法界與衆生界衆生界與如來界都無二無別有超越名相的特性如來界與如來的舍利有關唐玄奘所譯的甚希有經與失譯的未曾有經是同本異譯經文讚歎為如來舍利造塔的功德即使佛馱都如芥子許也是功德不可思議真諦所譯的無上依經二卷分七品校量功德品第一就是甚希有經的異譯第二品以下是如來界品菩提品如來功德品如來事品這四品的內容是如來藏法門如來藏法門與讚歎如來舍利功德怎麼會聯結在一起佛舍利是如來的遺體造塔供養的如來舍利是荼毗以後所留下來的粒形的舍利如來舍利也名為佛馱都如來馱都就是佛界與如來界或譯作佛性與如來性這是部派佛教熟習的名詞如來舍利與如來藏的或名如來界名稱竟完全相同一向流傳於佛教界的如來馱都如來界對或名如來界的如來藏説不能説沒有關係的古代的造塔供養舍利與念佛有關佛弟子崇敬懷念如來歸依如來而佛涅槃以後缺乏崇敬的具體對象適應一般人的需要所以崇敬如來的舍利如來舍利是如來遺體的一分所以佛舍利名佛馱都界是性的意義古人恭敬供養舍利依舍利而直覺的想見如來如親見如來一樣供養舍利不止是形式的禮敬虔信而懷念於佛的可能有深一層的意義還有荼毗留下來的如來舍利只是遺體物質然在佛教的傳説中不論是南傳北傳印度中國舍利有放光動地等瑞應在一般信衆的心目中舍利是充滿神祕性的舍利的神妙與信仰中的如來在宗教的意境中是可能合一的開塔見舍利而見佛就是這一宗教事實的説明如妙法蓮華經卷四大正九三三中下説釋迦牟尼佛以右指開七寶塔戶出大音聲如却關鑰開大城門即時一切衆會皆見多寶如來於寶塔中坐師子座全身不散如入禪定多寶佛於寶塔中分半座與釋迦牟尼佛而作是言多寶佛是過去佛已經涅槃了如入禪定的全身不散是全身舍利供養在七寶塔中的是全身舍利如來界而開塔所見的就是多寶如來有分座的動作有説話的聲音經文暗示了如來常住不般涅槃的深義但從大衆所見來説開塔見佛就是依佛舍利如來界而現見如來又唐譯大方廣佛華嚴經卷六八大正一三六六上中説南方有城名善度中有居士名鞞瑟胝羅彼常供養栴檀座佛塔居士告言善男子我得菩薩解脫名不般涅槃際我開栴檀座如來塔門時得三昧名佛種無盡我入此三昧隨其次第見此世界一切諸佛鞞瑟胝羅供養的佛塔當然是舍利塔開塔得三昧見佛與觀佛相好得三昧見佛一樣當大乘興起觀佛像相好而見佛的法門流行也該有念佛舍利早期的供養舍利與後來的供養佛像意義完全一樣而見佛的鞞瑟胝羅居士就是實例從舍利如來界而現見如來與從如來藏界而顯出如來思想是一脈相通的都以不般涅槃的理念為前提如來界藏説的興起與如來舍利有關無上依經的結合是不無理由的第三節如來與我如來的世俗解説釋尊時代已經是神我別名所以在佛法流行中如來而被作為神我型去解説是非常可能的如來界如來藏與如來有關而如來與神我有關所以討論有神我色彩的如來藏説應注意佛教界對於我的意
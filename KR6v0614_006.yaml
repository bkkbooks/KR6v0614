body:
  text: 第六章如來藏學之主流第一節傳説中的如來藏法門有神我色彩的如來藏説是從理想的如來常住偏在信仰而來的通俗而能適合一般人心所以迅速的傳布開來對於初期大乘佛教界多少會有些驚異的感覺但這是一般所容易接受的而大乘佛教界又一向以為所未聞經聞便信受如所説行依止於法不依言説文字對從來沒有聽説過新近傳出的經典不可輕率的加以誹毀要本著正確的法義給以合理的解説初期大乘經就是這樣流傳起來的對於新出現的如來藏經典當然也不能不接受了西元三世紀起如來藏經典次第流傳出來成立於三世紀的中觀論典還沒有提到如來藏説但提婆弟子羅睺羅跋陀羅傳説已以常樂我淨解釋八不了四世紀中推宗為未來佛彌勒菩薩的教學稱為瑜伽派的深受經部思想的影響但面對流行的如來藏説也不能不給以解説會通從四世紀以來大乘佛教界的論書或經典都不能不對如來藏有所説明在這些解説中究竟一乘寶性論在中國是被看作代表如來藏學的寶性論比較的接近初期的如來藏説但受到瑜伽學派的影響也可能從瑜伽派脫出而自成體系的所以解説的方法近於瑜伽派而初期的神我色采也大為淡化了從如來常住遍在引出衆生本有如來藏或佛性起初是真我論又與真心論合流的印度的大乘佛教界也許覺得這過分與梵我論類似所以論師們及經典都給以方便的會通因為這樣西藏等傳説印度大乘佛法唯有瑜伽與中觀二大流其實真我與真心系的如來藏説有獨到的立場在印度是真實存在的接近初期如來藏説的如西藏所傳的覺曩巴派克主所著密宗道次第論説如來藏經陀羅尼自在王請問經大般涅槃經利益指鬘經勝鬘師子吼經智光莊嚴經無增減經大法鼓經入無分別陀羅尼經解深密經覺曩巴説此十經為如來藏十經為後法輪為了義經許彼諸經所説如來藏與佛自性身同是諦實有常恆堅固無為相好而自莊嚴一切有情從無始生死以來於煩惱網纏壳㲉中本來具足以九喻九義而為宣説利益指鬘經即漢譯的央掘魔羅經覺曩巴以為如來藏與佛的自性身是同樣的相好莊嚴自性身是轉依所顯的佛自體衆生本來如是只是還在煩惱中沒有顯出而已這與初期的如來藏説是符合的然覺囊巴派以解深密經為如來藏經類顯然是不妥當的凡如來藏部類都是説一乘的與解深密經的普為發趣一切乘者不同這是拘蔽於解深密經的三時教説以為第三時教才是了義的這才比附於解深密經的後轉法輪如取陀羅尼自在王經的次第三時説法也許會更合適些中國的禪宗是菩提達磨從南印度傳來的初達宋境可能西元四五年前後已到達中國了這一系禪法本來是如來藏禪在流傳中化導的方便不一或淺或深但早就有所謂密傳密作用如福州大安説汝諸人各自有無價大寶從眼門放光照山河大地耳門放光領采一切善惡音響六門晝夜常放光明汝自不識取如人負重擔從獨木橋上過亦不教失腳且是什麼物任持便得如是汝若覓毫髮即不見臨濟每説無位真人只是真我的別名傳説達磨的弟子波羅提為王説法即明説性在作用如景德傳燈録卷三大正五一二一八中説問曰何者是佛答曰見性是佛王曰性在何處答曰性在作用王曰是何作用波羅提即説偈曰在胎為身處世名人在眼曰見在耳曰聞在鼻辨香在口談論在手執捉在足運奔遍現俱該沙界收攝在一微塵識者知是佛性不識喚作精魂覺曩巴所傳禪宗的南方宗旨對於初期的如來藏説比論師及後出經典的解説似乎要切近得多第二節寶性論為主的如來藏論論師們對如來藏説的條理分別都有淡化神我色彩的傾向傳説為堅慧所造的究竟一乘寶性論法界無差別論及無上依經比較接近如來藏説的本義代表了如來藏論學的主流一究竟一乘寶性論四卷古代或作三卷五卷元魏勒那摩提譯依古代經録所傳或作勒那摩提譯或作菩提流支譯或作二人分別的譯出如開元釋教録説菩提留支傳本勒那扇多參助其後三處各翻訖乃參校其間隱沒互有不同致有文旨時間異綴後人合之共成通部見梁寶唱等録古代有不同的兩種譯本在流傳中僅存一部傳説為勒那摩提所譯這部論究竟一乘寶性論或簡稱寶性論依內典録説一名寶性分別七大乘增上論這部論有藏文譯本也存有梵本依中村瑞隆所作的梵漢對照究竟一乘寶性論研究藏和對譯究竟一乘寶性論研究説梵本論名譯義為寶性分別大乘最上祕義論與內典録所傳的寶性分別大乘增上論相合西藏譯本作大乘最上祕論沒有説到寶性分別依漢文譯本分本論與釋論二部分本論是偈頌釋論有偈頌也有長行釋論中包含了本論頌依中國所傳全論都是堅慧菩薩造的依梵藏本論本偈是彌勒菩薩造的釋論是無著菩薩造的真諦的婆藪槃豆法師傳大正五一九一上説阿僧伽即無著法師殂歿後天親方造大乘論解釋諸大乘經釋攝大乘三寶性甘露門等諸大乘論天親是世親的異譯無著的親弟寶性論的寶性是佛法僧的三寶性所以傳説天親釋三寶性論就是釋寶性論這樣寶性論的釋論或説無著造或説世親造到底是誰是很難考定的依婆藪槃豆傳説無著世親等兄弟三人都名為婆藪槃豆世親這也許就是傳説不一的原因不過寶性論的風格與內容近於瑜伽系而在如來藏的見解上與瑜伽系有著根本不同處所以傳説為無著造世親造似乎還不如傳為堅慧造的好至於彌勒造到底不過表示這一法門的出於未來佛而已寶性論的組成要素如論説佛性佛菩提佛法及佛業諸出世淨人所不能思議身及彼所轉功德及成就義利示此四種法唯如來境界佛所依止的性界經修行而證得的菩提圓滿一切法功德及利益衆生的事業這四法是本論開示的主題釋論説佛法僧寶性菩提功德業略説此論體七種金剛句那是分判全論為七大科了漢譯的究竟一乘寶性論分為十一品十一品與七金剛句四法的關係如下四法七句十一品教化品佛寶佛寶品法寶法寶品僧寶僧寶品一切衆生有如來藏品佛性性無量煩惱所纏品為何義説品佛菩提菩提身轉清淨成菩提品佛法功德如來功德品佛業業自然不休息佛業品校量信功德品梵本與藏譯本缺少教化品全論分為五章一如來藏包括了第二到第七的六品二菩提三功德四佛業五信勝益教化品十八偈説明造論的意義呵責謗法與毀謗法師的罪惡意義與末後品相同這十八偈是梵藏本所沒有的極可能是後人所增補七金剛句中的佛寶法寶僧寶部分讚歎三寶的功德以故我今敬禮作結印度造論多數是以讚歎三寶歸敬三寶開始的本論的讚禮三寶也只是論前的歸敬所以梵本與藏本分為五章讚禮三寶是附屬於初章以前的沒有獨立的意義我以為這是本論的原意由於釋論重視三寶性所以將全論科分為七金剛句在釋論中引陀羅尼自在王經以説明這七句次第的符合經説其實經説的並不明白如以菩薩修行的六十種法來比配佛性如來藏無論從本論頌與本論有關的經論來看都不免感到過分的勉強本論頌先讚禮三寶次論述四法末了説這一法門的功德而勸人信修具備了序正流通的一般形式這部論或作大乘最上祕論或加寶性分別而成大乘最上祕論之寶性分別可能表示了這一意義大乘最上祕論就是如來藏説是本論的名字由於別立七金剛句重視三寶性所以又加上寶性分別字樣在流傳中一般都依釋論來解説本論重視寶性而在名稱上還有保持原名大乘最上祕論的二無上依經二卷梁真諦譯是一部論典形式的經典全經分七品一校量功德品二如來界品三菩提品四如來功德品五如來事品六讚歎品七囑纍品從品的名稱就可以看出從第二到第五如來界菩提如來功德如來事與寶性論的主題佛性佛菩提佛功德佛業是完全一致的校量功德品第一本為一部獨立的經典讚歎造如來舍利塔的不可思議功德與唐玄奘所譯的甚希有經等同本異譯如來的舍利佛教界稱之為如來馱都就是如來界與如來藏別名的如來界名字相同也就這樣本為稱歎如來舍利界功德的經典連類而稱歎如來藏界的不可思議了無上依經的如來界品與一般如來藏經典相同菩提品十事分別與寶性論的佛性佛菩提的主要內容大致相同約轉依説明菩提自性説轉依法有四種相説如來無上的不可思議都是出於瑜伽師地論顯揚聖教論的無上依經沒有説如來藏的九種譬喻如來事業的九種譬喻也沒有説到三寶性在如來藏學中這是重於義理分別的參考了寶性論瑜伽師地論等但不只是集録而有獨自組織的一部論經勝天王般若經與玄奘大般若經第六分同本在次第與內容方面一部分與無上依經相合如法性品從品初到行般若波羅蜜如實通達甚深法性與無上依經的如來界品相合二行品與無上依經的菩提品十事的後六事五者作事六者相攝七者行處八者常住九者不共十者不可思惟及如來功德品的大部分相合讚歎品的偈頌一部分與無上依經的讚歎品相合付囑品受持此修多羅有十種法與無上依經的囑纍品相合勝天王般若經也與寶雲經的全部內容相合可以斷定勝天王般若經是纂集寶雲經無上依經等而成的但不知為什麼沒有將無上依經義全部纂集進去無上依經為勝天王般若經所集入佛性論也引用了這部經在如來藏學中這應該是一部重要的論經無上依經的成立應該是參考了寶性論釋論的如來界等四品的組織與寶性論一致而內容卻有些出入如關於如來功德寶性論依寶女經説六十四種功德而無上依經説百八十功德瑜伽師地論説百四十功德顯揚聖教論説百九十六功德無上依經的功德增多有採用瑜伽學的傾向關於如來事業寶性論引用如來莊嚴智慧光明入一切佛境界經的九種譬喻著重在佛體的不生不滅而自然不休息常教化衆生事無上依經卻別立十八事就是依佛的百八十功德所起不同的種種佛事如來界品與菩提品二品不妨説是彼此大體相同的不過寶性論的如來藏包含了本性清淨的如來藏與煩惱所覆的九種譬喻而在無上依經中九種譬喻被刪略了無上依經的如來界品雖然部分與寶性論相同但沒有分門解説保持了契經的特性如來界是衆生位中本有的有垢真如菩提是佛位中修顯的離垢真如衆生本具的如來界寶性論卻以信法及般若三昧大悲等為因這四法能説是本有如來藏的因嗎無上依經解説為佛菩提的因似乎更妥貼些寶性論中如來界立十門菩提立八門無上依經的如來界品不立門包含了寶性論的部分意義菩提品立十門經與論的對比如下無上依經寶性論菩提十義如來藏十義菩提八義如來界義自性因緣惑障至果作事相攝行處常住不共不可思惟體因果業相應行時差別遍一切處不變無差別實體因果業相應行常不思議三大乘法界無差別論堅慧菩薩造唐提雲般若所譯這部論現有兩種本子一本分為十二段每段先偈頌再以長行解釋另一本偈頌總列在前為論體然後以長行解説雖然二本的體裁不同而內容一致都作提雲般若譯法界無差別論的內容是菩提心略説有十二種義所謂果故因故自性故異名故無差別故分位故無染故常恆故相應故不作義利故作義利故與傳為堅慧所造的寶性論本論非常接近大體的説上面所説的二論一經是屬於同一類的寶性論與無上依經説到了佛界佛菩提佛德佛業四大主題最為完備法界無差別論的十二義以菩提心為主題內容包含了寶性論的如來藏章及菩提章的果與自利無上依經在菩提品中分別十義內容包含了寶性論的如來藏章及菩提章的部分由於各部的著重點不同所以也不能完全吻合了第三節寶性論所依的經論寶性論的本論傳説是彌勒造釋論是無著造或説世親造而中國所傳本釋都是堅慧造的北涼道泰所譯的入大乘論也是堅意堅慧的異譯造的論中引密藏經中説如來法身住於一切衆生身中光影外現猶如淨綵裹摩尼珠無所障蔽也是如來藏説在傳説中寶性論是彌勒無著或世親造表示了與瑜伽學派的關係至少與大乘莊嚴經論有關大乘莊嚴經論的作者傳説為彌勒或説無著或説本頌是彌勒造世親造釋與寶性論的作者同樣的傳説紛紜從寶性論的內容來觀察寶性論與莊嚴論有些偈頌是一致的如寶性論如清淨真空得第一無我諸佛得淨體是名得大身莊嚴論清淨空無我佛説第一我諸佛我淨故故佛名大我寶性論如空遍一切而空無分別自性無垢心亦遍無分別莊嚴論如空遍一切佛亦一切遍虛空遍諸色諸佛遍衆生又如寶性論説大乘信為種子般若以為母禪胎大悲乳諸佛如實子莊嚴論約第一義發心説生勝由四義者一種子勝信大乘法為種子故二生母勝般若波羅蜜為生母故三胎藏勝大禪定樂為胎藏故四乳母勝大悲長養為乳母故雖文句不同意義是完全一致的在文句的類似以外還有論法的一致如寶性論以十義分別如來界前六義是一者體二者因三者果四者業五者相應六者行又説體等六句義略明法性體次第三時中説三種名字依論説時差別等後四義是依前六義所明的法性再作時差別等分別的這六義分別正是大乘莊嚴經論所用的論法如佛相有六種一體二因三果四業五相應六差別歸依差別有六種自性因果業相應品類神通分別自性修習就是因果業相應差別諸佛法界清淨有六法界性法界因法界果法界業法界相應法界位莊嚴論的分別論法與寶性論是大致相同的所説的法界清淨有六義無著所造的攝大乘論本也説諸佛法身復與所餘自性因果業相應轉功德相應再從法義來説寶性論立有垢真如無垢真如轉依三身實體身受樂身化身二障煩惱智所知障二種出世間無分別智無漏界等都與瑜伽學相合但瑜伽學特有的法義如五法三自性三無性八識四智寶性論都沒有引用這是有點難以理解的也許寶性論重於如來藏説重於佛德的説明而瑜伽學的發展著重於一切法相分別的緣故然寶性論的最大不同是不用瑜伽學的種子説所以也不立不般涅槃種性可以説寶性論造於瑜伽學風開展的時代受到了瑜伽學的影響但對如來藏的解説不取北方大乘經部師説的種子説而保持了南方分別部以空性為佛性的立場總之這是與瑜伽學有關而不是屬於瑜伽派的這樣關於寶性論的作者不可能是彌勒無著的中國所傳的入大乘論主堅慧曾引用彌勒的莊嚴經論據真諦説堅慧出於龍樹與世親之間依入大乘論堅慧引用了如來藏説及大乘莊嚴經論與寶性論相近所以寶性論的作者極可能就是堅慧寶性論立四章佛界佛菩提佛德佛業可見是以佛果為主題的佛菩提是佛的體性從如來常住大般涅槃而來的如來藏説重在般涅槃寶性論依菩提來説與瑜伽學相同菩提是佛的體性佛德是佛的德相佛業是佛的業用所以這是從佛的體相用或實德業三方面來闡明佛果這部分是依大乘經如華嚴大集經等而説的衆生所以能成佛由於一切衆生有如來藏如來藏與佛的關係如大寶積經勝鬘夫人會説如來成就過於恆沙具解脫智不思議法説名法身世尊如是法身不離煩惱名如來藏大法鼓經説一切衆生悉有佛性無量相好莊嚴照明諸煩惱藏覆如來性性不明淨若離一切煩惱雲覆如來之性淨如滿月若離一切諸煩惱藏彼如來性煩惱永盡相好照明施作佛事如來藏的種種譬喻説明如來或法身在煩惱中就是衆生如來藏衆生的如來藏如離卻煩惱就名為如來或法身從如來常住説到衆生本來如此説一切衆生有佛性佛界佛藏一切衆生有如來藏或如來界如來性肯定的説佛與衆生的體性是無二無別的只是在纏與出纏而已説明這一論題的就是佛界寶性論四章應這樣的去了解衆生因位如來在纏名如來藏佛界生佛不二實體菩提如來果位衆生出纏名為法身德相業用寶性論是依經而造的本論所依據的佛界的主題是依如來藏經的九種譬喻在內此外佛界十義中的因義見於大乘莊嚴經論果義出於大般涅槃經業義出於勝鬘經無差別義出於不增不減經這都是明顯而可見的佛德的六十四種功德依於大集經的寶女品佛業的九種譬喻出於如來莊嚴智慧光明入一切佛境界經佛菩提立八義實體因果業相應行常不思議釋論説行常不思議者謂三種佛法身無始世來作衆生利益常不休息不可思議行常不思議同明佛的三身所以與大乘莊嚴經論菩提品以性因果業相應位三身六義説明諸佛法界最清淨是完全一致的佛菩提八義與大乘莊嚴經論相同而大乘莊嚴經論的生勝由四義信般若禪定大悲及一切無別故名為如來藏偈都被編入佛界寶性論確定是參考了大乘莊嚴經論的釋論的引經更廣可以考見的有不增不減經勝鬘經如來藏經大般涅槃經大般若經金剛般若經華嚴經如來出現品佛華嚴入如來智德不思議境界經如來莊嚴智慧光明入一切佛境界經法華經大寶積經普明菩薩會六根聚經阿毗達磨大乘經大方等大集經陀羅尼自在王品瓔珞品在內海慧菩薩品寶女品虛空藏品寶髻品從所引契經可以了解寶性論不是狹義的如來藏論不但以如來藏説為主闡明生佛不二的不可思議的如來境界更廣引大乘經使之與其他大乘經説相貫通當然所引的經典極大多數是屬於後期大乘的寶性論的注釋者引陀羅尼自在王經成立七種金剛句義並引大集經其他各品在一般大乘經中對於大集經似乎是特別重視的第四節寶性論義的分別以寶性論為主的如來藏説曾受到瑜伽學派的影響但不是屬於瑜伽學的論中所表達的義理這裡略説重要的幾點一如來藏如來藏是這一學系的主題寶性論説是故説衆生常有如來藏説一切衆生皆有如來藏説是值得注意的字樣西元三世紀以來佛教界不斷的傳出了如來藏説的經典由於如來藏説與印度外道的神我説類似在初期大乘佛教界多少會發生疑問到底依佛法的什麼意義而説衆生有如來藏呢寶性論的佛界如來藏章可説就是為了解答這一問題如論卷三大正三一八二八上中説法身遍無差皆實有佛性是故説衆生常有如來藏一切衆生界不離諸佛智以彼淨無垢性體不二故依一切諸佛平等法性身知一切衆生皆有如來藏上引二偈依梵文本一切衆生界偈在前是本論偈法身遍無差在後是注釋偈也就是解説本論偈的論長行解説大正三一八二八中為有三種義是故如來説一切時一切衆生有如來藏何等為三一者如來法身遍在一切諸衆生身或本作衆生心識偈言法身遍故二者真如之體一切衆生無差別偈言無差故三者一切衆生皆悉實有真如佛性偈言皆實有佛性故此三句義自下論依如來藏修多羅我後時説應知一切衆生有如來藏是約三種意義説的三種是一法身是遍在一切衆生身心中的二真如是一切無差別的三佛性佛種性是衆生確實有的依據這三種意義所以可説一切衆生有如來藏這三種意義是依如來藏經的所以説依如來藏修多羅我後時説應知在論到如來藏的九種譬喻時論卷四大正三一八三八中説法身及真如如來性實體三種及一種五種喻示現法身真如如來性用九種譬喻來表示譬喻法身的有三喻佛蜂蜜糩內的堅實譬喻真如的有一喻糞內的真金譬喻佛種性的有五喻地中寶藏果樹芽弊衣內的金像貧女懷妊輪王泥模內的寶像依據如來藏經的九種譬喻解説為法身遍滿真如無別佛性實有依這三種意義説一切衆生有如來藏這是寶性論的如來藏説法身遍滿義法身是究竟圓滿的佛果大乘經中主要是華嚴經充分表達了佛身的遍滿沒有一處沒有法身的法身無所不在那麼衆生的身心中也不能説沒有佛身本論頌説一切衆生界不離諸佛智所以法身遍衆生就是佛智遍衆生如論卷四大正三一八三八下説於衆生界中無有一衆生離如來法身在法身外離於如來智在如來智外如種種色像不離虛空中是故偈言譬如諸色像不離於虛空如是衆生身不離諸佛智以如是義故説一切衆生皆有如來藏這一意義是從如來法身或佛智的遍滿無處不至而説衆生身心中有佛智的華嚴經寶王如來性起品所説如來智慧無處不至如來智慧無相智慧無礙智慧具足在於衆生身中如來智慧在其身內與佛無異正是這個意義衆生身中有如來法身智慧與佛無異所以可説衆生有如來藏了從佛而説到衆生在説明上有佛的智慧從外而入於衆生身中的意義如楞伽經説如來藏自性清淨轉三十二相入於一切衆生身中觀無量壽經説諸佛如來是法界身入一切衆生心想中如華嚴經如來出現品梵文也有隨入的意義這與修持觀想中觀佛從外而入於自己身心中進而觀自己身中有佛自身是佛也有一定的關係真如無差別義論本偈説以彼淨無垢性體不二故本性或譯自性清淨不二釋論解説為約無差別的真如説在九種譬喻處以真金來比喻如論卷四大正三一八三八下説以性不改變體本來清淨如真金不變故説真如喻一切諸衆生平等如來藏真如清淨法名為如來體依如是義故説一切衆生皆有如來藏清淨不二就是清淨而沒有改變本性是沒有垢穢與清淨的改變而只是如此如此的清淨所以用金性的不變作比喻後一偈漢譯有點重復不明顯這一偈的梵文是與大乘莊嚴經論所説一切無別故得如清淨故故説諸衆生名為如來藏完全相同本性無差別指心的本性清淨説本性清淨為什麼可稱為如來藏如來的或有來去行到達入的意義如來是真如的契入體得者也就是真如離雜染而達最清淨法界階段如來之所以為如來的清淨真如是一切無差別的與衆生如沒有任何差別只是衆生如為煩惱所覆障而已這樣衆生本性清淨而為煩惱所覆當然可以稱為如來藏了佛種性義種性是如來藏三義中重要的一義論本偈説依一切諸佛平等法性身依梵本是佛種性種性是印度的階級名詞如婆羅門種性剎帝利種性生在某一種性中在社會上就屬於這一種性所以種性有血統的意味如血統不同就不屬於這一種性了應用在佛法中佛是最高上的衆生可以成佛那衆生應有佛性佛種性是對佛果而説的在如來藏九種譬喻中後五喻是比喻佛種性的先説佛種性有二種一者如地藏二者如果樹這是通説然後約金像輪王鏡像三喻分別的説明如依種性而生起佛的三身以依自體性如來之性界諸衆生藏是故説言一切衆生有如來藏這意思是依如來界説一切衆生之如來藏所以論上説以是義故説如來性界因此明何義此中明性義以為因義如來性如來界的界是因的意義依如來界為因而有如來果所以種性約因説依如來界説論中並引阿毗達磨大乘經無始時來性界以説明種性引勝鬘經説依如來藏故證涅槃世尊若無如來藏者不得厭苦樂求涅槃這都是為了説明如來藏究竟如來法身不差別真如體相畢竟定佛種性體於一切時一切衆生身中皆無餘盡這樣雖説三義其實只是一事如來法身不差別真如畢竟定佛種性不就是如來藏的三義嗎所以三義只是一事不過説明不同從佛説到遍衆生中是法身遍滿義從衆生説到有佛性是佛種性義約衆生與佛平等説是真如無差別義雖有三義都是為了説明一切衆生有如來藏寶性論是以三義來説明如來藏的如説明如來藏自體論卷三大正三一八二八中説自性常不染如寶空淨水三種譬喻漢譯本所説缺略依梵本及藏文本顯然也是約三義説的如來法身的威神力能成就衆生如摩尼寶珠能隨衆生的意樂而成就真如不變異如虛空一樣如來種性對衆生而起慈悲柔和心與淨水的潤澤一樣雖有三種譬喻同樣的比喻了自性常不染本性清淨這就是如來藏自體不同的説明其實是相通的如四大章中説明如來藏的是界如來藏的九種譬喻漢譯本説諸佛者喻如來藏一直到摸像喻者如來藏相似梵文本都是如來界又如真如有雜垢及遠離諸垢就是佛界與佛菩提二章那麼佛界與如來藏都就是有垢真如了總之依寶性論所説法身遍入衆生真如清淨不二衆生有如來界種性是一體三義如來藏是依此而立名的如來藏本性清淨在煩惱所藏中還是本淨的本性淨而還在煩惱藏中所以説一切衆生有如來藏約衆生位説點出衆生位中的本清淨性最重要的是如來藏是成佛的因性二自性清淨心與如來藏有關的大乘經説到了自性清淨心如來藏説的特徵是在衆生煩惱覆藏中有本性清淨的如來本性清淨而為煩惱所覆與增一阿含心本清淨為客塵所染説有共同意義所以如來藏説的經典也就説到了自性清淨心自性清淨心是如來藏的別名但與如來藏不同在佛教的法義中有著悠久的淵源勝鬘經在説如來藏時這樣説自性清淨心難可了知彼心為煩惱染亦難了知所説的自性清淨心就是自性清淨如來藏不增不減經説我依此清淨真如法界為衆生故説為不可思議法自性清淨心所説的清淨真如法界就是法身衆生如來藏自性清淨心的別名寶性論中在説如來界時自性清淨心是如來藏別名在説如來菩提時也就是佛的自體如論卷四大正三一八四一中説向説佛法身自性清淨體清淨者略有二種何等為二一者自性清淨二者離垢清淨自性清淨者謂自性解脫無所捨離以彼自性清淨心體不捨一切客塵煩惱以彼本來不相應故離垢清淨者謂得解脫又彼解脫不離一切法如水不離諸塵垢等而言清淨以自性清淨心遠離客塵諸煩惱垢更無餘故自性清淨是如來藏衆生位離垢清淨是佛位其實佛也還是自性清淨因為心從來不與煩惱相應離煩惱得解脫也只是本來清淨所以自性清淨心在衆生位沒有減少成佛也沒有增多如説不減一法者不減煩惱不增一法者真如性中不增一法以不捨離清淨體故自性清淨心是心自性清淨的結合詞心是心意識的心自性也譯為本性如般若經中的本性空或簡稱性空就是有事物本原的意思如數論所立二十五諦與我相對的自性就是是展開萬化的本原佛法中別有意義為自有自成的一般也譯為自性般若法門所説的一切法無自性就是沒有般若經所立的自性空無性自性空鳩摩羅什譯為有法空與無法有法空自性與有法也就是説一切有部析假見實依相立法而説一切法有自性大毗婆沙論説如説自性我物自體相分本性應知亦爾依説一切有部自性與本性是看作同一意義的般若經與龍樹論依本性空而説無自性空是有對治自性意義的受説一切有部影響的大乘有宗無論是經與論都應用自性一詞也偶爾説自性清淨與雖被認為有共通的意義而説心本性清淨大都是用的自本性清淨心的清淨梵文主要是光明清淨的意思如阿含經巴利本作與般若經所説的心清淨寶性論中與煩惱相對的本性清淨心也應用這一術語如對不清淨而説清淨或説一切法清淨常用或般若經説一切法清淨也是用的還有是純淨極淨的意思大都用於體見清淨證得清淨離煩惱所顯的清淨本性清淨心心本性清淨是淵源於增一阿含經的為大衆部分別論者所宗説如來常住不變的如來藏説融合了心性本淨説而説自本性清淨心從阿含經以來心性清淨就與客塵煩惱對説含有主體本性與客性的關係煩惱是附屬的雖現起染污相卻不能改變心本性的清淨煩惱怎麼不能影響心而能保持心的清淨本性呢寶性論卷二引勝鬘經大正三一八二四下説世尊剎尼迦善心非煩惱所染剎尼迦不善心亦非煩惱所染煩惱不觸心心不觸煩惱云何不觸法而能得染心世尊然有煩惱有煩惱染心自性清淨心而有染者難可了知客塵煩惱與本性清淨的關係依勝鬘經所説多少可以了解一些在常識上我們的心或與煩惱相應似乎心也成為染污的大衆部説一切法唯有善性與不善性沒有第三性無記性寶性論也説法界中善心不善心俱更無第三心依世俗諦説心是剎那剎尼迦不住的生滅不住的善心與煩惱不相應當然不能使心成為染污的剎那不善心也不是煩惱所能染污的因為心不能觸煩惱煩惱也不能觸心為什麼不能觸合心與煩惱同時即生即滅不可能使同時俱起的有生有滅成染成淨增一阿含經説法法自生法法自滅法法相動法法自息定就是法法不相到法法不相知的道理這是在剎那生滅不住中體會出當下不動法法各住於自性這怎麼能染污心呢然而世俗諦中有煩惱有煩惱染心而成為不善有部稱為相應不善稱為不善心而心卻還是本性清淨的這實在難以了解上座部立無記心所以無所謂善惡的本性心與不善相應而成為不善心大衆部不立無記心所以雖有染污心的現象而心不失清淨的本性從不立無記本性與客性去理解才能正確理解如來藏説中的本性清淨心早期的如來藏説本性清淨心還不是所傳的第八淨識或第九識只是六識平常心識的本性不過習慣的稱迷妄的為六識而已勝鬘經以剎那心來表示本性清淨心如來藏禪傳來中國成為禪宗如六祖壇經説但能離相性體清淨為人本性念念不住念念時中於一切法上無住一念若住念念即住名繫縛於一切法上念念不住即無縛也以無住為本也是念念不住中見本性在妄心外別立真心怕不是如來藏學的正義三不空與種性勝鬘經立空如來藏不空如來藏如究竟一乘寶性論卷四引經大正三一八四上説勝鬘經言世尊有二種如來藏空智世尊空如來藏若離若脫若異一切煩惱藏世尊不空如來藏過於恆沙不離不脫不異不思議佛法寶性論繼承勝鬘經説依如來藏説般若等大乘經説空是正確的但還是不了義的如來藏是本性清淨心著重於客塵煩惱空對本性清淨心來説煩惱是客性外鑠的附屬的與心性清淨是本來別異而相離的生死中的衆生有煩惱有業與苦陰也就是有為法大法鼓經説空彼一切有為自性央掘魔羅經説離一切煩惱及諸天人陰是故説名空大般涅槃經説空者謂無二十五有及諸煩惱一切苦一切相一切有為行這都是説有為諸行是空不增不減經與勝鬘經以如來藏為自性清淨心所以只説煩惱空煩惱是造業受苦的根源依空如來藏説如來藏自性清淨心真如法界也可以説是空而其實是説離煩惱諸行煩惱諸行空而已諸行空而如來藏自性清淨心體是不空的如來藏有無量數的不思議佛功德法與如來藏相應不異而不可分離的如論説不空如來藏謂無上佛法不相捨離相不相離的無上佛法就是稱性功德這不但是有的而且是有作用的如論説若無佛性界者不得厭諸苦不求涅槃樂亦不欲不願見苦果樂果依此種性而有若無佛性者不起如是心見世間苦而想離苦見涅槃樂而想得涅槃厭苦求樂而發的希願欲求心是衆生離苦得樂捨凡成聖成佛的根本動力這種向光明喜樂自在的傾向就是如來藏稱性功德的業用如來藏三義中的種性義是如來藏的要義指如來藏相應的無數不思議佛功德法也就依此説一切衆生有佛性然如來藏在衆生身中不一定能發菩提心求成佛道問題在雖有厭苦求樂的動機但沒有遇到親近善知識不曾修習大乘信心所以或學二乘法或但求世間樂不過總是要依如來藏而成佛的寶性論引華嚴經乃至邪見聚等衆生身中皆有如來日輪光照就是説明這一意義這樣世間出世間出世間上上善法的根源都是如來藏不思議功德的業用是成佛的種性所以名為如來界界就是因義如來藏可以説是空但空是與煩惱等不相應而如來藏自體與如來藏相應的不思議功德法是決定不空的如來藏有空不空二義正是虛妄法空真實法不空的立場或者從緣起有與性空妙有與真空去解説顯然是不符合經論的本意如來藏有空與不空義而勝鬘經又説二種如來藏空智空與不空都稱為空智究竟一乘寶性論卷四解説大正三一八四上為如是以何等煩惱以何等處無如是如實見知名為空智又何等諸佛法何處具足有如是如實見知名不空智如是明離有無二邊如實知空相以離第一義空智門無分別境界不可得證不可得見是故聖者勝鬘經言世尊如來藏智名為空智空的知道是空的離增益的有邊不空的知道是不空的離損減的無邊也可以説客塵虛妄染本來自性空知道是本來空的所以不減一法不空如來藏謂無上佛法不相捨離相本來具足所以真如性中不增一法這樣空與不空的見知不增不減能遠離有無二邊離二邊的中道能如實知空相如來藏智也就名為空性智空性是無分別智境以空為無因空而顯的如來藏自體清淨名為空性與瑜伽者所説的相同依無分別智證第一義空性所以引摩訶般若經金剛般若經義根本智證第一義空性名為空性智會通了初期大乘的空相應經大般涅槃經一再説我者即是如來藏義一切衆生悉有佛性即是我義真我名曰佛性我性及佛性無二無差別我佛性如來藏是同一內容涅槃經初分所説的我除佛果常樂我淨的我以外著重在衆生位中的真我央掘魔羅經也一再説如來藏我這二部經與如來藏經所説的如來藏佛性富有神我的色采勝鬘經以如來藏為本性清淨心所以説佛果的常樂我淨不再説衆生位的如來藏我寶性論也是這樣只説果位的常樂我淨釋論引偈説如清淨真空得第一無我諸佛得淨體是名得大身解説大身是諸佛如來實我這一偈與大乘莊嚴經論偈相同也約佛果説雖然衆生位中仍有可以説我的意義但在文字表面上經中如來藏的自我色采大大的淡化了這是寶性論主與瑜伽學者的共同傾向四轉依從衆生生死到如來涅槃當時的佛教界提出了轉依一詞在漢譯寶性論中轉依是被譯為轉身轉或轉得的生死是雜染的涅槃是清淨的如兩不相干那不能説某人成佛得涅槃了本來從前生到後生從生死到解脫前後間有什麼關聯部派間早已考慮到有的提出不可説我勝義我的説明大般涅槃經説何者是我若法是實是真是常是主是依性不變易是名為我外道立我的意義也大致是這樣在寶性論等論中提出了轉依説依是依止是生死與涅槃的所依體依此從生死而轉化為涅槃就是轉依大寶積經卷一一九勝鬘夫人會大正一一六七七下説生死者依如來藏以如來藏故説前際不可了知世尊有如來藏故得有生死是名善説如來藏者常恆不壞是故世尊如來藏者與不離解脫智藏是依是持是為建立亦與外離不解脫智諸有為法依持建立依如來藏才能善説衆生有生死涅槃如來藏是生死與涅槃的依止從生死而轉為涅槃就是如來藏轉依轉生死依為涅槃依不增不減經説如來藏是一切諸法根本住持一切法攝一切法也就是為依止的意思生死依如來藏如寶性論卷三大正三一八三二下説地依於水住水復依於風風依於虛空空不依地等陰入界如地煩惱業如水不正念如風淨心界如空依性界起邪念念起煩惱業依因煩惱業能起陰入界依止於五陰界入等諸法有諸根生滅如世界成壞淨心如虛空無因復無緣及無和合義亦無生住滅如虛空淨心常明無轉變為虛妄分別客塵煩惱染生死是諸根的生起與敗壞淨心是如來藏異名邪念不正念不善思惟都是不如理作意的異譯推求生死的根源到達不如理作意不如理作意是依於淨心的這就是生死依如來藏而有但如來藏淨心卻是虛空那樣的無所依止也不受生死虛妄的影響維摩詰所説經説身以欲貪為本欲貪以虛妄為本虛妄分別以顛倒想為本顛倒想以無住為本無住則無本從無住本立一切法與依如來藏而有生死的意思相近一切不離於真如一切不出法界正如一切色不離虛空那樣但在如來藏學中如來藏不生不滅常住不變本來清淨與無邊佛法不相離更具有充實的內容為虛妄分別客塵煩惱染所以有生死如遠離虛妄分別出煩惱藏如虛空回復本來的明淨那就是菩提與涅槃轉依了論卷四大正三一八四一上説無垢如者於無漏法界中遠離一切種種諸垢轉雜穢身得淨妙身如來藏不離煩惱藏所纏以遠離諸煩惱轉身得清淨是名為轉依的實體寶性論所説離垢真如部分名菩提品漢譯作身轉清淨成菩提品全論分八義與大乘莊嚴經論菩提品的諸佛法界清淨六義是一致的轉依清淨的實體自性就是離垢清淨的如來藏如論説佛功德無垢常恆及不變佛身不捨離清淨真妙法如虛空日月智離染不二過恆沙佛法明淨諸功德非作法相應不離彼實體轉依的實體是不離一切明淨功德常恆不變非作法的説到轉身實體清淨有二清淨其中離垢清淨者謂得解脫又彼解脫不離一切法如水不離諸塵垢等而言清淨以自性清淨心遠離客塵諸煩惱垢更無餘故離垢清淨只是本來那樣的清淨約智能證得説説二種無分別智為因約離煩惱而得説説遠離二障為果其實只是智離染不二的實體寶性論卷四大正三一八四一中下説依彼果離垢清淨故説四偈無垢功德具顯現即彼體蜂王美味蜜堅實淨真金寶藏大果樹無垢真金像轉輪聖王身妙寶如來像如是等諸法即是如來身轉依所得的如來身舉如來藏經的九種譬喻這正説明了具一切功德的如來藏出煩惱藏就是如來法身寶性論所説的轉依菩提一切功德是本具的與瑜伽學者顯然採取了不同的觀點

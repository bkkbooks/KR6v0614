body:
  text: 第八章如來藏佛性之抉擇第一節楞伽經的如來藏說楞伽經共有三譯求那跋陀羅在宋元嘉年間約西元四四頃初譯名楞伽阿跋多羅寶經四卷在無著世親的論書裡還沒有引用這部經所以這部經的集成約在西元四世紀末一如來藏與我楞伽經與瑜伽學派有非常親密的關係如有些差別那就是會通如來藏說瑜伽學者約清淨真如無差別解說經中的如來藏楞伽經也這樣說但有更進一步的說明如來藏的本義如楞伽阿跋多羅寶經卷二大正一六四八九上中說世尊修多羅說如來藏自性清淨轉三十二相入於一切衆生身中如大價寶垢衣所纏如來之藏常住不變亦復如是而陰界入垢衣所纏貪欲恚癡不實妄想塵勞所污云何世尊同外道說我言有如來藏耶世尊外道亦說有常作者離於求那周遍不滅大慧我說如來藏不同外道所說之我大慧有時說空無相無願如實際法性法身涅槃如是等句說如來藏已如來應供等正覺為斷愚夫畏無我句故說離妄想無所有境界如來藏門開引計我諸外道故說如來藏令離不實我見妄想入三解脫門境界悕望疾得阿耨多羅三藐三菩提是故如來應供等正覺作如是說如來之藏為離外道見故當依無我如來之藏如來藏經等所說衆生身心中的如來藏是自性清淨的常住的這與外道所說的我有什麼差別外道所說的我不也是常住周遍不滅離於求那嗎離於求那魏譯本作不依諸緣自然而有所以我是作者不是依緣而有的這樣的我與如來藏不是相同嗎經上為什麼要說如來藏呢楞伽經解說為如來藏是如實際法性等異名是離妄想無所有境界經中常見的真如法界等為什麼又要稱為如來藏呢這是為了斷愚夫畏無我句開引計我諸外道的方便在生死流轉與解脫中外道都是主張有我的對生死說我是作者解脫我就離生死而常樂佛說無我是外道也是一般人所不容易信受的沒有我誰在作業誰在受報呢沒有我解脫不等於什麼都沒有嗎佛說的無我與涅槃是外道與一般愚夫的怖畏處不得已只好將真如說為如來藏說得近於外道的神我如信受如來藏說更進一步理解其內容就知道與神我不同實在是離妄想無所有的真如不起我見法見從三解脫門向佛道如來藏是誘化外道的方便所以是無我如來之藏楞伽經說與瑜伽學相近而說得更為分明無我如來之藏與大涅槃經的我者即是如來藏義方便是不相同的寶性論本頌說為了使衆生遠離五種過失第五過失是計身有神我所以說衆生有佛性也有為了誘化外道執我見而說有佛性如來藏別名的意義但釋論說以取虛妄過不知實功德是故不得生自他平等慈佛性論解說為由聞佛說佛性故知虛妄過失真實功德則於衆生中起大悲心無有彼此故除我執這是以自他平等的大我離虛妄的小我顯揚聖教論說當知此平等心性即是大我阿世耶及廣大阿世耶與寶性論釋同一意義這固然是本於真如無差別義但對應機說教斷愚夫畏無我句開引計我諸外道的教意楞伽經顯然更勝一著二如來藏與藏識如來藏為依止阿賴耶識為依止本為不同的二種思想系無著世親論中雖以真如解說如來藏也沒有與阿賴耶識聯合起來將二者聯合而說明其關係的是楞伽經如楞伽阿跋多羅寶經卷四大正一六五一二中說大慧善不善者謂八識何等為八謂如來藏名識藏心意意識及五識身八識是瑜伽學者的創說識藏就是藏識阿賴耶識約特殊的意義第八阿賴耶識名心第七識名意前六識名識經上說八識又說如來藏名識藏心這是將如來藏與阿賴耶合為第八識了魏譯本雖只說阿梨耶識而下文說阿梨耶識名如來藏也表示了如來藏名識藏的意義楞伽經以真如為如來藏與阿賴耶的含義當然是並不完全一致的但到底結合為第八識了如來藏與阿賴耶的合為第八識應該是依於心性本淨客塵煩惱所覆而來如楞伽阿跋多羅寶經卷四大正一六五一下說此如來藏識藏一切聲聞緣覺心想所見雖自性淨客塵所覆故猶見不淨我於此義以神力建立令勝鬘夫人及利智滿足諸菩薩等宣揚演說如來藏及識藏名與七識俱生令聲聞不計著見人法無我故勝鬘夫人承佛威神說如來境界非聲聞緣覺及外道境界如來藏識藏唯佛及餘利智依義菩薩智慧境界楞伽經是依勝鬘經而作進一步的說明勝鬘經有沒有說到阿賴耶識是另一問題而自性清淨如來藏而客塵煩惱上煩惱所染是不思議如來境界確是勝鬘經所說的依如來藏說為客塵煩惱所覆或所染依阿賴耶說是雜染種子或熏習所積集在楞伽經中這二者也統一起來原來阿賴耶藏是窟宅那樣的藏攝大乘論中玄奘譯義為攝藏執藏攝藏魏佛陀扇多譯作依陳譯作隱藏隋譯作依住玄奘所譯解深密經說亦名阿賴耶識何以故由此識於身攝受藏隱同安危義故攝受藏隱深密解脫經作以彼身中住著故阿賴耶有隱藏依住的意義如依住在窟宅中也就是隱藏在窟宅中所以楞伽經中顯現境界起七識等當然是阿賴耶識的作用而自性清淨為虛僞惡習所熏染生雜染的根本無明住地或作習地為如來藏而轉名為阿賴耶識的關鍵楞伽阿跋多羅寶經卷四大正一六五一中說如來之藏是善不善因能遍興造一切趣生外道不覺計著作者無始虛僞惡習所熏名為識藏生無明住地與七識俱如海浪身常生不斷離無常過離於我論自性無垢畢竟清淨魏譯本的文句小異如說上略諸外道等妄計我故不能如實見如來藏以諸外道無始世來虛妄執著種種戲論諸熏習故大慧阿梨耶識者名如來藏而與無明七識共俱如大海波常不斷絶身俱生故離無常過離於我過自性清淨依經所說稱為阿賴耶識是由於如來藏為無始虛僞惡習虛妄執著種種戲論所熏習所受的熏習瑜伽學名為遍計所執種子或說阿賴耶是過患之聚楞伽經雖採用種子熏習說而阿賴耶顯然就是自性清淨而為煩惱所覆染依大乘莊嚴經論來解說如來藏與阿賴耶識有同一義那是心真如是自性清淨的也有差別義阿賴耶識雖不離真如自性清淨卻是覆障真如的雜染過患煩惱熏習的總聚宋譯或譯阿賴耶識為覆彼真識深得楞伽的經意所以阿賴耶識一名是不清淨的如修到一切妄執不起斷盡無始以來的戲論熏習就轉捨阿賴耶識的名字唯是離垢清淨的如來藏了轉捨如來藏中藏識的名字如經上說宋譯修行者作解脫想不離不轉名如來藏識藏七識流轉不滅所以者何彼因攀緣諸識生故欲求勝進者當淨如來藏及識藏名大慧若無識藏名如來藏者則無生滅唐譯得解脫想而實未捨未轉如來藏中藏識之名若無藏識七識則滅何以故因彼及所緣而得生故欲得勝法應淨如來藏藏識之名大慧若無如來藏名藏識者則無生滅魏譯生解脫相以不轉滅虛妄相故大慧如來藏識不在阿梨耶識中是故七種識有生有滅如來藏識不生不滅何以故彼七種識依諸境界念觀而生欲證勝法如來藏阿梨耶識者應當修行令清淨故大慧若如來藏阿梨耶識名為無者離阿梨耶識無生無滅宋唐二譯文義相同魏譯的文句有點不同但魏譯說沒有阿賴耶識名如來藏不生不滅七識的生滅流轉也就滅而不起與宋唐譯還是一致的楞伽經說八識起初是以藏識心與轉識七識對論的如說譬如海水變種種波浪轉七識亦如是心俱和合生謂彼藏識處種種諸識轉藏識與七轉識的關係舉泥團與微塵為譬喻說明轉識可滅而不是藏識的自真相識滅但業相滅這顯然以真如為藏識的自真相所以說藏識不滅在宋譯第四卷中說如來藏名藏識以如來藏藏識與七識對論如說甚深如來藏而與七識俱所以轉捨阿賴耶識只是除去覆障真相的虛僞惡習所熏淨除阿賴耶識的名稱而已如來藏與阿賴耶識的統一可說是楞伽經的特色楞伽經所說的阿賴耶識特重心真如而有被解說為真心的可能如來藏為生死涅槃依勝鬘經明確提到了如來藏為一切法依如勝鬘師子吼一乘大方便方廣經大正一二二二二中說世尊有如來藏故說生死是名善說如來藏離有為相如來藏常住不變是故如來藏是依是持是建立世尊不離不斷不脫不異不思議佛法世尊斷脫異外有為法依持建立者是如來藏世尊若無如來藏者不得厭苦樂求涅槃何以故於此六識及心法智此七法剎那不住不種衆苦不得厭苦樂求涅槃在所引的經文中首先說有如來藏所以能有生死流轉這是善巧的說法其次成立兩類依止如來藏是常住不變異的無為法所以為不離不斷不脫不異的不思議佛法的依持也就依此而有佛涅槃同時為斷脫異外的有為法的依持也就是依此而有生死結論說如沒有如來藏生死流轉不能成立因為六識等七法是剎那不住的生滅法是不種受衆苦的沒有如來藏也不能厭生死苦發生對涅槃解脫的樂求如來藏為生死涅槃依表示出如來藏學的特色繼承勝鬘經融攝瑜伽學楞伽經作了進一步的說明勝鬘經沒有說到阿賴耶識楞伽經卻合如來藏與阿賴耶藏識為第八識勝鬘經說六識及心法智唐譯作六識及以所知所知古人每譯為智與應知的六識及心法智楞伽經是稱為意意識等七識的在八種識中為什麼如來藏名藏識可以為一切法依止而不是前七識呢楞伽阿跋多羅寶經卷四大正一六五一上中說大慧菩薩復白佛言世尊惟願世尊更為我說陰界入生滅彼無有我誰生誰滅愚夫者依於生滅不覺苦盡不識涅槃佛告大慧如來之藏是善不善因能遍興造一切趣生譬如伎兒變現諸趣離我我所為無始虛僞惡習所熏名為識藏生無明住地與七識俱如海浪身常生不斷離無常過離於我論自性無垢畢竟清淨上面說過為了外道的怖畏無我妄執有我所以說如來藏如來藏不是神我卻有神我的色采佛說諸法無我是一般人所不易信受的所以部派佛教中也有成立我的學派楞伽經中大慧菩薩代表了一般的心理請佛解說佛說生死流轉在生死流轉中的只是五陰六界六入處並沒有我在一般人看來如沒有我那誰在生誰在滅也就是誰在生死這是以無我為不能成立生死的還有如經說譬如破瓶不作瓶事亦如焦種不作芽事如是大慧若陰界入性已滅今滅當滅自心妄想見無因故彼無次第生滅被解說為什麼都沒有了那麼前一剎那滅第二剎那就無因而不可能生起了這是說生滅無常是不能成立生死流轉的如經說其餘諸識有生有滅意意識等念念有七七識不流轉不受苦樂與勝鬘經的此七法剎那不住不種衆苦說相合瑜伽學說剎那不住的有為生滅可以成立生死的流轉受苦樂的異熟所以以依他起自性阿賴耶識為所依但楞伽經雖肯認無我卻同意一般的觀點所以要在諸行生滅法外立常住不變不生不滅的如來藏藏識為依止這樣離無常過離於我論的如來藏為一切法依是最善巧的說法如來藏為生死依寶性論依陀羅尼自在王經這樣說地依於水住水復依於風風依於虛空空不依地等如是陰界六根住煩惱業中諸煩惱業等依不善思惟不善思惟行住清淨心中自性清淨心不住彼諸法如虛空淨心常明無轉變為虛妄分別客塵煩惱染依如來藏自性清淨心而有生死正如依虛空而有風水地一樣雖為風水地所依而虛空明淨常住不變楞伽經所說的如來藏為依也是這樣不過融合了瑜伽唯識說所以無始以來的惡習所熏與七識俱生生死相續流轉於五趣四生的依於名為阿賴耶藏識的如來藏如一切依於虛空那樣楞伽經說如來之藏是善不善因能遍興造一切五趣四生所說的因是為依為住為建立的意義依持建立不是種子生現行那樣是依止因如大種造色約生依立持養說依持建立就是這類的因能作因如來之藏是善不善因能遍興造一切趣生譬如伎兒變現諸趣近於外道的神我說這是開引計我外道的方便如來藏只是真如的異名如來藏是善不善因為生死依止決不是如來藏真如能生起善惡流轉生死只是善惡生死依如來藏而成立如雲霧依於虛空一樣雲霧依於虛空虛空自性還是那樣的明淨雖然似乎虛空晦昧而失去明淨其實是不見而不是虛空有任何變化所以經上接著說離無常過離於我論自性無垢畢竟清淨為了化導沒有常住法就不能成立生死流轉的凡夫見所以說如來藏為因為依如中國佛教所傳的楞嚴經及起信論所說真如熏無明無明熏真如等在印度後期大乘佛教中似乎沒有這樣的見解依如來而有涅槃也是為依為持為建立楞伽經融合瑜伽學所以立習氣如楞伽阿跋多羅寶經卷四大正一六五一二中說大慧剎那者名識藏如來藏意俱生識習氣剎那無漏習氣非剎那非凡愚所覺計著剎那論故不覺一切法剎那與非剎那以斷見壞無為法如來藏名藏識中生七識的習氣是剎那是有為生滅法另有無漏習氣是非剎那也就是不生滅的無為法這裡顯然與瑜伽學不同瑜伽學以為無漏習氣也是剎那生滅的所以佛果的四智菩提也還是有為生滅的楞伽經批評說若得無間有剎那者聖應非聖宋譯的得無間就是無間等為現觀或現證的異譯這是聖智的證得如智證而是剎那生滅那聖者也不成其為聖者了無漏智等功德楞伽經是無為不生滅的魏譯入楞伽經卷八大正一六五五九下說言剎尼迦者名之為空阿梨耶識名如來藏無共意轉識熏習故名之為空具足無漏熏習法故名為不空魏譯本略有差別楞伽經所說的剎尼迦剎那是與如來藏相離的所以是空的無漏習氣是非剎那不空的空是有為生滅的不空是無為不生滅的空與不空顯然是引用了勝鬘經說空如來藏若離若脫若異一切煩惱藏世尊不空如來藏過於恆沙不離不脫不異不思議佛法依於如來藏的煩惱等有為法是空的依於如來藏與如來藏不離不異的無量無邊的不思議佛法是不空的如來藏是真如的異名是一切法無差別性無漏功德不是從真如生的而是與真如不離不異的無漏習氣所顯的經修習離障而現起與真如相應而永不失壞的楞伽經依無漏習氣說而歸宗於如來藏學也就因此楞伽經與瑜伽學相同說五種種性立無種性無種性是一闡提人但捨一切善根的一闡提以如來神力故或時善根生所以為初治地而說種性差別其實都是可以成佛的第二節涅槃經續譯部分的佛性說曇無讖所譯的大般涅槃經初譯十卷與法顯所譯大般泥洹經是同本異譯以下的三十卷是曇無讖再到西域去訪求得來而再譯的續譯部分共八品現病品聖行品梵行品此下應有天行品指如雜華經說嬰兒行品以上明五行光明遍照高貴德王菩薩品明十德師子吼菩薩品迦葉菩薩品憍陳如品大般涅槃經的中心論題是如來常住不變涅槃有常樂我淨四德一切衆生悉有佛性大般涅槃是無量功德所成就常住不變而無盡的利益衆生如來也不是生在王宮在拘尸那入滅這是如來常住大涅槃中所有的示現涅槃經初分十卷明確的揭示了如來藏義如大般涅槃經說我者即是如來藏義一切衆生悉有佛性即是我義一切衆生悉有佛性以佛性故衆生身中即有十力三十二相八十種好佛性如是不可思議具三十二相八十種好亦不可思議如來藏就是我我就是佛性衆生身中具有如來的十力三十二相等功德與初期的如來藏說如來藏經央掘魔羅經法鼓經等主體是完全一致的這一富有神我色采的如來藏佛性說大乘佛教界有給以淨化的傾向如寶性論主約三義解說如來藏瑜伽學者以真如無差別義解說如來藏涅槃經的後三十卷也有獨到的解說淨化如來藏佛性所有的共同傾向就是淡化了衆生有真我的色采涅槃經後續的三十卷也不是同時集出的如現病品等五品師子吼菩薩品迦葉菩薩品在佛性的解說上也是對前說加以多少不同的解說在續出部分集出或譯出時對於初出部分也可能多少修正補充的如三德祕藏法顯譯本是沒有的迦葉菩薩的啓問法顯譯本也簡略得多大般涅槃經續譯部分思想極為博雜不是這裡所能充分討論的這裡只略論續譯部分是怎樣的解說一切衆生悉有佛性如來藏我佛性是異名而同一意義在後三十卷中值得我們注意的是不再提到如來藏一詞了師子吼菩薩品說五百梵志難佛說無我若無我者持戒者誰破戒者誰佛說我常宣說一切衆生悉有佛性佛性者豈非我耶梵志們聞說佛性即是我故即發阿耨多羅三藐三菩提心佛然後告訴他們佛性者實非我也為衆生故說名為我佛性如來藏無我而說之為我只是適應印度神教誘引計我外道的方便與楞伽經的見解一致迦葉菩薩品中佛說五陰無常無我外道弟子都心生恐怖不信受佛的教說但佛為諸大衆說有常樂我淨之法外道弟子們就捨外道而信佛了佛說常樂我淨自有如來涅槃不空的意義但說常樂我淨確有適應世俗神教的意趣如來藏佛性說總是說在衆生身相續中在衆生蘊界處中有如來藏具三十二相現在修正而給以新的解說如大般涅槃經卷二七大正一二五二四中說一切衆生定得阿耨多羅三藐三菩提故是故我說一切衆生悉有佛性一切衆生真實未有三十二相八十種好一切衆生悉有佛性不是說衆生現在身內有如來那樣的三十二相好若諸衆生身內有佛性者一切衆生應有佛身如我今也這樣衆生身中有如來藏具足三十二相是密意的方便說了無我而說有我依涅槃經續譯部分無疑是適應當時神教學的方便那麼如來常樂我淨的我真意何在呢如大般涅槃經說有大我故名大涅槃涅槃無我大自在故名為大我云何名為大自在耶有八自在則名為我如來法身無邊無礙不生不滅得八自在是名為我諸佛不復受二十五有故名出世以出世故名為我以是常故名之為我無我法中有真我依初二則說涅槃是無我的但如來常住大般涅槃得八種自在如經說所以名為大我我是自在的意義所以佛名大我表示了佛的大自在大涅槃是出離二十五有世間生死的所以說以出世故名為我說以是常故名之為我也是約出離無常生死而說的則所說無我法中有真我是迦葉菩薩品的讚偈讚歎的偈頌有文學意味在法義上是不能作為準量的續譯部分可分為四部分第一部分明五行十德的是現病品光明遍照高貴德王菩薩品這五品是以大乘空義來說明一切如梵行品明十一空內空外空內外空有為空無為空無始終空性空無所有空第一義空空空大空諸佛世尊從六波羅蜜三十七品十一空來至大涅槃經中也說到了如來常修十八空義如經上說涅槃之性實非有也諸佛世尊因世間故說言是有如是涅槃亦得名有而是涅槃實非是有諸佛如來隨世俗故說涅槃有隨世俗故說言諸佛有大涅槃若見佛性則不復見一切法有性以修如是空三昧故不見法有性以不見故則見佛性菩薩摩訶薩修大涅槃於一切法悉無所見若有見者不見佛性菩薩不但因見空三昧而見空也般若波羅蜜亦空如來亦空大般涅槃亦空是故菩薩見一切法皆悉是空衆生佛性亦復如是假衆緣故則便可見假衆緣故得成阿耨多羅三藐三菩提若待衆緣然後成者即是無性以無性故能得阿耨多羅三藐三菩提一切諸法本性自空依緣而有是無自性的空的不只是雜染生死法般若如來大般涅槃也是空的一切空所以無上菩提與大般涅槃都是隨俗的假名安立一切本性空不是什麼都沒有這是一切如實相所以大般涅槃可說有常樂我淨依此來說佛性不外乎依空性如而說的如大般涅槃經卷一四大正一二四四五中下四四七下說佛性無生無滅無去無來非過去非未來非現在非因所作非無因作非作非作者非相非無相非有名非無名非名非色非長非短非陰界入之所攝持是故名常佛性無為是故為常虛空者即是佛性虛空非生非出非作非造非有為法如來亦爾如如來性佛性亦爾佛性是虛空那樣的是無為非有為法常住非變異法經說菩薩知佛性六義常淨實善當見真佛性的定義與空性相同若見佛性則不復見一切法性正是般若體證的絶無戲論的空性經上說佛性者即是如來佛性義者名為阿耨多羅三藐三菩提其實佛亦不說佛如來及佛性涅槃無差別相惟說常恆不變無差別耳約空真如性常住無差別義所以說佛性即如來佛性即無上菩提說空性為佛性當然是一切衆生悉有佛性但說衆生有佛性決不是瓶中有物那樣芽中有樹那樣佛性亦復如是無有住處以善方便故得可見所以一闡提人不斷佛性也可說一闡提中無有佛性第二部分是師子吼菩薩品共六卷以佛性及涅槃為主題而豫以充分的論究上面五品所說的若見佛性則不見一切法性說常樂我淨而不說不空泛說生死涅槃一切法性空是深受般若經影響的師子吼菩薩品又回到了初分空與不空的立場但是依十二因緣十二支緣起中道第一義空勝義空而展開佛性的論究無疑的受到了龍樹中論的影響當然這是引用論師說以莊嚴自己思想不必與中論一致的師子吼菩薩品首先提出了什麼是佛性為什麼名為佛性為什麼又名為常樂我淨為什麼有的不見有的不了了見有的了了見佛性對前二問題的主要解答如大般涅槃經卷二七大正一二五二三中五二四中說善男子佛性者名第一義空第一義空名為智慧所言空者不見空與不空智者見空及與不空常與無常苦之與樂我與無我空者一切生死不空者謂大涅槃乃至無我者即是生死我者謂大涅槃見一切空不見不空不名中道乃至見一切無我不見我者不名中道中道者名為佛性以是義故佛性常恆無有變易無明覆故令諸衆生不能得見聲聞緣覺見一切空不見不空乃至見一切無我不見於我以是義故不得第一義空不得第一義空故不行中道無中道故不見佛性上答第一問善男子佛性者即是一切諸佛阿耨多羅三藐三菩提中道種子無常無斷乃名中道無常無斷即是觀照十二因緣智如是觀智是名佛性善男子是觀十二因緣智慧即是阿耨多羅三藐三菩提種子以是義故十二因緣名為佛性善男子譬如胡瓜名為熱病何以故能為熱病作因緣故十二因緣亦復如是善男子佛性者有因有因因有果有果果有因者即十二因緣因因者即是智慧有果者即是阿耨多羅三藐三菩提果果者即是無上大般涅槃十二因緣不出生不滅不常不斷非一非二不來不去非因非果善男子是因非果如佛性是果非因如大涅槃是因是果如十二因緣所生之法非因非果名為佛性佛性非因果故常恆無變以是義故我經中說十二因緣其義甚深是故我於諸經中說若有人見十二緣者即是見法見法者即是見佛佛者即是佛性何以故一切諸佛以此為性善男子觀十二緣智凡有四種上上智觀者見了了故得阿耨多羅三藐三菩提道以是義故十二因緣名為佛性佛性者即第一義空第一義空名為中道中道者即名為佛佛者名為涅槃以上答第二問佛性是什麼佛性者名第一義空第一義空名為智慧第一義空出於雜阿含經也見於本經的梵行品經上說眼等六處生無所從來滅去也無所至有業報而沒有作者依世俗施設十二因緣是此有故彼有此生故彼生此無故彼無此滅故彼滅也就是因緣的集與滅生死與涅槃這就是阿含經所說的緣起中道所以本經所說的第一義空是十二因緣勝義空大智度論說般若波羅蜜分為二分成就者名為菩提未成就者名為空十八空即是智慧要知道十一空或十八空是觀法本性空空觀或空三昧在觀行中觀因緣等本性空到了現見證空性空觀就成為般若智慧所以說第一義空名為智慧實相般若經上接著說所言空者不見空與不空智者見空及與不空這是解說上文所言說的第一義空與智慧這兩句似乎是很費解的依上文來說第一義空的空梵語是空性空性是絶無戲論的無諍論處不但不空不可得空也不可得所以說菩薩行不可得空空亦不可得說到體見空性的智慧般若經就傳有二說一於一切法都無所見二無所見而無所不見本經與第二說相合十二因緣第一義空在離一切戲論執著的體見中見緣起生死邊的空無常苦無我也見緣滅涅槃邊的不空常樂我所以說智者見空及與不空空者一切生死不空者大般涅槃這是智慧所見的緣起中道中道名為佛性二乘見空無常苦無我不見不空常樂我見一邊而不行中道也就不能見佛性了為什麼名為佛性佛性是阿耨多羅三藐三菩提的種子種子是比喻因緣與瑜伽學者的種子說不同依此而能成佛所以名為佛性與佛種性的意義相近觀十二因緣智慧即是阿耨多羅三藐三菩提種子可見這是以第一義空智為佛性的第一義空智依十二因緣的觀照而來所以又說十二因緣名為佛性到這裡可以稱為佛性的有三一十二因緣二十二因緣空中道三觀十二因緣智十二因緣被名為佛性是因中說果經舉胡瓜名為熱病來喻說十二因緣為佛性所依也就名為佛性了到了這裡經上舉出了佛性的因果說如十二因緣因觀十二因緣智慧因因佛性十二因緣不生不滅不常不斷非一非二不來不去非因非果阿耨多羅三藐三菩提果大般涅槃果果佛性這一名詞雖然通於三事但從上列的分解中可見佛性是十二因緣不出生不滅不常不斷非一非二不來不去就是中論所說的八不緣起也就是本經所說的佛性者即第一義空第一義空名為中道古人稱之為正因佛性依上表所列十二因緣是佛性所依因因中說果所以名為佛性觀十二因緣智是依十二因緣能證見因緣八不的了因名為佛性其實是佛性的因因佛性是成佛的種性又體性所以佛性的果是無上菩提依無上菩提的覺證得離障的涅槃寂滅所以涅槃是佛性的果果而十二因緣八不中道第一義空性是非因非果的常恆不變的這才是佛性的真實義第一義空為佛性與瑜伽學以一切法空性為如來藏大意相近不過本經重在第一義空的中道接著有四句分別是因非果如佛性應該是觀十二因緣智慧因因是果非因如大涅槃果果是因是果如十二因緣所生法就是十二緣所生法非因非果名為佛性即八不因緣中道在四句分別中是因非果如佛性非因非果也名為佛性在文句上未免不夠善巧嘉祥中論疏說羅睺羅跋陀羅法師是龍樹同時人釋八不乃作常樂我淨四德明之止觀輔行傳弘決與三論玄疏文義要都說羅睺羅跋陀羅法師作中論注梁真諦曾譯出中論一卷嘉祥等傳說大抵由此而來羅睺羅法師以常樂我淨釋八不與師子吼菩薩品的思想應該是很接近的中論的八不中道依阿含經的緣起中道而來師子吼菩薩品依第一義空而展開空不空的中道說可說是龍樹一切皆空的中道說進入後期大乘的一般傾向師子吼菩薩品說也還是源於阿含經的所以說我經中說十二因緣其義甚深十二因緣義甚深是阿含經多處所說到的本經又說我於諸經中說見十二因緣者即是見法見法者即見佛佛者即是佛性何以故一切諸佛以此為性所引的經說是中阿含的象跡喻經然上座部所傳只說見緣起便見法若見法便見因緣沒有說見法即見佛大乘經所引都有見法即見佛一句可能源出大衆部所傳的本經依此而加以解說佛者即是佛性因為佛是依此十二因緣空中道為體性的這樣以十二因緣空中道為佛性是源本於阿含經龍樹學演進而來的依上來所說佛性可以有二種意義一是無上菩提的種子因性二是佛的體性所以佛性的原語極可能是可以譯為佛界佛性界的意義很多有因義也有體性義依據這一佛性的含義所以除了說到過的十二因緣觀十二因緣智慧八不因緣中道第一義空以外又說到一乘首楞嚴三昧十力四無所畏大悲三念處我大慈大悲大喜大捨大信心一子地第四力十二因緣四無礙智頂三昧這一切都名為佛性這些被名為佛性的有的是佛的果德是佛的體性有的是菩薩行菩薩地是佛的因性菩薩行與佛功德衆生是沒有的但一切衆生必定當得約未來當有說一切衆生悉有佛性惟有十二因緣本經用緣起因緣無為說所以十二因緣常佛性亦爾佛性者名十二因緣何以故以因緣故如來常住名為佛性的十二因緣常住不變這與未來必定當得的不同所以說一切衆生定有如是十二因緣是故說言一切衆生悉有佛性這樣約十二因緣說佛性是衆生定有的約菩薩行佛功德說佛性是衆生當有的約第一義空中道說佛性是一切衆生同共有之的但與世俗所想像的不同所以經中破因中有性因中無性經上說衆生佛性不破不壞不牽不捉不繫不縛如衆生中所有虛空佛性云何為有一切衆生悉皆有故云何為無從善方便而得見故云何非有非無虛空性故佛性者非陰界入非離陰界入非本無今有非已有還無從善因緣衆生得見佛性者非內非外雖非內外然非失壞故名衆生悉有佛性以正因故故令衆生得阿耨多羅三藐三菩提何等正因所謂佛性衆生佛性不一不二諸佛平等佛性猶如虛空一切衆生同共有之正因佛性是一切衆生所同有的當然可說悉有但佛性如虛空不一不異非內非外常住而非三世所攝的所以可說有也可說無可說非有非無的一切衆生同有正因佛性然對於成佛大般涅槃經卷三二大正一二五五五中下說善男子汝言衆生悉有佛性應得阿耨多羅三藐三菩提如磁石者善哉善哉以有佛性因緣力故得阿耨多羅三藐三菩提若言不須修聖道者是義不然善男子衆生佛性亦復如是不能吸得阿耨多羅三藐三菩提中道第一義空正因佛性雖然可說一切衆生所同有的也由於佛性衆生都可以成佛但成佛還要修行聖道因為因緣第一義空性常住不變並不能吸引衆生去成就佛道否則一切衆生同有佛性有佛無佛法性常住一切衆生都早該成佛了總之師子吼菩薩品所說佛性菩薩行與佛功德是當有的正因佛性是當見的悉有的與勝鬘經所說如來藏能使衆生厭苦而求涅槃說不同從第一義空性也就是無性的見地對一般所說衆生本有如來藏我佛性說給以批判的修正天臺學者依涅槃經立三因佛性正因佛性了因佛性緣因佛性也許比涅槃經說得更好如依涅槃經本文所說略有些不同師子吼菩薩品中一再的說到不同的二因或是生因與了因或是正因與緣因或是正因與了因如綜合起來有生因了因正因緣因四名不同經上說佛性是常可見了因非作與生義同因正道能為一切衆生佛性而作了因不作生因猶如明燈照了於物緣因者即是了因正因佛性是十住菩薩與佛所能證見的但要從緣顯了正因佛性是常住的所以不是生因所生而是了因所了的從緣顯了所以緣因者即是了因正道是八支正道部派中有道支無為說本經也說無漏聖道是平等無二無有方處此彼之異梵行品也說道與菩提及以涅槃悉名為常聖道是常所以是佛性的了因約佛的因性說佛性有正因與了因了因就是緣因如約佛的體性說所說就不同了經上曾有一問答若佛與佛性無差別者一切衆生何用修道佛言善男子如汝所問是義不然佛與佛性雖無差別然諸衆生悉未具足這是說約第一義空中道說佛與佛性是無二無別的然佛性是衆生成佛的正因比起圓滿究竟的佛得阿耨多羅三藐三菩提到底不可同日而語要有了因與生因如大般涅槃經卷二八大正一二五三上說復有生因謂六波羅蜜阿耨多羅三藐三菩提復有了因謂佛性阿耨多羅三藐三菩提復有了因謂六波羅蜜佛性復有生因謂首楞嚴三昧阿耨多羅三藐三菩提復有了因謂八正道阿耨多羅三藐三菩提復有生因所謂信心六波羅蜜阿耨多羅三藐三菩提是佛果是中道第一義空而為無量無邊功德所成就的所以修六波羅蜜首楞嚴三昧對於阿耨多羅三藐三菩提是生因佛性與八正道是常住的所以對阿耨多羅三藐三菩提是了因而不是生因正因佛性是常住的不是生因所生的所以修六波羅蜜觀智在內顯了佛性只能說是了因信心對於六波羅蜜當然是生因了依此可見師子吼菩薩品的智果阿耨多羅三藐三菩提不但是了因所了也是生因所生經文所說的沒有天臺學者所說的那麼圓妙第三部分是迦葉菩薩品共六卷對衆生有佛性如貧家寶藏力士額珠等比喻凡涅槃經上來所曾說過的幾乎都作了新的解說解說的方針是如來應機而不定說法又舉隨他意語隨自他意語如來隨自意語以會通佛性的不同解說在會通的解說中著重於因緣說表現出本品的特色佛性有佛的因性佛的體性二義如來的佛性如經上說如來十力四無所畏大慈大悲三念處首楞嚴等八萬億諸三昧門三十二相八十種好五智印等如是等法是佛佛性善男子如來已得阿耨多羅三藐三菩提所有佛性一切佛法常無變易以是義故無有三世猶如虛空善男子虛空無故非內非外佛性常故非內非外故說佛性猶如虛空善男子如世間中無罣礙處名為虛空如來得阿耨多羅三藐三菩提已於一切佛法無有罣礙故言佛性猶如虛空佛性是佛的體性含攝了一切如來功德在佛位中佛性常故非三世攝到了究竟圓滿不再有任何變易也就沒有過去現在未來可說在佛果以前後身菩薩十住等佛性與佛的佛性差別是這樣的佛常樂我淨真實善了了見十住常淨真實善少分見九住常淨真實善可見六至八住淨真實善可見初至五住淨真實善不善可見論到衆生佛性大般涅槃經卷三七大正一二五八一上說非佛性者所謂一切牆壁瓦石無情之物離如是等無情之物是名佛性佛性與衆生有不可離的關係惟有衆生才能趣向顯了成就佛性雖然衆生並不等於佛性而可以這樣說衆生即佛性佛性即衆生直以時異有淨不淨師子吼菩薩品所說衆生佛性正因者謂諸衆生也是這個意思衆生佛性的淨不淨與不增不減經所說法身在煩惱中名為衆生修菩提行名為菩薩離障究竟清淨名為如來有相近的意義寶性論也約如來界如來性說不淨淨不淨淨三位衆生佛性本品提出的中道說也就是可以說有說無說亦有亦無非有非無的如經說衆生佛性非有非無所以者何佛性雖有非如虛空佛性雖無不同兔角是故佛性非有非無亦有亦無云何名有一切衆生悉有是諸衆生不斷不滅猶如燈焰乃至得阿耨多羅三藐三菩提是故名有云何名無一切衆生現在未有一切佛法常樂我淨是故名無有無合故即是中道是故佛說衆生佛性非有非無是故如來於是經中說如是言一切衆生定有佛性是名為著若無佛性是名虛妄智者應說衆生佛性亦有亦無善男子若有人言一切衆生定有佛性常樂我淨不作不生煩惱因緣故不可見當知是人謗佛法僧若有說言一切衆生都無佛性猶如兔角從方便生本無今有已有還無當知是人謗佛法僧若有說言衆生佛性非有如虛空非無如兔角是故得言亦有亦無有故破兔角無故破虛空如是說者不謗三寶衆生定有佛性如一般所說的一切衆生有如來藏如佛那樣的具足智慧莊嚴是本品所不能同意的但也可以說衆生有佛性如經上說我常宣說一切衆生悉有佛性是名隨自意說一切衆生不斷不滅乃至得阿耨多羅三藐三菩提是名隨自意說云何名有佛性一切悉有是諸衆生不斷不滅猶如燈焰乃至得阿耨多羅三藐三菩提是故名有一切無明煩惱等結悉是佛性何以故佛性因故從無明行及諸煩惱得善五陰是名佛性從善五陰乃至獲得阿耨多羅三藐三菩提一切衆生悉有佛性不是衆生身中有了什麼如無漏種子稱性功德等等而是從衆生無始以來因緣不斷不滅的延續去了解即使是煩惱煩惱也能感得人天善報善五陰依善五陰可以親近善友聽聞正法一直到圓滿佛性衆生在十二因緣河中生死流轉始終是不斷不滅的相似相續猶如燈焰前後有不即不離不一不異的關係沒有無明行等就沒有生死衆生沒有衆生就沒有佛沒有生死又那裡有涅槃所以不但是善法煩惱等也是佛性是佛性所因依的依據這一見地大般涅槃經卷三六大正一二五七九中五八下說如是微妙大涅槃中從一闡提上至諸佛雖有異名然亦不離於佛性水善男子是七衆生若善法若不善法若方便道若解脫道若次第道若因若果悉是佛性是名如來隨自意語未得阿耨多羅三藐三菩提時一切善不善無記盡名佛性涅槃經續譯部分對如來常住常樂我淨一切衆生悉有佛性等根本論題都給以善巧的解說前五品多用般若經意師子吼菩薩品參考了中論的八不說迦葉菩薩品依因緣說衆生有如來藏的本有論到這裡淡化得簡直不見了反而明白的指責若有人言一切衆生定有佛性常樂我淨不作不生煩惱因緣故不可見當知是人謗佛法僧古人說涅槃經扶律談常扶律與聲聞律制有關涅槃經也廣引經說主要是阿含經而給以獨到的解說續譯部分多用說一切有部的名相尤其是迦葉菩薩品三世有義也引用了這是涅槃學者所不大注意的如來藏說勝鬘經等與心性本淨自性清淨心合流終於與阿賴耶識相結合涅槃經的佛性說重視阿含經的因緣說參用般若中論等思想來解說所以與傾向唯心的如來藏說在思想上踏著不同的途徑而前進涅槃經不說生死即涅槃煩惱即菩提也不說一法具一切法一行具一切行大概宣說如來常住久已成佛所以天臺學看作與法華經同為圓教圓機對教無教不圓具有圓融手眼的作家要說這部經是圓教那當然就是圓教了中文索引一畫一子地一切大衆所問品一切世間現一切世間樂見一切世間樂見上大精進一切有情樂見童子一切法本來清淨一切法空一切法無自性一切法趣空一切智一切智智一切種智一心一心相續論者一心論一究竟涅槃一依一味蘊一性一法界一界一乘一乘法一涅槃一能變一說部一諦一歸依一類經為量者一闡提一覺論者二畫七種金剛句九種譬喻九識了因了因佛性二十五有二十卷泥洹經二種出世間無分別智二障二乘二智二萬二千頌般若經二諦人我執人空真如人種入大乘論入中論入法界品入法界體性經入涅槃入無分別陀羅尼經入楞伽經八十種好八千頌般若經八不八不中道八不緣起因緣八正道八自在八萬四千法門八衆偈八聖道八解八種陀羅尼八識十一空十七地論十二因緣十二緣起十二緣智十力十八空十八空論十六心十四置難十四無記十地十地品經十地經論十行十住十住經十波羅蜜十信十回向十善十無盡藏十萬頌般若十解十種散亂分別十德三畫三十七道品三十二相三不善根三因三因佛性三自性三身三佛性三念三念處三法印三法度論三持三乘三時教三曼陀跋陀羅菩薩經三無性三無性論三善根三解脫門三種人三種施設三種能變三種假三增上學三德三德祕藏三論玄疏文義要三彌底部三寶三寶性三寶性論三歸依三藏上座部于闐凡夫依大心大方廣如來藏經大方廣佛華嚴經大方廣菩薩十地經大方廣寶篋經大方等大集經大方等如來藏經大方等無想經大日經疏大身大我大我阿世耶大我意樂大事大明度經大法鼓經大空大信心大哀經大品般若經大淨法門經大毗婆沙論大迦葉大乘大乘入楞伽經大乘入諸佛境界光明莊嚴經大乘成業論大乘法界無差別論大乘阿毗達磨集論大乘莊嚴經論大乘起信論大乘唯識論大乘密嚴經大乘最上祕論大乘最上祕論寶性分別大乘寶積經論大涅槃大般泥洹經大般涅槃大般涅槃經大般涅槃經記大般若波羅蜜多經大般若經初分大捨大喜大悲大智度論大衆部大集經大雲無想經大雲經大慈大慈大悲大精進龍王大菩提大菩提持大慧大摩尼寶喻大寶積經小品般若波羅蜜經四畫不可說不可說我不如理作意不定種性不念不空不空如來藏不空空不淨處真金不思議我不思議界不差別真如不般涅槃不般涅槃法種性不異如性不虛妄性不退菩提法輪不退菩薩不退轉法輪不增不減經不壞中村瑞龍中阿含經中部中道中道第一義空中論中論注中論疏中邊分別論中觀中觀見五分法身五行五取蘊五受陰五性各別五法五法藏五智印五種所知海岸五種爾焰五種種性五蓋五藏五蘊內外空內我內典録內空六位轉依六卷泥洹經六念六波羅蜜六界六根聚經六處六
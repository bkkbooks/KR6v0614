自性是各種譯本所一致的在土金藏譬喻中玄奘所譯的此識陳譯作本識指阿梨耶識以阿梨耶識來解說界藏至少是可以這樣說的那麼虛妄分別的種子識在衆生位雖現起雜染生死而不見清淨真實而種子識的本性是有清淨真實分的真諦的別立解性梨耶不正是說明這通二分的意義嗎解性梨耶是解說如來藏的應該是解脫性也就是心真如性合於無著世親的論義如解說為知解勝解性那就與無著世親義不合近於起信論的本覺了至於所說的本識清淨分是清淨依他起指無漏有為功德說三如來藏我攝大乘論釋卷六大正三一一九一下說由是法自性本來清淨此清淨名如如於一切衆生平等有以是通相故由此法是有故說一切法名如來藏如如或譯真如是一切法的通相共相本性清淨一切衆生平等不二所以說一切法名如來藏依真如無差別說如來藏是世親釋三種譯本所一致的真諦又採用了寶性論的如來藏說如佛性論顯體分如來藏有三藏義結合瑜伽學而多少與寶性論不同但無變異品中說此九譬為三初三譬法身次一譬如如後五譬佛性佛種性所說如來藏九喻譬喻法身真如種性與寶性論相同陳譯攝大乘論釋卷一大正三一一五六下一五七上說界以解為性此界有五義阿梨耶識界以解為性此界有五義是依勝鬘經而解說的勝鬘經的五藏寶性論也引用了但寶性論梵本僅如來藏出世間藏自性清淨藏三名漢譯本作如來藏者是法界藏出世間法身藏出世間上上藏自性清淨法身藏自性清淨如來藏陳譯所引用的五藏與勝鬘經相合真諦譯三次引用了五藏義一攝大乘論釋卷一引來解說一切法依止的界二攝大乘論釋卷一五引五義來解說法身含法界五義三佛性論卷二引五義來解說如來藏自體的如意功德性三說大致相同也有多少差別大意是如來藏藏是體類自性義一切法以無二我為性如性一切衆生不出於真如無差別性法界藏藏是因義一切聖人的無漏法都緣法界而生起法身藏藏是生義一切聖人所得的法身由於信樂界性而得成就攝論釋卷一五解說為由於虛妄法所隱覆所以凡夫二乘都不見法身這是藏義與如來藏三藏中的隱覆藏相同佛性論所說又不同也是約佛法身說的但說佛性的成就佛果所以說至得是其藏義法身藏的解說是五義中最不一致的出世間藏藏是真實義出世間法不像世間有為法那樣的可以破壞可以滅盡這正是說出世部世間法虛妄出世法真實的見解自性清淨藏藏是藏甚深祕密義如與如來界相應的自性成為善淨的如與界不相應名為外自性成為不善淨的煩惱㲉自性清淨是甚深祕密而難以了知的真諦所說的如來藏是隨順寶性論說的但瑜伽學本義是以真如解說如來藏的在陳譯攝大乘論釋中也還保留這一定義寶性論與瑜伽學沒有說衆生身中的如來藏就是我真諦學也是這樣如來法身中有我德我是離外道的神我執也不著聲聞的無我一切法無我性如離二障而證法身時名為大我這是無我之我佛性論所說與寶性論等相同四轉依轉凡夫為聖人轉雜染為清淨轉生死為涅槃轉煩惱為菩提是修學佛法的目的假使只是捨去這部分得到那部分就不能說明從凡入聖之間的關聯性所以提出了轉依一詞在生死還滅的轉化中有統一的依止依止的雜染分成為清淨分瑜伽學立阿賴耶識為一切法的所依如來藏學立如來藏為所依止都是為了轉依這是後期大乘的共同傾向但以阿賴耶異熟種子識為依重於雜染的轉雜染熏習為清淨熏習轉化中本來清淨的真如的體現說明上是難得圓滿的以如來藏為依重於清淨本有的依此而能起雜染也是難得說明圓滿的攝大乘論與攝決擇分提出了依他起通二分說在依他起通二分中真諦依阿賴耶種子界及心真如界為依止不違反瑜伽學的定義總攝種子與真如二依止於同一識界實為一極有意義的解說轉依論書所說的各有著重點成唯識論綜合而分別為四種一能轉道二所轉依有染淨依與迷悟依二類三所轉捨四所轉得又有所顯得的大般涅槃所生得的大菩提成唯識論所說極為完備但對攝大乘論依他起通二分的轉依說不免忽略了轉依這一術語可能是瑜伽學者所安立的起初轉依是轉生死為涅槃阿羅漢與如來的究竟體證因為瑜伽師地論本地分是普為三乘的所說的大乘菩薩地沒有如來藏經典的色采說到轉依如瑜伽師地論卷五大正三五七七中下說與一切依不相應違背一切煩惱諸苦流轉生起轉依所顯真無漏界由此清淨真如所顯一向無垢是名無損惱寂滅論說無餘依涅槃界是轉依所顯清淨真如所顯所以無餘依涅槃界唯餘清淨無為離垢真法界在瑜伽師地論攝決擇分中說得更為明顯如論卷八大正三七四七下七四八上說阿羅漢實有轉依體而此轉依與其六處異不異性俱不可說何以故由此轉依真如清淨所顯真如種性真如種子真如集成而彼真如與其六處異不異性俱不可說世尊依此轉依體性密意說言遍計自性中由有執無執二種習氣故成雜染清淨是即有漏界是即無漏界是即為轉依清淨無有上無餘依涅槃是三乘所共的轉依與六處是不能說異不能說不異的因為轉依是清淨真如所顯的真如與六處不能說異不異所以轉依與六處也不能說異不異了偈頌所說與攝大乘論說相同於依他起自性而有所執成遍計所執種子雜染習氣依雜染習氣而生依他起雜染分立為遍計所執自性如於依他起而不起執著成清淨習氣起無漏功德能顯真如離垢清淨立為圓成實自性阿賴耶為雜染種子依是有漏界離垢真如法界為清淨種子依就是無漏界偈頌所說轉依似乎是轉雜染種子依為清淨種子依而佛意在以真如離垢清淨為轉依體轉依是常是有是樂無戲論相善清淨法界為相瑜伽師地論所說的菩薩地與轉依是普為三乘的所說的菩薩法是初期大乘的後期的如來藏思想還沒有被注意依菩薩地品目次第而造的大乘莊嚴經論已接觸到如來藏說並在瑜伽師地論的思想體系上方便的給豫會通了大乘莊嚴經論的內容極為廣大廣說唯識所現觀唯識現而證入的次第以外融會了如來藏說菩提品說到轉依相二障種恆隨彼滅極廣斷白法圓滿故依轉二道成論以為轉依是永滅二障種子最上的白法圓滿這是以菩提為轉依體從轉捨二障種子成就二種出世智道而轉得的又在諸佛法界清淨性說二障已永除法如得清淨諸物及緣智自在亦無盡離二障所顯的清淨真如就是無漏法界不只是離障清淨也是事物與所緣智慧都是無窮無盡自由自在的大乘莊嚴經論所說顯然與寶性論有關的如究竟一乘寶性論菩提品卷四大正三一八四一上中說實體者向說如來藏不離煩惱障所纏以遠離諸煩惱轉身得清淨因者有二種無分別智偈言得故果者即依此得得證智果是名為果偈言遠離故佛功德無垢常恆及不變不分別諸法得無漏真智菩提的自性實體是如來藏的轉依而得清淨這由於遠離二障得二智而成就這與大乘莊嚴經論菩提品以得及捨來說明是一致的然如來藏學如來藏有三義而瑜伽學但約真如無差別說種性約如來藏本有功德說而瑜伽學約種子說如說遠離二障大乘莊嚴經論說二障種恆隨彼滅極廣斷寶性論與佛性論卻都沒有說種子依如來藏學轉依成佛只是具足一切功德的如來藏離煩惱而圓滿顯現所以佛德是常住無為的如勝鬘經說是滅諦真諦在如來藏學中也是這樣如佛性論卷三大正三一八二下八三上說如來轉依法身已度四種生死故一切煩惱虛妄已滅盡故一切道已修故棄生死捨道諦故此二無四德故唯法身獨住四德圓滿故在轉依法身中依之能得轉依的道也被棄捨道是有為而法身唯是無為滅諦然在瑜伽學中真如是無為而正智是有為是依他起是道諦在安立中佛果是有有為無為功德的真諦在佛性論中雖多少引入瑜伽學而關於如來藏轉依的說明還是與寶性論一致的在攝大乘論釋及決定藏論中雖多少引入如來藏學而大義還是順於無著世親論的大乘的究竟轉依在佛位然轉依一詞可通於聲聞及菩薩位如瑜伽師地論卷五一攝決擇分大正三五八一下說修觀行者以阿賴耶識是一切戲論所攝諸行界故略彼諸行於阿賴耶識中總為一團一積一聚為一聚已由緣真如境智修習多修習故而得轉依轉依無間當言已斷阿賴耶識阿賴耶識體是無常有取受性轉依是常無取受性緣真如境聖道方能轉依故又阿賴耶識是煩惱轉因聖道不轉因轉依是煩惱不轉因聖道轉因應知但是建立因性非生因性真諦異譯的決定藏論也是這樣說不過將轉依譯作阿摩羅識轉依是經修行使依阿賴耶識的雜習種子滅雜染種子滅一切業苦也滅雜染依止的阿賴耶識也滅瑜伽師地論普為三乘所以阿賴耶識滅是二乘的阿羅漢不退菩薩及如來這是轉捨轉滅阿賴耶識依而轉得的轉依是離垢真如所以說轉依究竟遠離一切所有麁重轉依是聖道轉因聖道因就是真如異名的法界法界的意義正是由聖法因義說為法界以一切聖法緣此生故真諦所傳是以攝大乘論為主的轉依的本義是究竟解脫的阿羅漢與如來的聖證但說明轉依主要是現實界依他起性或阿賴耶為種子的轉捨理想界圓成實性真如的轉顯雜染種子是漸漸捨滅的清淨真如是分分顯現的兩者有對應的關係所以攝大乘論有六位轉依的安立說明轉依的漸次究竟六位是一損力益能轉二通達轉三修習轉四果圓滿轉五下劣轉六廣大轉後二類是小乘與大乘的轉依差別前四位是菩薩趣入佛位的次第轉依攝大乘論重視聞熏習作為成佛的種子所以在沒有體悟真如以前由於聞熏習的漸漸增上使煩惱部分不起也就稱為轉依損力益能轉通達轉是初地以上已經是虛妄不顯現真實顯現了修習轉是七地以上能一切相不顯現真實顯現不過所知障種子還沒有斷盡果圓滿轉是佛位最清淨真實顯現於一切相得自在攝論大乘轉依的四位安立不但是捨虛妄而顯真實並有減捨雜染習氣增益清淨習氣的意義聞熏習是生起出世心轉依的關鍵所在在從凡入聖的歷程中聞熏習是怎樣的呢陳譯攝大乘論卷上大正三一一一七上說此聞慧種子以何法為依止至諸佛無上菩提位是聞慧熏習生隨在一依止處此中共果報識俱生此聞熏習雖是世間法初修觀菩薩所得應知此法屬法身攝若聲聞獨覺所得屬解脫身攝聞熏習從初熏習起到成佛為止雖與阿梨耶果報識的性質相反卻依附阿梨耶識與阿梨耶識俱生俱滅這應該要阿梨耶識滅盡聞熏習才與阿梨耶識相分離但攝論又說聞熏習是法身解脫身所攝的法身與解脫身都是以真如清淨所顯為體所以在生死相續中聞熏習雖與阿梨耶識俱生而約聞熏習屬圓成實性說這又是屬於真如的因此陳譯攝大乘論釋卷三大正三一一七五上說由本識功能漸減聞熏習等次第漸增捨凡夫依作聖人依聖人依者聞熏習與解性和合以此為依一切聖道皆依此生凡位與聖位陳譯攝大乘論釋這樣說菩薩有二種一在凡位二在聖位從初發心訖十信以還並是凡位從十解以上悉屬聖位菩薩有二種謂凡夫聖人十信以還是凡夫十解以上是聖人十解就是十住位依真諦所傳從十解以上的菩薩就是聖者因為此人我執前十解中已滅除故唯法我未除十解位菩薩已滅除人我執能悟入人空真如就到達聖位從凡入聖就轉捨阿梨耶識中我執凡夫依轉得我空真如性聖人依是聞熏習與解性梨耶和合也就是聞熏習依於梨耶的心真如性成為一切聖道的生起因有關轉依的說明真諦不但說明佛果的道是有為法更會通了如來藏學如攝大乘論釋卷三大正三一一七三下一七四上說何法名法身轉依名法身轉依相云何成熟修習十地及波羅蜜出離轉依功德為相由聞熏習四法得成一信樂大乘是大淨種子二般若波羅蜜是大我種子三虛空器三昧是大樂種子四大悲是大常種子常樂我淨是法身四德此聞熏習及四法為四德種子四德圓時本識都盡聞熏習及四法既為四德種子故能對治本識聞熏習正是五分法身種子聞熏習是行法未有而有五分法身亦未有而有故正是五分法身種子聞熏習但是四德道種子四德道能成顯四德四德本來是有不從種子生從因作名故稱種子本論說是聞熏習下中上品應知是法身種子釋論補充了這大段解說信般若三昧大悲是能顯如來藏的因常樂我淨是如來藏的果德並舉闡提外道聲聞獨覺四種障這是寶性論所說的現在說聞熏習為因能生信等四法四法是道能顯出法身四德所以說聞熏習是法身種子然在寶性論中是不立聞熏習的這與論釋所說若證法身果則得淨我樂常四德果淨不與闡提等我不與外道等樂不與聲聞等常不與獨覺等都是會入寶性論義與其他譯本不同的同時聞熏習是行法生滅法能生起五分法身戒定慧解脫解脫知見所以聞熏習也是五分法身種子五分中的戒定慧修道時已有了證果時更有解脫解脫知見這樣聞熏習是有為的五分法身種子也可說常等四德法身種子貫通了如來藏學六種轉依中的果圓滿轉是佛位的圓滿轉依如陳譯攝大乘論釋卷一三大正三一二四八上說三德具足名果圓滿已離一切障人即是諸佛能得此轉一切相不顯現即是斷德以一切相滅故清淨真如顯現即是智德如理如量智圓滿故謂具一切智及一切種智至得一切相自在即是恩德依止一切相中所得自在由得此自在如意能作一切衆生利益事三德並以此轉為依止果圓滿轉含有多種意義所以約三德來解說清淨真如顯現即是智德以菩薩修二智圓滿轉得一切智一切種智來解說如依其他譯本是說一切相不顯現所以清淨真如顯現真諦譯似乎與寶性論的思想有關寶性論的菩提品說無漏法界中遠離一切垢得轉依全品以八義來說明前四義是轉依自性淨離垢真如轉依因得二種無分別智為因轉依果遠離遠離二種障得證果智轉依業自他利離障得無障礙清淨法身依彼二種佛身得世間自在力行轉依清淨成菩提自體只是離垢真如如來藏出纏由二無分別智的修習遠離二障得證果智真如最清淨顯現就是無障礙清淨法身這與陳譯攝論釋的真如清淨所顯即是智德是相契合的五阿摩羅識在真諦所傳的唯識學中阿摩羅識是最特出的阿摩羅識譯義為無垢識依成唯識論或名無垢識最極清淨諸無漏法所依止故此名唯在如來地有並引經說如來無垢識圓鏡智相應這顯然是如來所有的無漏第八識如泛稱善淨無漏識為無垢識地上無漏第六第七識也可說無垢識了但唯識宗所說與真諦所傳的阿摩羅識的意義都是不相合的我以為虛妄分別為自性的心識根本是阿賴耶識為依止說明一切法唯識所現開示轉雜染為清淨的轉依是彌勒無著世親論所說的但轉依的內容都沒有說到識可以見到的反而是阿賴耶識阿羅漢位捨攝大乘論說謂轉阿賴耶識得法身故法身由五種自在而得自在五由圓鏡平等觀察成所作智自在由轉識蘊依故大乘莊嚴經論說如是種子轉者阿梨耶識轉故是名無漏界阿賴耶識與識蘊被轉捨了在無漏法界中還是生死雜染那樣的有識嗎識是虛妄分別為自性的轉依而真實相顯現這也可以稱為唯識嗎為了貫徹一切法唯識的原則是真諦提出阿摩羅識的理由所在如轉識論大正三一六二中下說立唯識義意本為遣境遣心今境界既無唯識又泯即是說唯識義成也問遣境存識乃可稱唯識義既境識俱遣何識可成答立唯識乃一往遣境留心卒終為論遣境為欲空心是其正意是故境識俱泯是其唯識義成此境識俱泯即是實性實性即是阿摩羅識亦可卒終為論是阿摩羅識也唯識一般是說遣境存識遣境留心也就是唯有內識沒有離心的外境唯識無塵表顯出唯識的獨到意義依識有所得境無所得生正是唯識觀的初門辨中邊論卷上大正三一四六五上說依識有所得境無所得生遣境存識依境無所得識無所得生境識俱泯由識有得性亦成無所得故知二有得無得性平等境與識是相關的境不可得識也不得生所以從識有境無到境識並泯是唯識學中從虛妄分別而契入空性的方便次第到了境識並泯依辨中邊論說是空性真如這怎麼還可以說唯識呢為了解答這一疑難所以說此境識俱泯即是實性實性即是阿摩羅識意思說唯識的真正意義不只是說明生死虛妄的唯識而目的在境識並泯的實證境識並泯的真如實性就是阿摩羅識這當然可以說唯識了這一見解十八空論大正三一八六四上也說明唯識真實辨一切諸法唯有淨識唯識義有兩一者方便謂先觀唯有阿梨耶識無餘境界現得境智兩空除妄識已盡名為方便唯識也二明正觀唯識遣蕩生死虛妄識心及以境界一切皆淨盡惟有阿摩羅清淨心也論文辨二類唯識主意在說明一切諸法唯有淨識一方便唯識是以阿梨耶識為種子性為一切法依止而成立一切唯識的修唯識觀達到境空心空也就是妄分別識不起這是登地以前的唯識觀是方便唯識二正觀唯識無分別智現證真如從登地到究竟清淨生死虛妄識心阿梨耶識為根本及一切境界都轉滅而為清淨稱為正觀唯識的就是以阿摩羅淨識為依的唯識說從虛妄到真實作兩層唯識說是真諦所傳的一致說明如三無性論卷上大正三一八七一下八七二上說識如如者謂一切諸行但唯是識此識二義故稱如如一攝無倒二無變異一攝無倒者謂十二入等一切諸法但唯是識離亂識外無別餘法故一切諸法皆為識攝此義決定故稱攝無倒無倒故如如無倒如如未是無相如如也二無變異者明此亂識即是分別依他似塵識所顯由分別性永無故依他性亦不有此二無所有即是阿摩羅識唯有此識獨無變異故稱如如先以唯一亂識遣於外境次阿摩羅識遣於亂識故究竟唯一淨識也三無性論解說識如如也是分為兩層的外境亂識並泯是阿摩羅識阿摩羅識是無變異的如如顯然是真如的別名在決定藏論中玄奘譯為轉依的真諦也譯為阿摩羅識如說阿羅梨耶識對治故證阿摩羅識阿摩羅識是常是無漏法得真如境道故證阿摩羅識阿摩羅識作聖道依因不作生因法界的意義論上一再說證阿摩羅識就是證得轉依轉依以真如離垢為性這與實性即是阿摩羅識阿摩羅識是無顛倒是無變異是真如如的意義完全相合說唯識而作二層說陳譯攝大乘論釋也有相近的說明如說一切法以識為相真如為體故若方便道以識為相若入見道以真如為體以方便道見道來分別解說與三無性論等相同只是稱為真如而沒有稱為阿摩羅識而已阿摩羅識是真如的異名是無可懷疑的如十八空論大正三一八六三中說云何分判法界非淨非不淨答阿摩羅識是自性清淨心但為客塵所污故名不淨為客塵盡故故立為淨十八空論是中邊分別論的部分解釋中邊分別論相品末空成立義說不染非不染非淨非不淨心本清淨故煩惱客塵故真如法界等是空的異名在說明真如有雜垢與離垢時不說真如或法界本淨而說心本清淨心本明淨約心真如說十八空論說阿摩羅識是自性清淨心與上來所說阿摩羅識是真如意義是相合的不過上來所說的阿摩羅識約離垢清淨說這裡約本性清淨說心自性清淨或譯為自性清淨心如大乘莊嚴經論說不離心之真如別有異心謂依他相說為自性清淨此中應知說心真如名之為自性清淨的心可以說心真如為心當然也可以稱識真如為識了在這樣的意義下真諦學立識的體性為阿摩羅識在解說此界無始時的界時是此識為一切法因又說阿梨耶識界以解為性從虛妄的唯識相到真實的唯識體阿摩羅識轉染識為淨識貫徹了一切法唯識的教說而阿摩羅識即是自性清淨心又會通了如來藏學不過真諦所譯傳的論書除佛性論及無上依經以上大意都是符合瑜伽學的

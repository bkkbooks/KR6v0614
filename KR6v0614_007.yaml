body:
  text: 第七章瑜伽學派之如來藏說第一節瑜伽學派略說瑜伽學派或稱為唯識派是以彌勒無著世親所造的論典瑜伽師地論顯揚聖教論辨中邊論分別瑜伽論大乘莊嚴經論攝大乘論大乘阿毗達磨集論唯識三十論唯識二十論等論為宗依的學派瑜伽學派所依的經典主要為解深密經與阿毗達磨大乘經在這些經論中阿毗達磨大乘經與分別瑜伽論沒有譯為漢文原本現已佚失除了大乘莊嚴經論是唐波羅頗蜜多羅譯出以外其餘的都有唐玄奘的譯本早在西元五世紀上半北涼西元四一四曇無讖所譯的地持經十卷宋西元四三一求那跋摩所譯的菩薩善戒經九卷就是瑜伽師地論本地分的菩薩地的異譯宋西元四三六四五三求那跋陀羅所譯的第一義五相略集一卷相續解脫經二卷是解深密經的一部分從瑜伽師地論攝決擇分中節録出來的可見瑜伽派的根本經論解深密經與瑜伽師地論在西元五世紀上半已部分的傳來中國了但對中國佛教的影響似乎並不太大到西元六世紀上半菩提流支佛陀扇多勒那摩提瞿曇般若流支等到中國北魏來譯出了與無著世親有關的論典世親的十地經論以菩提流支為主勒那摩提佛陀扇多相助而譯出當時意見不一致所以有各別譯出而合為一部的傳說這部論受到當時的重視傳承宏揚成為地論宗這幾位譯師所譯的如十地經論法華經論金剛般若波羅蜜經論大乘寶積經論勝思惟梵天所問經論等都與無著世親有關重於菩薩大行的釋經論雖然菩提流支譯出了深密解脫經解深密經的異譯五卷佛陀扇多譯出了攝大乘論二卷瞿曇般若流支譯出了二十唯識論一卷但對於瑜伽學派分別抉擇甚深法義的宗經論顯然譯出是不充分的所以法義也不夠明確究竟一乘寶性論也是菩提流支與勒那摩提譯的所以地論宗尤其是傳承勒那摩提的地論南道與寶性論的思想極為接近同時而多少遲一些真諦到達中國的南方在梁陳間西元五四九五六七譯出了攝大乘論三卷攝大乘論世親釋十五卷是真諦所傳唯識學的要典所以有攝論宗的傳宏真諦所譯的還有解節經一卷是解深密經的勝義了義部分決定藏論三卷是瑜伽師地論攝決擇分中的五識身相應地與意地的異譯十七地論五卷是瑜伽師地論本地分的異譯但當時沒有全部譯出早已佚失三無性論一卷是顯揚聖教論成無性品的別譯中邊分別論二卷是辨中邊論的異譯十八空論一卷是中邊分別論的部分注釋轉識論一卷是唯識三十論的釋論大乘唯識論一卷是唯識二十論的異譯真諦所譯的比北方菩提流支等所譯無疑的充分明確得多真諦又譯出無上依經三卷佛性論四卷那是接近寶性論思想的西元七世紀中唐玄奘從印度回來從貞觀十九年西元六四五到龍朔元年西元六六一譯出瑜伽唯識學的大量經論其中成唯識論十卷是玄奘所傳的精要所在所以稱玄奘所傳的為唯識宗這部論糅合唯識三十論的十家注釋所成而其實是以護法論義為正宗的代表了印度的唯識學在發展中所完成的思想在部派佛教中尋求瑜伽唯識學的淵源近於上座部中的說一切有三世有系說一切有系分裂為犢子部及其末派與說一切有部從大毗婆沙論中可以看出說一切有部中有重論的阿毗達磨者也就是一般所說的說一切有部重經的譬喻者如法救覺天等從論師系又分出說轉部說轉部立勝義補特伽羅與立不可說我的犢子部等都是我法俱有的說一切有部是法有我無的西元三世紀初譬喻師捨棄了三世有說改宗大衆部與分別說部的現在有而過未無說演化為著名的經部譬喻師經部的一項重要思想是種子或習氣說瑜伽唯識學所說的法相是廣義的說一切有而依現在有立種子說與經部的關係更密切如世親的大乘成業論對於業力取種子說更進一步的說一類經為量者立異熟果識具一切種子有集起心與種種心引解深密經就是大乘瑜伽論師瑜伽大乘的興起已經是大乘佛教的後期所以面對初期大乘的一切法空一切法無自性說後期大乘的如來藏佛性說從說一切有特別是經部的思想接受而解說他對於初期大乘如大般若經等空無自性說從說有的立場給以善巧的再解說如解深密經的一切法相品無自性相品所說對於後期大乘衆生本有如來藏佛性說也給以善巧的再解說如依阿毗達磨大乘經而造的攝大乘論引述阿毗達磨大乘經說法有三種一雜染分二清淨分三彼二分引金土礦藏為喻來說明遍計所執性圓成實性依他起性三性因此依他起性的定義除了一般的依他熏習種子而生起以外又有雜染清淨性不成故作為衆生與佛的共同依止性解深密經是繼承經部的瑜伽師地論所宗阿毗達磨大乘經中圓熟的唯識思想代表了大乘不共的唯識學是攝大乘論所宗依的瑜伽師地論說阿賴耶是一切種子所隨依止性所隨依附依止性體能執受異熟所攝阿賴耶識由八種相證阿賴耶識決定是有說諸識俱轉是重於阿賴耶現行識的唯識三十論也是這樣所以說三種能變攝大乘論重於阿賴耶識為種子性依阿賴耶為種子而現似一切所以有一能變說瑜伽唯識學系對廣義的說一切有取捨不同或立本有種子或說種子由熏習而有或說依心現似心所或說心所別有依他起性或重從種子生或重於雜染清淨性不成或立無漏依他起正智是依他起性或說無漏是圓成實所以立四種清淨雖有種種異說但大義是一致的對如來藏的解說也是一致的真諦所傳譯的是瑜伽唯識學而有折衷如來藏學的傾向所以要分別的加以論究第二節瑜伽唯識學的如來藏說唯識學派有關如來藏的見解試分別的加以論究一如來藏如來藏是什麼是依什麼意義而說的寶性論約三義說佛身遍無差別如來佛種性在這三義中唯識學者但約無差別說如大乘莊嚴經論卷三大正三一六四下說一切無別故得如清淨故故說諸衆生名為如來藏一切衆生一切諸佛等無差別無二無別所以名為真如世親的攝大乘論釋也說自性本來清淨即是真如自性實有一切有情平等共相由有此故說一切法有如來藏真如是圓成實自性的別名真如是實有自性的本來清淨的是一切有情的平等共相無差別相也就是生佛不二的無差別的真如性遍於一切衆生所以說一切衆生有如來藏這是如來藏說的本義真如是遍於一切法的所以說一切法有如來藏這應該是唯識學者的新義也許衆生有如來藏無論怎樣解說總不免帶點神我的意味所以雖然真如是一切有情平等共相卻說為一切法有如來藏一切衆生或一切法有如性為什麼說有如來藏呢或譯如來如去是契入如顯現如的意義契入如或顯現如約究竟說就是如來佛的異名佛是如性究竟顯現清淨的衆生是沒有清淨顯現的這就是真如圓成實性的離垢清淨與自性清淨然而這到底是約世俗安立說的如約真如自性勝義那是無所謂契入不契入顯現不顯現的真如離能所所以約真如自性說衆生如與如來如沒有任何差別可說那麼一切衆生有如性一切法有如性也就可說有如來了依世俗安立說衆生雖可說有如來而還沒有能離障清淨隱而未顯如胎兒在胎藏中一樣依於這一意義所以說為如來藏二我我者即是如來藏義一切衆生悉有佛性即是我義如來藏佛性都就是我這是大般涅槃經央掘魔羅經所明確說到的如來有常樂我淨四種功德如來的我德是一切如來藏經論所說到的而如來藏佛性就是我在唯識學派中說得多少含蓄一點其實也還是說到了的大乘莊嚴經論卷三大正三一六三下說清淨空無我佛說第一我諸佛我淨故故佛名大我漢譯的究竟一乘寶性論也引證了這一偈如清淨真空得第一無我諸佛得淨體是名得大身梵藏本沒有這一偈佛性論也引此偈說二空已清淨得無我勝我佛得淨性故無我轉成我這一偈在大乘莊嚴經論中是說無漏法界的大我相如是空性清淨空性是無我沒有衆生妄執的神我而無我空性正就是佛所得的最勝我如論釋說第一無我謂清淨如彼清淨如即是諸佛我自性由佛此我最得清淨是故號佛以為大我如清淨空性唯識學者是解說為如來藏我的佛證得最清淨法界真如所以佛可以稱為大我真如法界是佛與一切衆生無差別的平等共相既然是諸佛我自性當然也是菩薩一切衆生的我自性大般若經初分學觀品實有菩薩不見有菩薩由不見故不生執著唯識學者依據這一段文字解說為對治十種散動分別般若經一向說菩薩不可得不見有菩薩菩薩但有名字而學觀品卻說實有菩薩這是什麼意義玄奘譯攝大乘論世親釋卷四大正三一三四二下解說為此中無相散動十種散動之一者謂此散動即以其無為所緣相為對治此散動故般若波羅蜜多經言實有菩薩言實有者顯示菩薩實有空體空即是體故名空體玄奘所譯的可以解說為菩薩的實有空體其實這是說菩薩以真如空性為自體如真諦所譯攝大乘論釋說由說實有顯有菩薩以真如空為體無性釋論也說謂實有空為菩薩體可見實有菩薩的意義是真如空是菩薩實體菩薩沒有世俗的神我卻有勝義的真我如來藏約真如無差別說我也是約真如說佛可說為大我菩薩可說實有菩薩衆生當然也可說實有衆生不過後代的唯識學者大都避而不談儘量避免以真如為我自性的意義唯識學的本義是以真如空性解說如來藏我的還有可以證明的如大乘莊嚴經論卷二大正三一五九六上說佛體平等由法界與我無別決定能通達故佛以最清淨法界為自體以法界與我的無差別說明佛自體的平等我正是法界的大我相顯揚聖教論也說到了大我如說廣大阿世耶者謂大我阿世耶及廣普阿世耶大我阿世耶者謂諸菩薩由得自他平等解故為諸有情皆得解脫清淨信欲廣普阿世耶者謂諸菩薩於流轉寂滅得無分別平等解故為利有情二俱不住清淨信欲是大我意樂於自性無得廣意樂當知二性無分別論曰當知此平等心性即是大我阿世耶及廣大阿世耶於遍計所執自性無所得故於有漏無漏二性過失功德亦無所得由無分別故阿世耶譯為意樂這裡的二種意樂就是清淨信欲依第一則理解有情的自他平等發起一切有情同得解脫的意樂與同體大悲的意義相同名為大我阿世耶大我約一切有情的自他平等說依第二則唯識宗依心立我平等心性是通達遍計所執自性無所得也就是心空性每一有情的我自性是平等無差別的但有情不能通達迷著虛妄的神我菩薩能通達自他平等起大我意樂佛能圓滿證得法界我平等遍法界身以法界為自體就是佛的大我相顯揚聖教論卷一二大正三一五三九上中又說五究竟不可見故如言內我之體有何相貌而常恆不變自性正住如於語相違難隨順會通如是於不定顯示難究竟不可見難亦爾論文是解釋從經文引起的疑難疑難共有五類究竟不可見難是第五難自內我怎麼說也都不是的沒有相可說怎麼知道有自體知道是常恆不變自性正住呢依論說這應該隨順會通佛經所說的有的語相違前說與後說不合有的不定顯示對於同一內容以種種異門來說明對於語相違不定顯示所引起的疑難應該隨順會通隨順會通是隨順無顛倒解如理的正義為準繩依此如實法義來會通經說常恆不變的自內我難以說明引起學者的疑難唯識學者是依真如平等空性來解說會通的三心性本淨譯為心本性淨心性本淨或譯為自性清淨心源出增一阿含經為般若等大乘經所採用初期大乘經多說一切法本性淨一切法本性空表示法界真如的意義心性淨只是法性淨中之一後期大乘經傾向唯心說心為一切法的所依多說心性本淨法界清淨與心性本淨有了同樣的意義如來藏經典也就多說自性清淨心唯識者對於心性本淨的見解如大乘莊嚴經論卷六大正三一六二二下六二三上說譬如清水濁穢除還本清自心淨亦爾唯離客塵故已說心性淨而為客塵染不離心真如別有心性淨論文以水的清濁來比喻自心淨水有垢濁與清淨的除去垢濁所得的清淨水清淨非外來水的清淨性是本來如此的這正如方便修行除去客塵顯心的清淨也是淨非外來本性淨故從雜染心而轉為清淨顯出的心清淨性本來如此與真如的自性清淨離垢清淨意義完全一樣所以所說的自心本淨約心的真如性說並非說虛妄分別的有漏心識是清淨的對於心清淨莊嚴論解說為如是心性自淨而為客塵所染此義已成由是義故不離心之真如別有異心謂依他相說為自性清淨此中應知說心真如名之為心即說此心為自性清淨此心即是阿摩羅識自性清淨的心是心真如梵本作法性心真如心與法性心意義是相同的總之自心清淨約無差別的真如說與如來藏我的約真如說意義相同成唯識論卷二大正三一九上說然契經說心性淨者說心空理所顯真如真如是心真實性故或說心體非煩惱故名性本淨非有漏心性是無漏故名本淨對於心性本淨成唯識論有二說一約心空理所顯真如說與莊嚴論所說的相同二約心體非煩惱說是採取了說一切有系的見解如阿毗達磨順正理論卷七二大正二九七三三中下說此經依何密意依本客性密作是說謂本性心必是清淨若客性心容有染污本性心者謂無記心非戚非欣任運轉位諸有情類多住此心一切位中皆容有故此心必淨非染污故客性心者謂所餘心非諸有情多分安住亦有諸位非皆容有斷善根者必無善心無學位中必無染故如是但約心相續中住本性時說名為淨住客性位容暫有染依說一切有部說心識的本性是中容的無記性與善或不善心所相應名為善心不善心善心與不善心是相應善相應不善而心的自性是無記的所以善與惡是心的客性心的本性是無記不是染污性所以說心體非煩惱故名性本淨後一說是通於有漏心的也許是阿含經的本意但在大乘經中心性本淨應該是約心真如說的成唯識論的識本性無記說也是繼承瑜伽師地論的如卷五四攝決擇分大正三五九五下說又復諸識自性非染由世尊說一切心性本清淨故所以者何非心自性畢竟不淨能生過失猶如貪等一切煩惱亦不獨為煩惱因緣如色受等所以者何以必無有獨於識性而起染愛如於色等一切識自性非染污不是煩惱如識不與煩惱相應識不能獨為煩惱的因緣如於識而起染愛那是識與煩惱俱起的關係約識自性非染污來解說心性本淨正合於識本性無記的意義瑜伽師地論說淨識都指無漏識與心性本淨不合大乘莊嚴經論的漢譯本說此心真如即是阿摩羅識梵文本沒有這一句阿摩羅識譯義為無垢識是真諦所傳唯識學所一再提到的可能是傳譯時綴文證義者受到真諦學影響而附加進去的心性是依心真如性說的心性本淨是與客塵煩惱相對稱的在大乘法中心性依心真如說所以心性清淨就是真如或法界清淨聖者內自所證的真如或法界其實是非染非淨的所以從勝義聖智自證的立場大乘莊嚴經論卷三大正三一六三下說如前後亦爾及離一切障非淨非不淨佛說名為如釋曰此偈顯示法界清淨相如前後亦爾者所謂非淨由自性不染故及離一切障者所謂非不淨由後時客塵離故非淨非不淨佛說名為如者是故佛說是如非淨非不淨是名法界清淨相法界真如無差別無變異是非淨非不淨也可說非染非不染沒有淨不淨可說的清淨是對雜染說的真如是前後一如本來如此實在無所謂清淨不過從離客塵雜染所顯來說真如也可說非不淨的唯識學者依世俗說勝義對於勝義真如法界是從世俗安立去闡明的如直從勝義非安立說那是超越於相對界非分別名相所及有什麼淨不淨呢真如非淨非不淨辨中邊論卷上大正三一四六六中也說此若無雜染一切應自脫此若無清淨功用應無果非染非不染非淨非不淨心性本淨故由客塵所染辨中邊論說真如法界等是空性異門約不同意義來表示空性所以有不同名字而內容是相同的成立空性差別有垢與無垢的差別所以說了上面二頌雜染與清淨是佛法化世的根本論題染淨相對的意義是不可能沒有的一定要肯定這雜染與清淨的事實因此空性就有了有垢位與無垢位的差別然依空性真如法界自性來說實在是非染非不染非淨非不淨的不過說空性真如是非染非不染非淨非不淨還是依雜染與清淨而說的所以約心性本淨說非染非不染約客塵所染說非淨非不淨這與說非空非不空一樣都是依世俗說勝義而不是直就勝義的超越說辨中邊論說有情及法俱非有故彼染淨性亦俱非有以染淨義俱不可得故染淨品無減無增可見說法界本淨心性本淨都不過觀待世俗的雜染性而說四種性如來藏我心性本淨自性清淨心唯識學者是約真如性說的如來種性佛種性唯識學約菩薩所有的成佛種子說這是與寶性論如來藏學最大的差別所在瑜伽師地論菩薩地卷三五大正三四七八下說云何種性謂略有二種一本性住種性二習所成種性本性住種性者謂諸菩薩六處殊勝有如是相從無始世展轉傳來法爾所得是名本性住種性習所成種性者謂先串習善根所得是名習所成種性又此種性亦名種子亦名為界亦名為性依論說種子界性都是種性的名字差別不同的名字解說為同一內容都是種子的別名瑜伽師地論聲聞地也這樣說大乘莊嚴經論也說性種及習種所依及能依應知有非有功德度義故菩薩種性有性種性本性住種性習所成種性本性住種性是無始以來法爾而有的習所成種性是經過不斷的熏習而成就的這二類是本有的及經不斷熏習而功能增勝的種子莊嚴論所說與瑜伽師地論所說相同種性種子是什麼意義種子是有因體而還沒有果體有非有所以是可能性可能生起果法的潛能因為能出生菩薩功德所以名為菩薩種性種性是功德度義能出生功德的意義種性雖是種子的異名但種性專約能生無漏功德說無漏功德有三乘差別不同的無漏功德從不同的種子生所以唯識學立五種種性一聲聞種性二獨覺種性三如來種性四不定種性有多種無漏種子雖隨緣修證二乘聖果而可以回小入大五無種性沒有三乘無漏種子怎麼也不能發生無漏功德證入聖果種子是多種差別的所以唯識學立五性各別三乘究竟而不是唯一佛乘的瑜伽師地論本地分大乘莊嚴經論立本有的本性住種性而攝大乘論立種子從熏習而有的新熏說如攝大乘論本卷上大正三一一三六中下說云何一切種子異熟果識為雜染因復為出世能對治彼淨心種子又出世心昔未曾習故彼熏習決定應無既無熏習從何種生是故應答從最清淨法界等流正聞熏習種子所生此聞熏習隨在一種所依轉處寄在異熟識中與彼和合俱轉猶如水乳然非阿賴耶識是彼對治種子性故依攝論說依止阿賴耶識的內種子一定是從熏習而有的所以說外種子或無熏習非內種應知佛菩薩的無漏功德是出世心一定是從種子生的衆生從無始以來不曾有過無漏清淨法現行也就不可能有熏習所成的無漏種子沒有無漏種子最初的出世無漏清淨心從那裡生起呢攝論說是從最清淨法界等流正聞熏習種子所生的佛盡離一切障所以佛證無漏法界是最清淨的從佛自證的最清淨法界應機而流出的經等教法在四種圓成實自性中名為生此境清淨謂諸大乘妙正法教由此法教清淨緣故非遍計所執自性最淨法界等流性故非依他起自性佛的教法從佛自證法界等流而有的衆生聽聞正法的耳識與意識雖是有漏的世間心但聽聞正法教能在衆生心中引發趣向清淨出世的動力所以正聞熏習所成的名為正聞熏習種子正聞熏習力漸漸增盛能生無漏出世心三乘的無漏功德都從正聞熏習生所以雖本來沒有無漏種子而清淨無漏法卻有緣而能夠生起正聞熏習是寄在阿賴耶識中的依阿賴耶而有對治阿賴耶識的作用所以不是阿賴耶識自性是圓成實自性所攝法身解脫身所攝唯識學對出世無漏法的生起有本有說新熏說二流成唯識論綜合而加以會通而都是以種子為種性的約不定種性而說會三歸一的與攝大乘論相契合的是瑜伽師地論的攝決擇分如卷五二大正三五八九上中說諸出世間法從真如所緣緣種子生若於通達真如所緣緣中有畢竟障種子者建立為不般涅槃法種性補特伽羅若不爾者建立為般涅槃法種性補特伽羅若有畢竟所知障種子布在所依非煩惱障種子者於彼一分建立聲聞種性補特伽羅一分建立獨覺種性補特伽羅若不爾者建立如來種性補特伽羅若出世間諸法生已即便隨轉當知由轉依力所任持故然此轉依與阿賴耶識互相違反對治阿賴耶識名無漏界離諸戲論種子與種性瑜伽師地論是作為同一內容的但種性約能生無漏功德法說能生無漏出世間法的是般涅槃法種性就是三乘聖種性不能生起無漏出世法的是不般涅槃種性也就是無種性人出世間法從什麼種子生起呢從真如所緣緣種子生與攝論的從最清淨法界等流正聞熏習種子所生意義是相通的攝論約大乘種性說大乘的正法教是最清淨法界等流圓成實性所攝大乘法教是生此能證菩提分法所緣境界所以名為生此境清淨這就是從真如所緣緣的意義從聽聞大乘法教成聞熏習種子漸漸增勝而能引生無漏出世間法聞熏習真如所緣緣種子不屬於阿賴耶識而能對治阿賴耶識與法界真如相應名無漏界依攝論這是法身解脫身所攝的瑜伽師地論卷八大正三七四七下又說諸阿羅漢實有轉依而此轉依與其六處異不異性俱不可說何以故由此轉依真如清淨所顯真如種性真如種子真如集成而彼真如與其六處異不異性俱不可說三乘聖者的般涅槃是以轉依為體的捨雜染分而轉化為清淨分離遍計所執性捨雜染依他起性體悟圓成實性而得依他起性清淨分名為轉依從法界等流而起的聞熏習使雜染力減而清淨功能增長也可以名為轉依損力益能轉但主要是體悟真如出世無漏心現前到達究竟清淨所以論上說轉依是真如清淨所顯以離垢真如為體的真如種性真如種子以真如所緣緣而熏成聖種性的真如集起依真如而集成一切功德的轉依是離一切戲論的不離有情自體六處也不就是六處所以不是名相分別所能擬議的瑜伽唯識學者以種子來解說種性與如來藏學不同然推究起來瑜伽師地論本地分的本性住種本有無漏種子實在就是一切衆生有如來藏對當時大乘經的如來藏說從緣起論的立場給以善巧的解說以種子來解說種性如瑜伽師地論說聲聞地今此種姓以何為體答附在所依有如是相六處所攝從無始世展轉傳來法爾所得菩薩地謂諸菩薩六處殊勝有如是相從無始世展轉傳來法爾所得是名本性住種無漏種子是附在所依中的種子
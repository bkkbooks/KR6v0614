body:
  text: 自序抗戰期間我寫了唯識學探源性空學探源二書為了探求大乘三系的淵源還想寫一部如來藏學探源由於抗戰結束了種種因緣沒有能寫出來臺灣以後在經論的探求中才理解到緣起與空唯識熏變在阿含經與部派佛教中發見其淵源而如來藏即佛性說卻是大乘佛教的不共法是別教在如來藏說的開展中與阿含經說的心清淨為客塵所染相結合而如來藏的原始說是真我眾生身心相續中的如來藏我是法身遍在涅槃常住的信仰通過法法平等法法涉入的初期大乘經說而引發出來在初期大乘的開展中從多方面露出這一思想的端倪龍樹的大乘論中還沒有明確的說到如來藏與佛性所以這是後期大乘西元三世紀以下正是印度梵文學復興的時代印度大乘佛教也就適應此一思潮而說如來之藏明確的說我者即是如來藏義一切眾生悉有佛性即是我義一切眾生有如來藏我在中國佛教界從來不曾感到意外只是信受讚歎但印度佛教界可不同了常住不變的妙樂的我是眾生的生命自體轉迷妄而達梵我一如得真解脫是印度神教思想的主流釋尊為人類說法從眾生的蘊界處中觀一切為緣所生法無常故苦苦故無我無我所依空無我得解脫顯出了不共世間超越世間的佛法從部派到初期大乘佛教說明上有無邊的方便不同而依空無我得解脫還是被公認的現在說一切眾生的蘊界處中有常住清淨的如來藏我這是極不平常的教說印度佛教有著悠久的傳統沒有忘卻釋尊教法的大乘者對於如來藏我起來給以合理的解說如來藏是約真如空性說的或約緣起空說的這樣如來藏出纏的佛可以名為大我或約八自在說而眾生位上的如來藏被解說為無我如來之藏了一切眾生有與如來藏同義佛性被解說為當有了這是印度大乘佛教的如來藏說不過眾生的如來藏我秘密大乘佛教中發展為本初佛與印度的梵我一如可說達到了一致的地步我在初期大乘佛教之起源與開展的寫作過程中附帶集錄些有關如來藏佛性說的資料拿來整理一下再補充些後期大乘經論的抉擇題為如來藏之研究作為從前想寫而沒有寫的如來藏學探源補足了從前的一番心願第一章序說第一節如來藏學在佛教中的地位如來藏如來界如來性佛性佛界等這一類名詞在意義上雖有多少的差別然作為成佛的可能性眾生與佛的本性不二來說有著一致的意義在印度如來藏說的興起約在西元三世紀從初期大乘而進入後期大乘佛教的階段在西元四五世紀中非常的興盛有關廣義的如來藏說的經典也紛紛流傳出來如來藏說以後期大乘經為主在論師們印度的大乘論師中觀與瑜伽二家都說如來藏說是不了義的以中觀及唯識的密意去解說他其實這一思想系有獨到的立場主要是眾生與佛有共同的體性依此為宗本說明依此而有生死眾生依此而有究竟解脫如來如不增不減經大正一六四六七中說舍利弗即此法身過於恒沙無邊煩惱所纏從無始世來隨順世間波浪漂流往來生死名為眾生舍利弗即此法身厭離世間生死苦惱棄捨一切諸有欲求行十波羅蜜攝八萬四千法門修菩提行名為菩薩復次舍利弗即此法身離一切世間煩惱使纏過一切苦離一切煩惱垢得清淨住於彼岸清淨法中到一切眾生所願見之地於一切境界中究竟通達更無勝者離一切障離一切礙於一切法中得自在力名為如來應正遍知不增不減經所說的法身也是如來藏的別名從這立論的宗依來說與中觀家以有空義故一切法得成不同也與瑜伽家依虛妄分別的阿賴耶識為所知依不同如來藏說有獨到的立場富有真我論的特色由於如來藏說以經典為主所以重論的學派如西藏學者只承認大乘的中觀見與唯識見而不承認藏性見的存在中國佛教是重經的所以有經富論貧的評語如來藏佛性法門傳到重經的中國來受到中國佛教高度的讚揚如賢首宗立五教三宗三宗是法相宗破相宗法性宗如來藏說是五教中的終教與頓教圓教都是顯性的法性宗只是顯性的理論與方法多少不同而已禪宗是從如來藏禪來的所以闡揚這一法門的楞嚴經與起信論雖有疑偽的傳說卻受到賢首宗與禪宗的尊重天臺宗的四明法智論定如來藏緣起說為別理隨緣據理隨緣未為圓極但同時的孤山智圓就引用起信論推重為圓極的法門宋末以來中國佛教傾向於融會如來藏說也就成為大乘的通量明末智旭是接近天臺學的以為如來藏隨緣是圓極一乘近代太虛大師晚年講中國佛學首列一表以佛性來貫通眾生與佛這樣說是眾生與佛相通的心法由此我們可以看出佛心眾生的不同同時又可以看出眾生心佛的相通大師早年所作的佛藏擇法眼圖如來藏心迷悟圖都是以如來藏佛性為宗本來說明或融貫一切的如來藏說可說是中國佛學的主流依此去觀察如賢首宗說性起禪宗說性生天臺宗說性具在說明上當然不同但都是以性如來界性法界性為宗本的這一法門經中國佛教學者的融會發揮與原義有了相當的距離但確乎是中國佛教的主流在中觀唯識以外表示其獨到的立場與見解第二節與如來藏有關的經論有關如來藏學的經典在佛教史上屬於大乘佛教的後期以為一切法空是不了義的以真常真常我真常心為主的法門宣說如來藏等的經論在中國譯經史上從西元三世紀末起到七世紀止譯出的為數不少思想上前後也多少不同主要的教典有如來興顯經三卷晉太康八年西元二八七竺法護譯是晉譯華嚴經的寶王如來性起品唐譯華嚴經的如來出現品的初譯本經中說破微塵出大千經及斯眾生類愚騃乃爾不能分別如來聖慧世尊普入即一切眾生皆有如來智慧德相的如來藏說大哀經八卷晉元康元年西元二九一竺法護譯出與北涼曇無讖所譯的大方等大集經的瓔珞品陀羅尼自在王菩薩品為同本異譯專論如來藏法門的寶性論就是依本經而造論的在大哀經中有無垢寶珠喻及初說無常苦空非身我後乃達空無相無願次得成於不退轉法輪這是三時教初說聲聞教次說空相應教後說不退菩提法輪大哀經的三時教與解深密經的三時教說第三時的意趣不同大方等如來藏經一卷晉惠懷時西元二九三一一沙門法炬譯出這部經已經佚失現存有晉元熙二年西元四六佛陀跋陀羅的譯本也名大方等如來藏經經中以九種譬喻來說明如來藏是一部通俗的如來藏說大般泥洹經六卷晉義熙年西元四一七四一八法顯所譯這部經傳說與宋智猛在涼州譯出的二十卷本泥洹經是同本異譯六卷泥洹記與二十卷泥洹記一致說經本是從中天竺華氏城婆羅門處得來的曇無讖所譯的大般涅槃經前十卷從壽命品第一到一切大眾所問品第五也是這部經的異譯依大涅槃經記曇無讖所譯的前十卷經本是智猛從印度取來而留在高昌的大般涅槃經四十卷從北涼玄始十年西元四二一十月起曇無讖在姑臧譯出先譯前十卷與法顯的大般泥洹經同本異譯由於經本不完全曇無讖回到西方去尋求在于闐又得到經本再回姑臧譯出傳說雖略有出入前十卷與後來續譯的部分成立的時代有先後解說也有點不同這是無可疑的大雲經或名無想經曇無讖所譯現存大方等無想經六卷分三十七健度別有大雲無想經卷九一卷大雲經中說到了常樂我淨與佛性大法鼓經二卷宋元嘉中西元四四前後求那跋陀羅譯央掘魔羅經四卷宋元嘉中求那跋陀羅譯大正藏編入阿含部是很不妥當的勝鬘師子吼一乘大方便方廣經二卷宋元嘉十三年西元四三六求那跋陀羅初譯唐神龍二年到先天二年間西元七六七一三菩提流志重譯編為大寶積經第四十八勝鬘夫人會楞伽阿跋多羅寶經四卷宋元嘉二十年西元四四三求那跋陀羅初譯異譯有二本一元魏菩提流支在延昌二年西元五一三譯名入楞伽經十卷二唐實叉難陀在長安四年西元七四譯名大乘入楞伽經七卷魏譯與唐譯本比宋譯本增多了序起中的請佛問答及末後的偈頌寶積三昧文殊師利菩薩問法身經失譯一卷見出三藏記集的新集續撰失譯雜經錄是道安所沒有見到的隋歷代三寶紀以來作為後漢安世高所譯是不足信的依所用的譯語應是西晉以前所譯的隋開皇十五年西元五九五闍那崛多重譯名入法界體性經一卷如來莊嚴智慧光明入一切佛境界經二卷元魏景明二年西元五一曇摩流支初譯梁天監五年普通元年間西元五六五二僧伽婆羅等再譯名度一切諸佛境界智嚴經一卷趙宋法護等在大中祥符三年西元一一後譯為佛說大乘入諸佛境界智光明莊嚴經五卷不增不減經一卷元魏孝昌元年西元五二五菩提流支譯無上依經二卷陳永定二年西元五五八真諦譯有的說是梁代所譯的無上依經分六品校量功德品第一與失譯的未曾有經唐玄奘譯的甚希有經是同本異譯勝天王般若波羅蜜經七卷陳天嘉六年西元五六五月婆首那譯唐顯慶五年龍朔三年間西元六六六六三唐玄奘所譯大般若波羅蜜多經第六分八卷當大般若波羅蜜多經五六六五七三卷就是勝天王般若經的再譯本經是寶雲經無上依經等纂集所成的大乘密嚴經三卷唐永隆垂拱元年間西元六八六八五地婆訶羅譯唐永泰元年西元七六五不空再譯也名為大乘密嚴經三卷屬於如來藏說的論典有究竟一乘寶性論四卷元魏正始五年西元五八來華的勒那摩提所譯這部論有本頌解釋偈頌及長行沒有標明造論者的名字漢譯以外現存有梵本與藏譯本依中國古人的傳說寶性論是堅慧菩薩造的但西藏傳說偈頌是彌勒造釋論是無著造的對於本論的作者近代有不同的見解真諦的婆藪槃豆法師傳說世親造三寶性論三寶性就是寶性所以梵漢對照究竟一乘寶性論研究推定為堅慧造本頌世親造釋論佛性論四卷真諦於陳代譯出論初破斥外道小乘大乘空執立三性三無性以下部分與究竟一乘寶性論釋大致相合傳為世親造恐未必是大乘法界無差別論二卷堅意菩薩造現存有二本一五言的二十四頌分為十二義別別解釋這是賢首疏所依的論本二總舉七言的二十四頌然後分十二義解釋論義相同都說是唐提雲般若所譯然開元釋教錄所記指五言頌本說究竟一乘寶性論佛性論大乘法界無差別論與無上依經意義都非常接近這是西元四世紀末論師將當時流行的如來藏經典分為十門或十二義而作貫攝的論集這還是如來藏說沒有引用楞伽經不是如來藏緣起說大概與寶性論同時傳出了楞伽經立如來藏藏識如來藏與藏識合流於是又有大乘起信論那樣的論典起信論與楞嚴經有疑偽的傳說所以不加論列第三節如來藏的名稱與意義如來藏說是後期大乘經的主流經初期大乘的演化而來佛法而演化為大乘佛法根本的原因是佛涅槃後佛弟子對佛的永恒懷念佛功德如來光明智慧莊嚴與淨土莊嚴菩薩的自利行與利他行都在這一願求下開展出來十方一切佛的功德莊嚴理想中的佛陀從菩薩行的實踐中實現出來就是成佛初期大乘中廣說十方佛與十方淨土一切法本來不生無量數大劫修菩薩行向普遍廣大悠久甚深而無限的展延這樣的佛陀窮深極廣成佛是不太容易的吧這應該是佛弟子所迫切關懷的佛法原本是直從眾生身心引導修行而證入的從博返約後期大乘的如來藏說也就以初期大乘所闡明的窮深極廣的如來光明智慧莊嚴直從眾生身心中點出一切眾生有如來藏或佛性不但一切眾生可以成佛也提貢了頓入易成的法門即心是佛即身成佛等法門由此而發展起來寶性論說依如來藏有四種義依四種義有四種名四名是法身如來聖諦涅槃勝鬘夫人經說如來藏者是法界藏是法身藏出世間藏性清淨藏從如來藏的立場貫攝經中的不同名義可以理解這一思想系的源流這些不同名稱主要是由佛而來的如佛如來勝者法身都是佛的異名佛的智慧是無上菩提略稱菩提離一切雜染而得解脫的是涅槃菩提與涅槃約佛的果德說佛是大覺而圓成的所體悟的名為法聖諦初期大乘經中多用法性真如法界實際等這都是固有的名詞到表示眾生本來有之的如來藏說興起胎藏界藏攝藏的意義重要起來成立新的名詞如是胎藏的藏如來藏佛藏正覺藏勝者藏法界藏出世間藏性清淨藏等都是胎藏的藏如來藏九種譬喻中有貧女懷妊輪王喻是胎藏的根本意義與種姓說有關如是界藏的藏佛界如來界法界涅槃界眾生界都依界藏得名一般譯為界如六界十八界等是最常見的名詞阿毘達磨俱舍論卷一大正二九五上說法種族義是界義如一山中有多銅鐵金銀等族說名多界界有多種意義如山中的銅鐵金銀等族是其中的一義就是地下的礦藏如來藏的九種譬喻中有地有珍寶藏喻就是界藏的譬喻如攝大乘論本的金土藏喻也是本有金而不見經冶鍊而才顯現出來的界或譯為性如法界或譯為法性如來界或譯為如來性胎藏與界藏是不同的但在已經有了而還沒有顯現的意義上胎藏與界藏相通古代的譯者每互相通譯如寶性論的僧次無礙性皆實有佛性性在梵文中都是胎藏反之如來界也有譯作如來藏的這可見胎藏與界藏在如來藏說的經論裡意義相通又如佛性一詞是中國佛教最熟悉的從寶性論的梵語看來漢譯為佛性或是佛藏或是佛界所以佛性也不外乎胎藏與界藏是攝藏也就是俱舍在寶性論中都用作煩惱所藏覆藏真實的意義然華嚴經十地品的法雲地中說到如來藏解脫法性藏解脫如來藏的原語是如來俱舍又大日經疏釋法界藏梵音云俱舍俱舍攝藏似乎也與胎藏界藏相通不過在如來藏思想中通俗的胎藏說是更重要的如來藏是後期大乘的術語而如來與藏卻是印度世俗固有的文字在如來藏說成立以前如來與藏又是什麼意義呢如來音譯為多陀阿伽陀在佛教中是佛的德號在佛經中世尊的德號廣說有十號如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛適中的有三號如來應供正遍知簡要的就稱為如來如來的意義經論中解說極多如大智度論卷二大正二五七一中說云何名多陀阿伽陀如法相解如法相說如諸佛安隱道來佛如是來更不去後有中是故名多陀阿伽陀多陀阿伽陀一般譯作如來其實可以作三種解說如法相解是如解約智慧的通達真如說恰如一切法的實相而通達如法相說是如說約恰如其分的說法說所以說如來是真語者實語者如語者不誑語者不異語者如諸佛安隱道來是如來約一切佛的平等解脫說過去佛是這樣的從安隱道來成佛現在佛也是這樣的來成佛如是平等不二的實相佛就是如如的圓滿體現者與一切佛平等所以叫如來雖有這三種意義而一般都譯為如來重於果德的成就來如來為十號的最前者佛為最後者如來與佛一般也可以通用如釋迦佛即釋迦如來然燈佛即然燈如來如來界即佛界如來藏即佛藏如來與佛是世尊德號中最一般的作為世尊德號的如來並非佛教特有的術語而是世俗語言佛教成立以前印度文化中的固有名詞世俗一般及宗教學者對如來是怎樣解說的呢如大智度論卷五五大正二五四五四中下說或以佛名名為如來或以眾生名字名為如來如先世來後世亦如是去是亦名如來亦名如去如十四置難中說佛名如來者從如中來故名如來如來在佛教中是佛的別名解說為從如中來就是悟入真如而來成佛的乘如實道來在一般人如來是眾生的別名所以說我有種種名或名眾生人天如來等換言之如來就是我的別名在釋尊當時的印度宗教界對於眾生的從生前到死後從前生到後世都認為有一生命主體這一生命自體一般稱之為我我從前世來又到後世去在生死中來來去去生命自體卻是如是如是沒有變異如如不變卻又隨緣而來去所以也稱我為如來也可以說如去十四置難是釋尊時代一般宗教界所歡喜論究的十四個問題這些難問釋尊一概置而不答以不加答覆來答覆他們十四置難中就有如去如不去如亦去亦不去如非去非不去四問十四置難即十四無記在阿含經中是一再見到的大智度論這樣說何等十四難死後有神去後世無神去後世亦有神去亦無神去後世死後亦非有神去亦非無神去後世有死後如去有死後不如去有死後如去不如去有死後亦不如去亦不不如去如佛問先尼梵志汝見是色如去不答言不也受想行識如去不答言不也色中如去不答言不也受想行識中如去不答言不也離色如去不答言不也離受想行識如去不答言不也汝更見無色無受想行識如去者不答言不也梵志本總相為我佛今一一別問以是故答佛言不也比對前二則有沒有神去就是有沒有如去神是我的舊譯佛與先尼梵志的問答出於阿含經般若經引佛與先尼梵志的問答來說明大乘深義經上問色如與受想行識如的去不去而龍樹解說為梵志本總相為我佛今一一別問可見所問的如就是我如去約從前生來今生可名如來就是神我的來去如來一詞所有的兩種意義就是佛法與世俗神教的差別身心和合而有的眾生是世間的現實釋尊時代的印度對於眾生的生命延續從前生來今生從今生去後世已經是極大多數人的共同信仰眾生的前後延續生來死去總覺得有什麼在來來去去也就叫做如來或如去到了宗教學者要深一層的認識那生來死去的生命自體也就是到底什麼是生命自體印度宗教界對生來死去的我推論出多種不同的見解但有的世俗學者找不到什麼自我實體因而懷疑死後去後世而否定了生死的延續於是如去後世如不去後世等四個問題經常被提出而論究起來釋尊開示的佛法是無我論沒有自我實體而在緣起的原理上成立生死的延續這與神教是根本不同的在釋尊的正覺中沒有神教所說的我如沒有如如不變而隨緣來去的所以釋尊對他們提出的問題一向是不加理會然在隨順世俗的語言中也可以說我去也可以說如來因為眾生的死生延續是世俗的事實在佛教自身也有如來也是人天那樣有人格的但給以新的解說如來是從如中來從如實來是真如的圓滿體現者如實道的成就者也就是究竟圓滿的大聖者世俗一般的如來佛法所說的如來是根本不同的然在佛教普及大眾化的過程中同一名詞而有不同意義的如來可能會不自覺的融混不分而不免有世俗神教化的傾向我覺得探求如來藏思想淵源的學者一般都著重在藏而不注意到如來這對如來藏思想的淵源以及如來藏在佛法中的真正意義可能得不到正確的結論所以對如來是神我的異名這一世間神教學者的見解有必要將他揭示出來是胎藏印度宗教學而應用胎藏說的非常古老在梨俱吠陀的創造讚歌中就有創造神生主的金胎說從金胎而現起一切為印度古代創造說的一種胎是胎藏所以這一創造神話是生殖生長發展說是將人類孕育誕生的生殖觀念應用於擬人的最高神生主的創造大乘佛教在發展中如來與藏界藏與胎藏是分別發展的發展的方向也是極複雜的超越的理想的如來在菩薩因位有誕生的譬喻極可能由此而引發如來藏如來在胎藏的教說從如來藏的學理意義來說倒好像是古代的金胎說取得了新的姿態而再現或重視如來藏的三義以論究藏的意義實則如來之藏主要為通俗的胎藏喻如來在眾生位胎藏雖沒有出現而如來智慧德相已本來具足了如來藏說與後期大乘的真常我真常心真常唯心論是不可分離的

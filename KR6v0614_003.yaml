body:
  text: 第三章心性本淨說之發展第一節聲聞經論的心淨說如來藏說起初沒有與心性本淨相關聯然在如來藏說流傳中眾生身中有清淨如來藏與心性本淨客塵所染說有相似的意義所以心性本淨也就成為如來藏學的重要內容然早期的心淨說在佛法中的意趣何在與如來藏清淨說的內容是否相同如真的為了佛法而研求在論究如來藏思想淵源時就不能不加以深切的注意不能由於推重如來藏說發見了原始佛教以來的心性本淨以為源本佛說就可以滿足了心性本淨是與定有關的定學也稱為心學修定的要遠離五蓋蓋是覆蔽的意思貪瞋等五蓋有覆蔽的作用使心不得澄靜明淨與定有關的五蓋說啟發了心清淨的思想雜阿含經卷四七大正二三四一下說淨心進向比丘麁煩惱纏惡不善業諸惡邪見漸斷令滅如彼生金淘去剛石堅塊復次淨心進向比丘除次麁垢欲覺恚覺害覺如彼生金除麁沙礫復次淨心進向比丘次除細垢謂親里覺人眾覺生天覺思惟除滅如彼生金除去麁垢細沙黑土復次淨心進向比丘有善法覺思惟除滅令心清淨猶如生金以火冶鍊除去金色相似之垢令其純淨復次比丘得諸三昧不為有行所持得寂靜勝妙得息樂道一心一意盡諸有漏如鍊金師鍊金師弟子陶鍊生金令其輕軟不斷光澤屈伸隨意所作本經巴利藏編入增支部金師的陶鍊生金礦金漸漸純熟能做成種種莊嚴具比喻修定淨心的比丘漸漸的盡滅煩惱得到四禪六通自在生金的本質是純淨的只是夾雜些雜質冶鍊只是除去雜質使純淨的金質顯現出來鍊金的比喻還有增火灑水不增火不灑水的方法比喻修定的思惟止相思惟舉相思惟捨相三相除去鐵銅錫鉛銀五錆銹而使純金光澤堪用的譬喻鍊金的譬喻以外還有水喻貪瞋惛沈掉悔疑五蓋蔽心如鉢水中有黃赤等色熱氣沸騰青苔覆蔽風吹波動泥土渾濁離去了五蓋心得安住才能明解經書的義理辯才無礙水性本來澄淨如離去動亂穢濁的因素就能照出影像正如離五蓋而心得澄淨能引發慧解一樣還有浣頭浣身浣衣磨鏡鍊金等五喻比喻修佛法僧戒天隨念的能心離染污而得清淨這一類通俗的譬喻都有引發心本淨的可能增支部一集這樣南傳一七一五說比丘眾此心極光淨而客隨煩惱雜染無聞異生不如實解我說無聞異生無修心故比丘眾此心極光淨而客隨煩惱解脫有聞聖弟子能如實解我說有聞聖弟子有修心故這是阿含經中明確的心明淨說心是極光淨的使心雜染的隨煩惱是客可見是外鑠的而不是心體有這些煩惱心清淨而與客塵煩惱發生關係是如來藏說的重要理論不能不說是淵源於阿含經的心性本淨在部派佛教中是大眾部分別說部二大系所繼承宏揚的異部宗輪論大正五一五中下說大眾部一說部說出世部雞胤部本宗同義者心性本淨客隨煩惱之所雜染說為不淨大眾部的心淨說隨相論曾有所解說如僧祇等部說眾生心性本淨客塵所污淨即是三善根眾生無始生死已來有客塵即是煩惱煩惱即是隨眠等煩惱隨眠煩惱即是三不善根依隨相論說大眾部等以為心是本淨的三善根與三不善根隨眠一樣是與心不相應的類似種習那樣的善惡功能依三不善根而起煩惱依三善根而起信智等善法大眾部是但立善惡二性的心不是善不善心所法不過不善的隨眠與不善心所是可以離滅的所以與善根及善心所相契應而被稱為心性本淨的印度本土的分別說部如化地部等說一切有部論師是稱之為分別論者的如阿毘達磨大毘婆沙論卷二七大正二七一四中下說有執心性本淨如分別論者彼說心本性清淨客塵煩惱所染污故相不清淨彼說染污不染污心其體無異謂若相應煩惱未斷名染污心若時相應煩惱已斷名不染心如銅器等未除垢時名有垢器等若除垢已名無垢器等心亦如是分別論者的心淨說阿毘達磨順正理論卷七二大正二九七三三上也說分別論者作如是言唯有貪心今得解脫如有垢器後除其垢如頗胝迦由所依處顯色差別有異色生如是淨心貪等所染名有貪等後還解脫聖教亦說心本性淨有時客塵煩惱所染分別論者的心性本淨在煩惱未斷以前是性淨相染的雖有染污相而心的體性不變在分別論者說來有染污心與不染污心不是有兩類不同的心而是其體無異的一心只是相應煩惱斷與未斷的差別有染污是客塵所染是外鑠的其體無異的心本性是清淨的大毘婆沙論所說的一心相續論者與分別論者的見解是一致的如卷二二大正二七一一上說有執但有一心如說一心相續論者彼作是說有隨眠心無隨眠心其性不異聖道現前與煩惱相違不違心性為對治煩惱非對治心如浣衣磨鏡鍊金等物與垢等相違不違衣等聖道亦爾又此身中若聖道未現在前煩惱未斷故心有隨眠聖道現前煩惱斷故心無隨眠此心雖有隨眠無隨眠時異而性是一如衣鏡金等未浣磨鍊等時名有垢衣等若浣磨鍊等已名無垢衣等有無垢等時雖有異而性無別心亦如是一心相續論者所舉的譬喻是出於增支部三集的但有一心而性是一而性無別心亦如是與分別論者的其體不異完全一致在成實論中有相續心的一心論大毘婆沙論還有一覺論者這些可能不屬於同一部但是大同小異的心性本淨論者心性本淨是大眾部及分別說部系所主張的近於分別說部的舍利弗阿毘曇論引用心性清淨為客塵染的教說也與增支部所說相合但在說一切有部是沒有心性本淨的經說也否定了心性本淨的理論如阿毘達磨順正理論卷七二大正二九七三三上中說分別論者作如是言聖教亦說心本性淨有時客塵煩惱所染故不應說心本性淨有時客塵煩惱所染若抱愚信不敢非撥言此非經應知此經違正理故非了義說各部派所傳的阿含經有不少出入分別論者所誦的經中有心性本淨客塵所染說而說一切有部經中是沒有的在宗教的傳統信仰中要別人捨棄自宗的經文是不容易的所以只能論斷為非了義說依正理而作解說與會通總之在說一切有部及犢子部經部這是非經非了義說不過心性本淨說在佛法中是了義或不了義方便說或究竟說如以自宗的理論為標準是不可能為人接受的集成的四部阿含經有一古代傳來的判別準繩就是約四部的特性說有不同的四種宗趣如赤銅鍱部的覺音三藏初期大乘的龍樹菩薩就有類似的傳說那就是長阿含經是吉祥悅意世界悉檀中阿含經是破斥猶豫對治悉檀增壹阿含經增支部是滿足希求各各為人生善悉檀雜阿含經是顯揚真義第一義悉檀進一步說古傳的雜阿含經實綜合了修多羅祇夜記說三部分而成依四種宗趣來說修多羅是原始結集的相應教如蘊相應處相應等是第一義悉檀祇夜是順俗的偈頌起初是集十經為一頌的結集文記說有如來記說弟子記說諸天記說諸天記說後來也稱為祇夜就是八眾偈部分是世界悉檀弟子記說如舍利弗說目犍連說等是對治悉檀如來記說如聚落主婆蹉出家等是為人生善悉檀在原始聖典的考論中知道增壹阿含增支部主要是依如來記說如說三念四念六念四不壞信慈心十善等經如是語而擴編所成的心性本淨與鍊金等譬喻巴利藏都在增支部中漢譯雜阿含經鍊金譬喻屬於如來記說部分如考論沒有錯誤那麼如來記說與增支部所說心性本淨與鍊金等譬喻都是各各為人啟發人為善的意趣不是第一義悉檀顯揚真義當然是非了義說了成實論卷三大正三二二五八中說心性非是本淨客塵故不淨但佛為眾生謂心常在故說客塵所染則心不淨又佛為懈怠眾生若聞心本不淨便謂性不可改則不發淨心故說本淨成實論的思想近於經部成實論是不同意心性本淨的但對心性本淨的教說從應機設教對治的為人意義加以解說有些人以為心是常在住的在原始佛教中常心是愚癡的邪見對治常心的邪執所以說心是可以成為不淨的可以不淨可見心是非常了有些人自覺得心地不淨煩惱重重所以因循懈怠不能勇猛的發心修行為啟發這些懈怠人的善心所以說自心本來是清淨的暫時為煩惱所染為什麼不自勉而發淨心呢為什麼為眾生說如來藏寶性論舉出了五項理由第一項就是以有怯弱心與成實論為懈怠者說相合也與增支部的各各為人生善相合這應該就是說心性本淨的根本意趣心性本淨論者並不是從義理的論究中得出心淨的結論也不是大乘那樣以自己修持的體驗為依據古代的心性本淨論者如分別論者一心相續論者主要是應用世俗的譬喻以譬喻來說明心性本淨如上文所引的一心相續論者舉浣衣磨鏡鍊金等譬喻分別論者以銅器垢或除垢日月為五事所覆頗胝迦等譬喻這些譬喻如浣衣磨鏡鍊金除銅器垢比喻了性本清淨只是染上些塵垢可以用浣磨等方法來恢復本淨這是轉染還淨的說明這些譬喻有自體與外鑠的主客意義日月為五事所覆五事是煙雲塵霧羅睺羅手雖譬喻的意義相近但以日光與陰闇相關涉說明心與煩惱的相應相雜可以引申出道與煩惱同在的理論頗胝迦寶是瑩淨通明的與紅色等物品在一起就會成紅色等這一譬喻本是數論外道用來比喻自我與覺的順正理論引用了頗胝迦喻早一些的唯識學要典解深密經也用來比喻三性的染淨心性本淨論者專憑譬喻來說明的學風使我們想到了如來藏經大般涅槃經前分的風格古代的正理學派立譬喻量以為譬喻有成立正理的力量在後起的論理學中譬喻量沒有成立正理的力量而被取消了然古代以為是可以成立的所以部分佛經廣泛的應用成立心性本淨的譬喻是通俗的合於常情的在佛法普及化的過程中容易為人接受而日漸光大起來然佛法立二諦依世俗而引向勝義立四悉檀方便誘化而以第一義悉檀為究極瑜伽師地論立四真實在悟入的真實以外立世間極成真實道理極成真實道理極成真實是從叡智的觀察研究而來與世間極成真實不同這猶如科學的理論與常識的見解不同一樣心性本淨說始終以常識的譬喻為依據是平易近人的但決不是深徹的這所以阿毘達磨論師要一再的說世俗法異賢聖法異心意識一般是看作同名而異實的所以綜合為心意識一詞在經典的應用中雖然並不嚴格卻也表示出每一名字的特性這在古代阿毘達磨論師早就注意到了那麼心性本淨的心有什麼特殊的意義呢心的特義如古師說心是種族義彩畫是心業滋長是心業集起故名心淨不淨界種種差別故名為心滋長集起種族這些心的意義都是種種的積集依積集而有所生起彩畫的譬喻也是以種種色彩畫成種種圖像的意思所以對於種種的統一不離種種而起的心並不表示單一性如三增上學中稱定學為心學由於定是持心不動亂使散亂的歸於平靜於一境上心心相續不亂名為心一境性定也就名為心了後代大乘唯識學者以心為阿賴耶識正因為此識色聲香味觸等積集滋長故種種法熏習種子所積集故由種種法熏習種子所積集故由於這一特性除有關認識的執取的名為識引發行為發生諸識的名為意而外經中都泛稱為心心是通泛的總略的名詞在經中比起意與識來心的應用不少但都是不加分析的如與身相對的心身行與心行身受與心受身精進與心精進身輕安與心輕安身遠離與心遠離都是內心的通稱由於心為通稱所以雜阿含經卷一大正二六九下說比丘心惱故眾生惱心淨故眾生淨比丘我不見一色種種如斑色鳥心復過是所以者何彼畜生心種種故色種種眾生的惱雜染與清淨是以心為主導的因心的雜染而成為雜染心的清淨而成為清淨心是種種心一切內心作用都是可以稱為心的如相應部等立十六心他心智所知的心有貪心離貪心有瞋心離瞋心有癡心離癡心攝心散心廣大心非廣大心有上心無上心定心不定心解脫心不解脫心十六心的前六心也許會被想像為有貪心離貪心等似乎在貪瞋癡以外別有心體的存在然從攝心散心廣大心非廣大心等而論十六心的被稱為心到底不外乎通稱所以聖教所說的心是表示集中的積聚的總略的是種種的統一純屬於現象論的立場心有種種統一的意義所以在佛法的發展中學者的解說傾向於心的統一一如阿毘達磨論者的心王說人心有或善或惡或受或想或思等無數的作用在分別的論究中受想等被分離出來稱為從心而有依心而起的心所有法心所以外的稱為心王六識分離了心所有法的心近於現代心理學上的統覺作用從種種心所而論到所依的一心六識中的一識也會被誤解為心體與心用好在阿毘達磨論者不這麼說認為心與心所是同樣的只是總相知是心與種種別相知是心所的差別二如一心論者引用心遍行獨行而以為不同的六識只是一心的差別三如心性本淨論者經上說心極光淨客塵所染依世俗的譬喻而解說為性淨而相染心是內在的一心雜染或離染而心體是清淨的佛教界傾於內在的統一是與世間心境相應的一般人的見解總是這樣的說到死生相續就想到有一貫通前死後生者的存在否則就不能說前後延續說到從雜染到清淨從繫縛到解脫就設想為必有一貫通染與淨貫通縛與脫的存在這是世間的知見為成立一心或神我的意識根源心淨而有煩惱煩惱除了而心還清淨心就是貫通染淨的所依自體正如洗衣的衣磨鏡的鏡鍊金的金一樣以世俗譬喻而成立的心性本淨確是適合於世間一般的見識而富有啟發人心向善的作用第二節初期大乘的心性本淨說心性本淨起初為增支部所集錄後來為大眾部分別說部各派所宣揚成為佛教界論諍的主題之一大乘佛教興起採用了心性本淨說重慧的大乘如般若經等從般若體悟的立場給以不同的獨到解說成立於西元以前被考定為原始般若部分已經說到了這一問題如小品般若波羅蜜經卷一大正八五三七中說菩薩行般若波羅蜜時應如是學不念是菩薩心所以者何是心非心心相本淨故爾時舍利弗語須菩提有此非心心不須菩提語舍利弗非心心可得若有若無不舍利弗言不也須菩提語舍利弗若非心心不可得有無者應作是言有心無心耶舍利弗言何法為非心須菩提言不壞不分別與本經同類而廣略不同的經本很多唐玄奘所譯的就有五部大般若經的前五分無論是梵本漢譯本等文字上有些出入而以本性淨來證成是心非心是沒有實質差異的是心非心對於部派佛教中以為相續心或與煩惱相應的心本來是清淨的見解可說是從根本上給以否定般若經所說的非心是心空心不可得的意思心性寂滅不可得所以說心的本性清淨接著引起兩層問答一是心非心不要以為有一非心的心這是常情的意解因為既然非心不應該再問是有是沒有非心是超越了有與無的概念不能說是有是無的二非心心不可得是說不壞不分別沒有變異壞沒有差別玄奘所譯的前三分作無二無二分或無分無別就是真如不是世間分別心所分別那樣的對於心性本淨般若經從勝義體悟的立場糾正以心為清淨的見解一直為後代中觀唯識二派所宗奉所引的經文比對小品類般若經的各種本子所說的心有菩薩心菩提心的不同如不念是菩薩心所以者何是心非心心相本淨故心不當念是菩薩其心不當自念我是菩薩不執著是菩薩心彼菩薩雖如是學不應生心我如是學不當念是我知道意不執著大菩提心在大乘佛教的開展中起先是菩薩心遲一些才成立菩提心一詞如上文所引的是後漢西元二世紀八十年代支婁迦讖所譯的道行般若經為最古譯出的般若經是唐玄奘所譯的大般若經的第五分是文字最簡短的最先譯出的最簡短的都作菩薩與心與鳩摩羅什所譯的小品般若經一致從文義的先後來說須菩提說菩薩菩薩的名字不可得般若般若的名字不可得菩薩與般若都不可得如聽了而能體悟不驚不怖的那就是菩薩應學的般若波羅蜜接著說菩薩這樣的學不念不執著不高慢是菩薩心上文從菩薩與般若我法的都不可得指出菩薩應這樣的學般若然後使菩薩反觀自心知道我法都不可得的心也是不可得而不可著的依修行的過程來說前說所觀的不可得次說能觀的不可得如改作菩提心在文義上就不免感到突然了在大乘佛教開展中菩提心受到了佛教界的重視菩薩心也就被轉化為菩提心了如是吳支謙西元三世紀初譯出的大明度經作不當念是我知道意道意是菩提心的古譯是玄奘所譯大般若經的第四分譯為不執著大菩提心現在梵本的八千頌般若經也作菩提心不應著有高慢的意思進一步到了大品般若經及十萬頌般若經與玄奘譯的前三分相當就引申為菩提心無等等心廣大心三心羅什所譯的大品般若經作得是心無等等心大心得是心一定是菩提心的訛寫這樣本是觀能觀心的本性清淨演化為菩提心的本性清淨了心性本淨的清淨有明淨的意思是繼承阿含經說而來的依般若經說清淨並不局限於心的本性而是通於一切法的如小品般若經說一切法本清淨相清淨般若經是形容諸法甚深相的經說極多如小品般若波羅蜜經卷七大正八五六六下說如來所說無盡無量空無相無作無起無生無滅無所有無染涅槃但以名字方便故說大般若經第五分說諸如是等無量法門義實無異皆是如來方便演說無染是清淨的異名所以大智度論卷六三大正二五五七上說諸法實相常淨是清淨有種種名字或名如法性界實際或名般若波羅蜜或名道菩提或名無生無滅空無相無作無知無得或名畢竟空等如是無量無邊名字依經論所說清淨無生空等都是異名同實方便的約境說名為真如法界實際等約行說名為空無相般若等約果說名為菩提涅槃等雖有種種名字而都表示那勝義的體悟內容般若經的心本性淨可說引發了自性清淨如來藏說但方法是不同的般若經是平等法門觀一切法都是本性空的如說本性淨那就是一切法本性淨如摩訶般若波羅蜜經卷三大正八二三四上在說明了是心非心心相本淨故接著就說舍利弗復問須菩提但心不壞不分別色亦不壞不分別乃至佛道菩提亦不壞不分別耶須菩提言若能知心相性不壞不分別是菩薩亦能知色乃至佛道不壞不分別不壞不分別是心非心相的意義在菩薩觀慧中不但是心色佛菩提一切都是不壞不分別也就都是本性淨的所以般若經說我不可得佛不可得畢竟淨故我不可得五眼不可得畢竟淨故小品般若波羅蜜經卷三大正八五五一中說須菩提色淨即是果淨色淨故果亦淨受想行識淨即是果淨受想行識淨故果亦淨須菩提色淨即是薩婆若淨薩婆若淨故色淨須菩提色淨薩婆若淨無二無別無異無壞受想行識淨即是薩婆若淨薩婆若淨故受想行識淨須菩提薩婆若淨受想行識淨無二無別無異無壞般若經是實踐的平等法門說一切法本空一切法本淨而不是特重於心性本淨的所以說清淨我與法色與心凡與聖道與果沒有一法不是畢竟清淨的這是般若正觀的平等法門是實踐的向上的如來藏自性清淨指出眾生本有如來性為成佛淨因或以如來藏為依止建立凡聖染淨一切法這是重於心或我的說明的從上向下的或稱之為卻來門所以般若經的心性本淨說可能引發如來藏說卻不是如來藏說般若經說一切法本性空又說一切法畢竟空說本性淨又說畢竟淨淨與空有什麼不同意義呢大智度論卷六三大正二五五八下說畢竟空即是畢竟清淨以人畏空故言清淨空與淨只是名字不同而內容是一樣的佛法所說的空是最甚深處而聽者容易想像為什麼都沒有愛有惡空是眾生的常情所以大乘空義屬於少數而非一般人所能信受的信受也容易誤解的為了教化的方便所以又稱為本性淨畢竟淨雖內容還是一樣而在聽眾聽起來似乎有清淨微妙的存在只要有所依著就易於接受了龍樹這一解說對初期大乘說空而演化為後期大乘的說有提貢了一項應機設教的合理解說初期大乘經的部類非常多有關心性本淨說大抵與般若經相契合如思益梵天所問經卷三大正一五五一中說前際一切法淨後際一切法淨現在一切法淨是三世畢竟淨無能令不淨性常淨故是以說一切諸法性常清淨何謂諸法性淨謂一切法空相無相相無作相是名性常清淨以是常淨相知生死性即是涅槃性涅槃性即是一切法性是故說心性常清淨譬如虛空若受垢污無有是處心性亦如是若有垢污無有是處以心相實不垢污性常明淨是故心得解脫思益經從一切性空無相無作的常清淨說到心性常清淨舉虛空為譬喻比喻凡夫心從來不為客塵所染污這是在法法性淨的理念中闡明心解脫的可能因為設垢污者不可復淨修行而能達成心淨解脫可見心性的本來清淨大乘經採用心性本淨說是應用到多方面的如持世經所說的心念處觀心的生滅虛妄無實從本以來不生不起性常清淨客塵煩惱染故有分別從通達心無心相不分別是心是非心但善知心無生相不得心垢相不得心淨相但知是心常清淨相心常清淨是超越於是垢是淨的不著垢相淨相才是經說心性常淨的意趣所在阿闍世王經是以悟解罪性本空而懺除罪業為主題的懺罪的教授是說明心不可得不在內不在外不在中間過去心已滅未來心未至現在心不住心無形無處無來無去心如虛空那樣煙霧等五事不能使虛空有垢所以說心者本淨故亦無有沾污亦無有而淨者如大淨法門經應用於煩惱即菩提的說明一般以為心本清淨而不知一切法本來清淨貪瞋癡等煩惱也是本來清淨所以說若能思惟分別貪欲瞋怒愚癡及諸塵勞本悉清淨是則菩薩求佛道也從這幾部大乘經來看心性本淨只是心空不可得的別名決不是說心有清淨莊嚴的功德

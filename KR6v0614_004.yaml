body:
  text: 第四章如來藏說之孕育與完成第一節法法平等與事事無礙如來藏說不是直承原始佛教的法流而是繼承初期大乘適應世俗有了獨到的發展不共大乘初期的大乘經可以般若華嚴為二大流般若經與華嚴經現存的都是大部這是不斷的傳出而再組集為一部的在發展而次第集出中般若的傳出早一些但彼此都互相影響而又表現出獨特的風格般若經所說的是菩薩道菩薩道是以般若的都無所住為主導重於正法的悟入在般若的如實觀中一切法境行果一切人聲聞辟支佛菩薩如來都如幻如化本性空寂代表自證內容的真如法界實際也不離如幻如化本性空寂般若經是以本性空為門引導行人透出名相分別的戲論也就是超脫了語言與思惟現證戲論寂滅的不過菩薩忍而不證以免落入二乘在現證中說作什麼也是不相符的超越了時空性所以沒有先後沒有內外彼此沒有體的生滅質的垢淨量的增減可說沒有對立二也就沒有矛盾也沒有變異充分表顯了大乘深觀的特性釋尊方便說法說世間與出世間有為與無為生死與涅槃安立相對的論門不是相對就無法可說使人捨有為而入無為捨生死而得涅槃後代的佛弟子依名相安立落入相對的有諍論處世間與出世間的對立隨順世俗而有礙於勝義的現證般若經以一切性空為門達到了一切無二無分別如世間與出世間有為與無為生死與涅槃在如法界實際的勝義現證中無二無分別開展了一切本空一切皆如一切平等的理念般若波羅蜜能滅諸邪見煩惱戲論將至畢竟空中中論說諸法實相者心行言語斷無生亦無滅寂滅如涅槃戲論寂滅的自證不能說沒有也不能說有世俗的有無概念都不能表示戲論寂滅的現證稱之為空也只是假名安立要人無所住著而已然般若法門在開展中漸演化為不同的二流一在現證時一切戲論一切幻相都不現前如清辨引般若經說慧眼都無所見這是般若法門的本義如瑜伽師不許圓成實性是空而在根本智證真如真見道中也還是一切依他幻相泯滅不現前的二西藏傳說有二宗在於現境斷絶戲論的極無所住如上所說外還有現起與空寂無礙的理成如幻這二宗在中國佛學中就是證真空與中道了在般若法門中這二者是次第發展所成的可以引為證明的如鳩摩羅什所譯摩訶般若波羅蜜經卷二大正八二二七中下說慧眼菩薩不作是念有法若有為若無為若世間若出世間若有漏若無漏是慧眼菩薩亦無法不見無法不聞無法不知無法不識慧眼是現證般若經上所說的第一節是不念一切法下一節是無一法不知經文用一亦字那是慧眼不見一切而又無所不見就是中國學者所說的見中道了玄奘所譯與前摩訶般若經相當的大般若波羅蜜多經第二分卷四四大正七二一下說菩薩摩訶薩慧眼不見有法若有為若無為若有漏若無漏若世間若出世間是菩薩摩訶薩慧眼不見有法是可見是可聞是可覺是可識第二分所說與清辨所說相合第三分也是這樣說羅什所譯的不見一切而又無法不見的慧眼明顯的與奘譯不同大般若波羅蜜多經初分卷八大正五四三中說諸菩薩摩訶薩得淨慧眼不見有法若有為若無為不見有法若有漏若無漏是菩薩摩訶薩得淨慧眼於一切法非見非不見非聞非不聞非覺非不覺非識非不識初分的非見非不見意思還是一切不見只是進一步說不見也不可得而已無所不見無所不識其實是佛眼這是各種譯本所共同的將佛眼的無所不見作為慧眼的德用摩訶般若經如此古譯的放光般若經光讚般若經大智度論所依的二萬二千頌經本也如此大智度論卷三九大正二五三四八上中說諸佛慧眼照諸法實性盡其邊底以是故無法不見無法不聞無法不知無法不識問曰佛用佛眼無法不知非是慧眼今云何言慧眼無法不知答曰慧眼成佛時變名佛眼成佛時失其本名但名佛眼無法不知是屬於佛眼的為什麼也作為慧眼的內容智論解說為慧眼成佛時變名佛眼表示慧眼與佛眼只是名字的差別淺深的差別而不是體性的不同在菩薩通達法性時佛眼就是慧眼如究竟明淨通達就稱為佛眼這如十地經所說從初地到十地都名為一切智智那樣般若法門的發展到後來慧眼從一切法無所見到達無所見而無所不見這一演進的程序成為中國佛教界真空與中道的思想根源另一引起不同意解的如小品般若波羅蜜經卷六大正八五六一下說菩薩得阿耨多羅三藐三菩提時為衆生說色趣空說受想行識趣空一切法皆趣空不來不去何以故色空不來不去受想行識空不來不去乃至一切法空不來不去故一切法趣空不過是趣一切法趣無相趣無作趣無起趣無生趣無所有趣夢趣無量趣無邊趣無我趣寂滅趣涅槃趣不還趣不趣一切法不過是趣趣是究竟歸向的意思求一切法的究竟相一切法無不是空的無不是無生無我的寂滅涅槃的末後的不還不趣是總說沒有趣與不趣這只是一切法終歸於空不出於如沒有比這更甚深的所以說不過是趣或譯為於如是趣不可超越與般若經所說的深法相深奧義是完全符合的與小品文段相當的摩訶般若波羅蜜經卷一一五大正八三三二下三三三下說為衆生說色趣空說受想行識趣空乃至說一切種智趣空一切法趣空是趣不過何以故空中趣不趣不可得故一切法趣無相趣無作趣無起趣無所有不生不滅不垢不淨一切法趣夢趣幻趣響趣影趣化一切法趣無量無邊趣不與不取趣不舉不下趣不來不去趣不入不出不合不散不著不斷一切法趣我衆生壽命人起使起作使作知者見者一切法趣有常趣樂淨我趣無常苦不淨無我一切法趣欲事趣瞋事癡事見事一切法趣如越法性實際不可思議性趣平等趣不動相一切法趣色趣受想行識十二入十八界一切法趣檀波羅蜜趣尸羅趣羼提趣毗梨耶趣禪那趣般若波羅蜜一切法趣內空趣外空趣內外空乃至一切法趣無法有法空一切法趣四念處乃至八聖道分一切法趣佛十力乃至一切種智一切法趣須陀洹果斯陀含果阿那含果阿羅漢道辟支佛道趣阿耨多羅三藐三菩提一切法趣須陀洹乃至佛是趣不過何以故須陀洹乃至佛中趣不趣不可得故小品般若所說只是一切法趣於如夢如幻本性空寂的涅槃最甚深處摩訶般若波羅蜜經所說有二大段從一切法趣空到一切法趣平等趣不動大體與小品經相合以下的一大段一切法趣色識到一切法趣佛大智度論卷七一大正二五五六下解說為色等法亦爾終歸於空諸法究竟相必空故餘者皆虛妄我等十六名皆因五衆和合假有此名無有實法如常樂我淨等四法不可得以顛倒故色等諸法亦如是色等蘊處界法六度十八空三十七品等行法須陀洹果等果法須陀洹佛等人一切都無非是假名施設終歸於空所以經說一切法趣色到趣佛都以畢竟不可得故說明沒有趣與非趣可說一切法趣一切法其實是一切法趣一切法性畢竟不可得空如不過一切法趣一切法的經文可能被意解為一切法與一切法無著無礙與華嚴相涉相入的思想合流華嚴經也是宣說菩薩行的中國佛學所說的修行位次十住十行十回向十地就是依據華嚴經的集成次第而被公認為菩薩行位次第的但般若著重於菩薩的自行化他無所得為方便的進修而華嚴是以如來甚深果德為重的古譯的兜沙經是大部華嚴的少分三曼陀跋陀羅菩薩經說到般若波羅蜜兜沙陀比羅經兜沙陀比羅義譯為如來篋藏如來甚深果德的顯示在大部華嚴經中如晉譯本的世間淨眼品盧舍那佛品就是唐譯本的前六品在大衆部中如來的無漏身已經是色身無邊際壽量無邊際威德無邊際一音說一切法一念知一切法同時十方有無量世界無數佛現在原則的說這些都與華嚴經說相同承受這些信念在平等寂滅的悟解中以信仰的藝術的神祕的意境將如來的甚深果德無盡利生的大用充分表達出來成為莊嚴瑰奇的毗盧遮那佛華藏莊嚴世界海以此為信解修證的理想然後明菩薩的行位到成佛般若所顯示的無性空不生不滅寂靜無二無別一切法的平等寂滅華嚴經是相同的一般以為華嚴經是妙有說然與後期大乘批判一切法空而別說不空並不相同法法平等正如維摩詰所說經所說的如者不二不異無分別無變異一切衆生皆如也一切法亦如也衆聖賢亦如也至於彌勒亦如也法法的勝義平等如說到事相凡聖道果生死涅槃一切是世俗施設所以一切是唯名唯表唯假施設這是般若法門深入勝義而不違世俗的善巧對於法法平等如不重視世俗施設的一切法與勝義現證的如的不即不離而直說一切法的無二無別自然會引出一切法相即相入法法無礙的理論如衆生如此如來也如此衆生與如來無二無別那就可以意解出衆生不離如來如來不離衆生衆生即如來如來即衆生大衆部說如來色身無邊際也就是佛身遍滿而無所不在這是信仰的事實受到法法平等相涉相入思想的啓發那就佛與佛相即相入平等無礙也可以意解出如來遍在衆生中衆生遍在如來中如來與衆生也相即相入而平等無礙這樣衆生身中有如來的如來藏說在華嚴的無礙法界中以象徵的譬喻的形式漸漸的開展出來第二節華嚴經含蓄的如來藏說如來藏思想隱約的出現於華嚴經中以譬喻的象徵的而表示出來在華嚴經中主要的就有三處一寶王如來性起品晉佛陀跋陀羅所譯為華嚴經第三二品晉竺法護所譯的名如來興顯經唐實叉難陀所譯華嚴第三七品名如來出現品梵文也是如來興起出現的意義晉譯作如來性起性起為後代華嚴學家所重視大方廣佛華嚴經寶王如來性起品卷三五大正九六二三下六二四上說無有衆生無衆生身如來智慧不具足者但衆生顛倒不知如來智遠離顛倒起一切智無師智無礙智佛子譬如有一經卷如一三千大千世界大千世界一切所有無不記録彼三千大千世界等經卷在一微塵內一切微塵亦復如是佛子如來智慧無相智慧無礙智慧具足在於衆生身中但愚癡衆生顛倒想覆不知不見不生信心爾時如來以無障礙清淨天眼觀察一切衆生觀已作如是言奇哉奇哉云何如來具足智慧在於身中而不知見我當教彼衆生覺悟聖道悉令永離妄想顛倒垢縛具見如來智慧在其身內與佛無異三千大千世界經卷在一微塵內譬如如來智慧在衆生身內一切微塵都是這樣就是一切衆生都有如來智慧約佛說佛的智慧遍入一切衆生身中約衆生說衆生具足如來智慧衆生身依寶性論所引原文為應譯作衆生心相續這一段文在寶王如來性起品的如來應供等正覺心段中表示了衆生具有如來智慧說是衆生心的本具如來智德這一經文被看作如來藏說為後代如來藏學者所一再引述如來藏經的譯者佛陀跋陀羅譯作如來性起又在本品末說如是微密法無量劫難聞精進智慧者乃聞如來藏明確的說到了如來藏然唐譯與此相當的作如是微密甚深法百千萬劫難可聞精進智慧調伏者乃得聞此祕奧義晉譯的如來藏是祕奧藏可以從旁證而確定的如說如是洪範則是如來祕奧之藏此經名為一切諸佛微密法藏此法門名為如來祕密之處三種不同譯本都稱這一法門為如來祕密藏可見晉譯本的如來藏是如來祕密藏祕密處而不是胎藏的藏寶王如來性起品傳出的時間遲一些思想與如來藏說相近但還沒有如來胎藏的名目二十地品一般稱為十地經竺法護譯為漸備一切智德經鳩摩羅什譯為十住經在本品中與如來藏說相近的有金喻與寶喻金鍊金喻雜阿含經已說到了本品的鍊金喻是分散在十地中的每一地都以金為譬喻比喻此諸功德皆回向薩婆若轉益明顯隨意所用一切善根轉勝明淨等以鍊金喻說明地上的功德善根一地一地的展轉增勝菩薩的功德善根當然以智菩提德為主所以這一法門名為漸備一切智德大摩尼寶喻在十地品末如大方廣佛華嚴經卷二七大正九五七五中說譬如大摩尼寶珠有十事能與衆生一切寶物何等為十一出大海二巧匠加治三轉精妙四除垢穢五以火鍊治六衆寶莊嚴七貫以寶縷八置琉璃高柱九光明四照十隨王意雨衆寶物菩薩發菩提心寶亦有十事何等為十一初發心布施離慳十諸佛授智職於一切衆生能為佛事墮在佛數大摩尼寶的從海中得來經治鍊到懸在高柱上雨一切衆寶如衆生發大菩提心從初地十地而成佛寶從大海中來還需要治鍊但寶的體性與德用是早已成就了的與金從礦中採出經冶鍊而製成飾物而金性是礦中已經成就了的一樣以此來譬喻菩提心菩提心從初地到十地成佛是菩提的發起到圓滿菩提暗示了菩提是本來如此的金喻與寶喻以菩提智德為主而說明菩提的離垢到究竟清淨發生無邊的利生德用在本品中也沒有說到如來藏的名目但如來藏學者作為衆生本有菩提與如來藏說為同一內容三盧舍那品晉譯的盧舍那品第二與唐譯本的第二六品相當盧舍那毗盧遮那佛的世界名華藏莊嚴世界海從世界住在蓮華上得名如唐譯大方廣佛華嚴經說此香水海有大蓮華名種種光明蘂香幢華嚴莊嚴世界海住在其中華藏世界海法界等無別莊嚴極清淨安住於虛空此世界海中剎種難思議如是諸剎種悉在蓮華住世界是住此蓮華上的世界中有佛出現有菩薩衆翼從這又都是坐在蓮華上的佛與世界都安住在蓮華上到底意義何在大智度論卷八大正二五一一六上說劫盡燒時一切皆空衆生福德因緣力故十方風至相對相觸能持大水水上有一千頭人二千手足名為韋紐是人臍中出千葉金色妙寶蓮華其光大明如萬日俱照華中有人結跏趺坐此人復有無量光明名曰梵天王此梵天王心生八子八子生天地人民是梵天王坐蓮華上是故諸佛隨世俗故於寶華上結跏趺坐韋紐臍中生蓮華梵天王坐蓮華上是印度的創造神話這一創造天地人民的神話與摩訶婆羅多詩篇第三卷二三章的傳說相近所以華藏世界住蓮華上佛菩薩坐蓮華上都不過是隨世俗法在印度神教文化區中為了適應神教信仰的新適應從蓮華的表徵來說是有相當意義的蓮華是深受人類推重的阿含經與法句已經用蓮華為譬喻部派佛教中塔與支提的莊嚴也有作蓮華形的蓮華的受人重視有兩點一蓮華生在淤泥裡卻不受淤泥的污染微妙香潔阿含與法句以蓮華為譬喻象徵共三乘聖者的不染煩惱品德的高尚與清淨我國周敦頤的愛蓮說也只是這個意思如約不離淤泥而生長來說那就如不離生死與煩惱的菩薩如維摩詰經所說的二蓮華從含苞到開放蓮實已在華內生長等到華瓣脫落蓮實蓮臺就完全呈現出來平常說華嚴是以萬行之因華嚴萬德之佛果華如菩薩行蓮實如佛果在菩薩修行時佛果菩提已內在等到因行滿足也就是圓滿菩提象徵這一意義的是蓮華開而如來出現坐在蓮華臺上華嚴經與法華經重視佛果都以蓮華為譬喻所以盧舍那品所顯示的華藏莊嚴世界海以及佛菩薩坐蓮華上都暗示了菩提本有待萬行而顯出莊嚴佛果的意思蓮華開敷中有如來坐在蓮華座上有通俗的神話背景容易在佛教中傳開而有類似意義的如來藏說也就適於通俗而流行起來華嚴經所傳的華藏莊嚴世界海藏文譯本中有即如來藏的胎藏蓮實在華內正如在胎內一樣不過唐代所傳華藏世界海的原語還是沒有胎藏的總之華嚴經的微塵內有三千大千經卷喻及金喻寶喻特別是華藏所象徵的意義即使還沒有明確的提到如來藏一詞但如來藏說已確乎達到了呼之欲出的階段第三節心菩提心菩提衆生界華嚴法門是起於南方的南方的部分持法比丘取華嚴經等譬喻宣揚如來常恆及有性的法門而後如來藏如來界佛藏佛性衆生界我的教說形成真我不空大乘的一大流是重在如來果德及衆生本有佛性的如來藏說的引發因緣是多方面的菩提與菩提心是近於如來藏說的如華嚴經寶王如來性起品如來應正等覺心中說到如來智慧菩提的異名在衆生心相續中十地品的金喻與寶喻是比喻十地所有菩提心一切智智的升夜摩天宮品說心如工畫師能畫諸世間五蘊悉從生無法而不造如心佛亦爾如佛衆生然若人欲了知三世一切佛應觀法界性一切唯心造十地品說三界所有唯是一心華嚴的唯心說當然是心性本淨的一般的說菩提無上菩提是如來的果智聲聞法中約修行所成就說以為菩提是有為法在大乘中菩提是超越時空相對性的如維摩詰所說經說菩提者不可以身得不可以心得以世俗文字數故說有三世非謂菩提有去來今大乘所說的菩提心是求得佛菩提的心發菩提心只是上求佛道菩提的願欲論到菩薩行位十住說比歡喜等十地說要早些十住的初住名發心住如大方廣佛華嚴經卷八大正九四四五上說何等是菩薩摩訶薩初發心住此菩薩見佛三十二相八十種好妙色具足尊重難遇或覩神變或聞說法或聽教誡或見衆生受無量苦或聞如來廣說佛法發菩提心求一切智一向不回初發心住的發菩提心是願求一切智堅定不移的重頌中廣說發心都這樣說悉欲菩薩於此初發心發大誓願志求佛道是菩提心的原始意義在大乘法的開展中菩提心不只是菩提願這是不可缺的更有深一層的意義那就是菩提的自覺佛菩提的少分顯發如小品般若說是心非心心相性本淨故本來是泛說菩薩心到了大品般若如大般若經的前三分就舉菩提心無等等心廣大心而說本性淨也就是本淨菩提心本淨菩提心稱為勝義菩提心而願求一切智的菩提心被稱為世俗菩提心十地品明勝義菩提心也說十無盡藏大願菩提心是心淨性也是本有佛菩提的顯發展轉明淨所以用金與寶來譬說直指衆生身中有佛性是如來與如來藏說菩薩位中本有菩提的顯發是菩提與菩提心說這二說有著共同的傾向所以後代學者作為同一法門來處理以菩提菩提心為主的聖典數目不少這裡只略舉為例依華嚴經十地品的內容增減而別為編集的如姚秦鳩摩羅什所譯的莊嚴菩提心經元魏吉迦夜所譯的大方廣菩薩十地經唐菩提流志所譯的編入大寶積經四十五會的無盡慧菩薩會都是同本異譯大同小異陳真諦所譯金光明經的陀羅尼最淨地品也是同本而略有增減只是人名的變化罷了這幾部經首先問何者是菩提心菩提與心的關係說到菩提心薩埵衆生一切法都是假名安立而無所得的若於一切法無所得是名得菩提這是隨順般若般若相應的從菩提的不可施設非三世而說到心衆生一切法莊嚴菩提心經說菩提即是心心即是衆生若能如是解是名菩薩修菩提心與華嚴經的心佛衆生三無差別相合菩薩修行以發菩提心為先而發菩提心要從非去來今的菩提說起這是與如來藏說有著共同的傾向曇無讖所譯大集經的序品陀羅尼自在王菩薩品竺法護所譯的名大哀經這是寶性論所依的本經在古人的心目中這至少是與如來藏說有密切關係的寶性論依序品立佛寶法寶僧寶三寶性而歸於佛寶依陀羅尼自在王菩薩品立如來界菩提如來功德如來業到底本經說些什麼陀羅尼自在王菩薩品中先說菩薩大行四菩薩瓔珞莊嚴八菩薩光明十六菩薩大悲三十二菩薩善業次說如來果德如來十六大悲如來三十二業十力四無所畏十八佛不共法以不斷菩薩授記為如來真實之業其次降魔說八種陀羅尼寶炬陀羅尼大集經的這一部分被作為如來藏說可說是論師的方便經上說不斷三寶種性依之而立三寶性其實不斷三寶種性的話是多種大乘經所說的而序品中提到佛菩薩衆所說的法門也是極一般的說菩薩行與佛功德也不能說與如來藏有什麼關聯有些近似的是所說的如來十六大悲如來為衆生起大悲是由於衆生的不知菩提經上說菩提是無根無住清淨寂靜心性本淨不取不捨無想無緣非是三世無身無為無有分別無有句義不可以身得不可以心得無取無緣名之為空同於虛空名真實句非內非外無漏無取清淨寂靜光明無諍如大方等大集經卷二大正一三一一中一三中說如來所得無上菩提無根無住根名我見住名四顛倒一切衆生皆悉無有無根無住欲施衆生無根無住起大悲心如來於此欲令知故演說正法其餘十五大悲體例相同依陀羅尼自在王品可說衆生本來就是菩提那樣的菩提無根無住衆生也無根無住可是衆生不知道如來所以起大悲心而為說法這與華嚴經的慨歎奇哉奇哉云何如來具足智慧在於身中而不知見是同一意境衆生不知不得如來為此而起大悲有十六事如菩提名之為空同於虛空與如來藏說不同而是近於般若華嚴的在廣說如來德業以後有寶珠譬喻如大方等大集經卷三大正一三二一下說善男子諸佛所說觀察衆生及佛世界解脫涅槃等無差別佛觀法界皆一味已轉不可轉正法之輪善男子譬如善識真寶之匠於寶山中獲得一珠得已水漬從漬出已置醋漿中從醋漿出已置之豆汁意猶不已復置苦酒苦酒出已置衆藥中從藥出已以㻲褐磨是名真正青琉璃珠善男子如來亦爾知衆生界不明淨故說無常苦及以不淨為壞貪樂生死之心如來精進無有休息復為演說空無相無願為令了知佛之正法如來精進猶不休息復為說法令其不退菩提之心知三世法成菩提道經中先列舉衆生世界解脫涅槃的法界一味凡聖依正的平等一如作為佛法的究極意義然後說明如來的次第說法從礦中採得的寶珠如衆生界不明淨經佛法的修治成菩提道入佛境界就是明淨的寶珠衆生界的離垢清淨青琉璃寶譬喻不約菩提心說起而是直從衆生界說起到成菩提道入如來境界與如來藏說完全一樣關於如來說法分三階段初說無常苦無我是聲聞法見寶性論引文次說空無相無願令菩薩少分的了解正法末說不退轉法輪使得三事清淨證入正法這一次第與解深密經無自性相品所說的三時教雖略有不同而在說一切法空無相無願以上有更深一層的教法大體是一致的這是三時教的又一型從青琉璃喻可以看出陀羅尼自在王菩薩品的集成是在般若法門盛行以後的經文的護法降魔中有象徵如來藏法門的部分如大方等大集經卷四大正一三二二中說魔王聞是語已如教諦觀見其䐡中有一世界名水王光有佛世尊號寶優鉢羅其世界中有大寶山如來處中結加趺坐與諸菩薩宣說正法諸法神通王菩薩自稱我此身常住無變在他的䐡中有世界與佛寶優鉢羅晉譯作樂蓮華首有大寶山晉譯作又有蓮華名寶莊嚴這是佛菩薩所坐的與印度神話有關象徵諸法神通王身中有此蓮華中有佛寶器如來藏陀羅尼自在王菩薩品雖沒有如來藏的名詞但說到菩提功德衆生界及身中有寶器的譬喻所以受到寶性論主的重視第四節如來藏經繼承華嚴的寶王如來性起品以如來藏為主題而出現於大乘佛教界的是如來藏經這是對以後的大乘佛教有極深遠影響的譬喻集僧祐出三藏記集說到晉惠帝時西元二九三六法矩譯出大方等如來藏經舊録作佛藏方等經如來藏經的傳來中國與竺法護所譯華嚴部的如來興顯經漸備一切智德經大集部的大哀經陀羅尼自在王菩薩品與序品的舊譯等同時可見如來藏經的集出約與這幾部經同時可能多少遲一些成立於西元二五年以前法矩所譯的經本已經佚失了現在存有東晉佛陀跋陀羅的大方等如來藏經唐不空所譯的大方廣如來藏經傳說本經是如來成道十年所說表示比佛成道時所說的華嚴要遲些吧經文一開始佛就現神變象徵了這一法門如大方等如來藏經大正一六四五七上中說世尊於栴檀重閣正坐三昧而現神變有千葉蓮華大如車輪其數無量色香具足而未開敷一切花內皆有化佛一一蓮花放無量光一切蓮花同時舒榮佛神力故須臾之間皆悉萎變其諸花內一切化佛結加趺坐各放無數百千光明見佛百千億坐彼蓮花藏神變所現的無數蓮華華內都有化佛華開了又萎謝了一切佛都顯現出來坐在蓮華藏上這與華嚴經的華藏相同華藏在唐譯本中作華胎正是蓮華沒有開以前華內已有的蓮實這一神變所表徵的意義就是衆生身中有佛經修持而顯現出來為了開示這一神變的意義舉九種譬喻一萎華有佛二蜂群繞蜜三糠糩粳糧四不淨處真金五貧家寶藏六穀內果種七弊物裹金像八貧女懷輪王九鑄模內金像九種譬喻中萎華有佛是如來在華藏中也就是名為如來藏的根本喻其他貧賤女懷輪王出於大寶積經十地經的金喻與寶喻本經共有四喻不淨處真金貧家寶藏弊物裹金像鑄模內金像都只表示如來本有而沒有十地經所說的治鍊意義蜂蜜糠粳果種喻為本經獨有的比喻這九種譬喻後代論師寶性論主解說為如來藏為九類煩惱所染然九喻的共同意義是在衆生煩惱身中有清淨如來到底衆生身中的如來胎藏是怎樣的呢如大方等如來藏經大正一六四五七中下四五八中四五八下四五九上說一切衆生貪欲恚癡諸煩惱中有如來智如來眼如來身結加趺坐儼然不動有如來藏常無染污德相備足如我無異如來知見力無所畏大法寶藏在其身內彼如來藏清涼無熱大智慧聚妙寂泥洹名為如來應供等正覺佛藏在身衆相具足如來藏是衆生身內的如來知見力無所畏大智慧聚也就是妙寂的涅槃然依第一則說如來藏不但是如來智也是如來身如來眼衆生具足結加趺坐與佛沒有不同正如楞伽經引經所說如來藏自性清淨轉三十二相入於一切衆生身中這樣的如來藏與如來同樣的相好莊嚴衆生身內有這樣的如來藏難怪楞伽會上提出一般人的懷疑這樣的如來藏不就是外道的神我嗎華嚴經的華藏法門重重無盡事事無礙表顯出宏偉莊嚴的佛德這是菩薩所仰望菩薩進修的理想盧舍那毗盧遮那是無量劫海修功德供養十方一切佛教化無邊衆生海盧舍那佛成正覺廣大圓滿的佛德要從無量劫海的自利利他中來在佛教思想上勝過聲聞的急求己利有其不朽的價值這樣功德圓滿的佛雖多少適應印度的神教但無量劫海修功德雖欽仰信受而終覺得不容易成就如來藏法門承一切衆生同有如來智慧德相而更具體的通俗化一連用九種譬喻來譬說使人人覺得身相莊嚴的如來就在自己身中現現成成的不離自身而容易激發願求修持的精進西藏多羅那他的印度佛教史說南印度毗土耶那竭羅地方如來藏經的偈頌連童女們都會吟詠歌唱佛教的通俗化大衆化如來藏說的確有不容忽視的力量

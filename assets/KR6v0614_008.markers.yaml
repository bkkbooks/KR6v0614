  - {type: variant, offset: 5462, length: 2, content: '現病(1)《大般涅槃經》卷11〈6 現病品〉(CBETA, T12, no. 374, p. 428, b19)；(2)《大般涅槃經》卷11〈7 聖行品〉：「菩薩摩訶薩應當於是大般涅槃經。專心思惟五種之行。何等為五。一者聖行。二者梵行。三者天行。四者嬰兒行。五者病行。善男子。菩薩摩訶薩常當修習是五種行。復有一行是如來行。所謂大乘大涅槃經。」(CBETA, T12, no. 374, p. 432, a8-13)', 印順: 病行}
